  { w: 'Rezidiv', p: 're-ZI-div', k: 'Allgemein', d: 'Rückfall; Wiederauftreten einer Erkrankung nach vollständiger oder partieller Remission.', wz: '<strong>lat.</strong> recidivus = wiederkehrend', b: 'Tumorrezidiv: Wiederauftreten eines Tumors nach scheinbar erfolgreicher Behandlung.' },
  // ── S (Ergänzungen) ──
  { w: 'Sklerose', p: 'skle-ROH-se', k: 'Pathologie', d: 'Verhärtung/Vernarbung von Gewebe durch Ersatz durch Bindegewebe; kann Blutgefäße (Arteriosklerose), Nerven (Multiple Sklerose) oder Organe betreffen.', wz: '<strong>gr.</strong> skleros = hart + -osis = Zustand', b: 'Arteriosklerose: Verhärtung und Verengung der Arterienwände durch Ablagerungen → Herzinfarkt, Schlaganfall.' },
  { w: 'Symptom', p: 'SYMP-tom', k: 'Allgemein', d: 'Krankheitszeichen; subjektiv vom Patienten empfunden (z.B. Schmerz, Schwindel) im Gegensatz zu Befunden (objektiv messbar). Eine Gruppe von Symptomen = Syndrom.', wz: '<strong>gr.</strong> symptoma = Zufall, Zusammentreffen', b: 'Leitsymptom: das für eine Erkrankung typischste, wegweisende Symptom (z.B. Gelbsucht bei Ikterus).' },
  // ── T (Ergänzungen) ──
  { w: 'Tachypnoe', p: 'ta-chy-PNOE', k: 'Pneumologie', d: 'Beschleunigte Atemfrequenz (>20 Atemzüge/min); kann auf Hypoxie, Azidose, Lungenembolie oder psychogene Ursachen hinweisen.', wz: '<strong>gr.</strong> tachys = schnell + pnoe = Atmung', b: 'Tachypnoe ist Teil des SIRS-Kriteriums: >20/min → Hinweis auf systemische Entzündungsreaktion.' },
  { w: 'Tumor', p: 'TU-mor', k: 'Onkologie', d: 'Geschwulst; unkontrolliertes Gewebswachstum; kann benigne (gutartig) oder maligne (bösartig, krebsartig) sein.', wz: '<strong>lat.</strong> tumor = Geschwulst, Schwellung', b: 'Kardinalsymptome der Entzündung nach Celsus: rubor, calor, tumor (Schwellung), dolor, functio laesa.' },
  // ── U ──
  { w: 'Ulkus', p: 'UL-kus', k: 'Gastroenterologie', d: 'Geschwür; umschriebener Substanzdefekt der Schleimhaut, der bis in tiefere Gewebsschichten reicht; häufig im Magen (Ulcus ventriculi) oder Duodenum (Ulcus duodeni).', wz: '<strong>lat.</strong> ulcus = Wunde, Geschwür', b: 'Helicobacter pylori ist Hauptursache peptischer Ulzera; Eradikation durch Triple-Therapie.' },
  { w: 'Urämie', p: 'u-RÄ-mie', k: 'Nephrologie', d: 'Harnvergiftung; Ansammlung von harnpflichtigen Substanzen (Harnstoff, Kreatinin) im Blut bei schwerer Niereninsuffizienz.', wz: '<strong>gr.</strong> ouron = Urin + haima = Blut', b: 'Urämie-Symptome: Übelkeit, Erbrechen, Verwirrtheit, Juckreiz, Perikarditis → Dialyse indiziert.' },
  // ── V (Ergänzungen) ──
  { w: 'Vakzination', p: 'vak-tsi-na-TSION', k: 'Immunologie', d: 'Schutzimpfung; Einbringen von abgeschwächten/abgetöteten Erregern oder Antigenbestandteilen zur Induktion einer aktiven Immunisierung.', wz: '<strong>lat.</strong> vacca = Kuh (Jenner impfte mit Kuhpocken)', b: 'Aktive Vakzination → Gedächtniszellen bleiben Jahre bis Jahrzehnte. Passive Immunisierung mit AK-Serum dagegen nur Wochen.' },
  { w: 'Virulenz', p: 'vi-ru-LENTS', k: 'Allgemein', d: 'Krankheitserreger-Stärke; Maß für die Fähigkeit eines Erregers, beim Wirt Krankheit auszulösen.', wz: '<strong>lat.</strong> virulentus = giftig', b: 'Hochvirulente Erreger wie Ebola verursachen schwere Erkrankungen schon bei geringer Erregermenge.' },
  { w: 'Vitium', p: 'VI-tsi-um', k: 'Kardiologie', d: 'Herzfehler; angeborene oder erworbene Fehlbildung oder Funktionsstörung des Herzens (Klappen, Scheidewände).', wz: '<strong>lat.</strong> vitium = Fehler, Mangel', b: 'Vitium cordis: Herzklappenfehler (z.B. Aortenstenose, Mitralinsuffizienz) oder Septumdefekte.' },
  // ── Z (Ergänzungen) ──
  { w: 'Zellkern', p: 'ZELL-kern', k: 'Zellbiologie', d: 'Nukleus; membranumschlossenes Organell in Eukaryoten, das die DNA (Erbinformation) enthält; steuert Zellstoffwechsel und Zellteilung.', wz: '<strong>dt.</strong> Zelle + Kern; lat. nucleus', b: 'Erythrozyten sind kernlos → können sich nicht teilen und keine Proteine mehr synthetisieren.' },
  // ── Zellbiologie – Begriffe aus "Zellen & Gewebe" ──
  { w: 'Zelle', p: 'TSEL-le', k: 'Zellbiologie', d: 'Kleinste Bau- und Funktionseinheit aller Lebewesen; der menschliche Körper besteht aus ca. 100 Billionen Zellen.', wz: '<strong>lat.</strong> cella = kleiner Raum', b: 'Zellen können Stoffe aufnehmen, umbauen, freisetzen (Stoffwechsel), sich teilen und auf Reize reagieren.' },
  { w: 'Protozoen', p: 'pro-to-ZO-en', k: 'Zellbiologie', d: 'Einzeller; Urtierchen, die nur aus einer einzigen Zelle bestehen.', wz: '<strong>gr.</strong> protos = erster + zoon = Lebewesen', b: 'Krankheitserregende Protozoen: Plasmodium (Malaria), Toxoplasma, Giardia, Amöben.' },
  { w: 'Metazoen', p: 'me-ta-ZO-en', k: 'Zellbiologie', d: 'Vielzeller; Organismen, die aus einer Vielzahl spezialisierter Zellen bestehen.', wz: '<strong>gr.</strong> meta = nach + zoon = Lebewesen', b: 'Alle Tiere und Menschen sind Metazoen mit differenzierten Zelltypen und Geweben.' },
  { w: 'Prokaryoten', p: 'pro-ka-ry-O-ten', k: 'Zellbiologie', d: 'Zellen ohne echten Zellkern; das genetische Material liegt frei im Zytoplasma (z.B. Bakterien).', wz: '<strong>gr.</strong> pro = vor + karyon = Kern', b: 'Bakterien sind Prokaryoten; sie besitzen keine membranumschlossenen Zellorganellen.' },
  { w: 'Eukaryoten', p: 'eu-ka-ry-O-ten', k: 'Zellbiologie', d: 'Zellen mit echtem Zellkern und membranumschlossenen Organellen; alle menschlichen Zellen sind Eukaryoten.', wz: '<strong>gr.</strong> eu = echt, gut + karyon = Kern', b: 'Zu den Eukaryoten gehören Pflanzen, Tiere, Pilze und Protisten.' },
  { w: 'Zellmembran', p: 'ZELL-mem-bran', k: 'Zellbiologie', d: 'Hauchdünne, flexible Hülle aus Phospholipiddoppelschicht; grenzt die Zelle ab und reguliert den Stoffaustausch (Semipermeabilität).', wz: '<strong>lat.</strong> membrana = Häutchen', b: 'Die Zellmembran enthält Proteine für Transport, Rezeptoren und Zell-Zell-Kommunikation.' },
  { w: 'Semipermeabilität', p: 'se-mi-per-me-a-bi-li-TÄT', k: 'Zellbiologie', d: 'Halbdurchlässigkeit; Eigenschaft der Zellmembran, nur bestimmte Stoffe passieren zu lassen.', wz: '<strong>lat.</strong> semi = halb + permeare = durchdringen', b: 'Kleine, lipophile Moleküle passieren leicht, große und geladene Moleküle benötigen Transportproteine.' },
  { w: 'Zytoplasma', p: 'zy-to-PLAS-ma', k: 'Zellbiologie', d: 'Grundsubstanz der Zelle; gelartige Masse, die alle Zellorganellen enthält und als Arbeits- und Speichergebiet dient.', wz: '<strong>gr.</strong> kytos = Zelle + plasma = Geformtes', b: 'Das Zytoplasma besteht zu etwa 80% aus Wasser und enthält Proteine, Lipide und Kohlenhydrate.' },
  { w: 'Endoplasmatisches Retikulum', p: 'en-do-plas-MA-ti-sches re-TI-ku-lum', k: 'Zellbiologie', d: 'Membransystem im Zellinneren; raues ER (mit Ribosomen → Proteinsynthese) und glattes ER (Lipidsynthese, Entgiftung).', wz: '<strong>gr.</strong> endon = innen + plasma + lat. reticulum = Netzchen', b: 'Das raue ER ist besonders ausgeprägt in sekretorischen Zellen wie Plasmazellen (Antikörperproduktion).' },
  { w: 'Ribosomen', p: 'ri-bo-SO-men', k: 'Zellbiologie', d: 'Kleine Zellorganellen aus Proteinen und rRNA; Ort der Proteinsynthese (Translation der mRNA).', wz: '<strong>engl.</strong> ribose (Zucker der RNA) + gr. soma = Körper', b: 'Ribosomen lesen die mRNA ab und verknüpfen Aminosäuren zur Polypeptidkette.' },
  { w: 'Mitochondrien', p: 'mi-to-CHON-dri-en', k: 'Zellbiologie', d: 'Kraftwerke der Zelle; Zellorganellen mit eigener DNA, die durch oxidative Phosphorylierung ATP (Energie) produzieren.', wz: '<strong>gr.</strong> mitos = Faden + chondros = Korn', b: 'Herzmuskelzellen sind besonders reich an Mitochondrien wegen ihres hohen Energiebedarfs.' },
  { w: 'ATP', p: 'A-T-P', k: 'Zellbiologie', d: 'Adenosintriphosphat; universeller Energieträger der Zelle; Energie wird durch Abspaltung von Phosphatgruppen freigesetzt.', wz: 'Adenosin + 3 Phosphatgruppen', b: 'Pro Tag setzt ein Mensch etwa 40–75 kg ATP um, das ständig recycelt wird.' },
  { w: 'Zentrosomen', p: 'zen-tro-SO-men', k: 'Zellbiologie', d: 'Zentriolen; steuern Zellteilungsvorgänge und organisieren das Zytoskelett und die Spindelfasern bei der Mitose.', wz: '<strong>gr.</strong> kentron = Mittelpunkt + soma = Körper', b: 'Die beiden Zentriolen wandern während der Zellteilung zu den Zellpolen.' },
  { w: 'Lysosomen', p: 'ly-so-SO-men', k: 'Zellbiologie', d: 'Zellorganellen mit Verdauungsenzymen; bauen zellfremde Stoffe, defekte Organellen und Makromoleküle ab.', wz: '<strong>gr.</strong> lysis = Lösung + soma = Körper', b: 'Lysosomen werden auch als "Polizei der Zelle" bezeichnet; bei Defekten entstehen Speicherkrankheiten.' },
  { w: 'Cytosomen', p: 'cy-to-SO-men', k: 'Zellbiologie', d: 'Kleine Speicherorganellen; speichern Stoffe wie Eisen (Ferritin), Melanin oder aufgenommene Fremdstoffe.', wz: '<strong>gr.</strong> kytos = Zelle + soma = Körper', b: 'Cytosomen dienen als intrazelluläre Depots für verschiedene Stoffwechselprodukte.' },
  { w: 'DNA', p: 'D-N-A', k: 'Zellbiologie', d: 'Desoxyribonukleinsäure; Doppelhelix-Molekül, das die gesamte Erbinformation (Gene) enthält; befindet sich im Zellkern.', wz: '<strong>engl.</strong> Deoxyribonucleic Acid', b: 'Die DNA-Sequenz bestimmt die Aminosäuresequenz aller Proteine (genetischer Code).' },
  { w: 'RNA', p: 'R-N-A', k: 'Zellbiologie', d: 'Ribonukleinsäure; Einzelstrangmolekül, das Erbinformation transportiert und umsetzt; verschiedene Typen: mRNA, tRNA, rRNA.', wz: '<strong>engl.</strong> Ribonucleic Acid', b: 'mRNA überträgt genetische Information vom Kern zu den Ribosomen (Transkription → Translation).' },
  { w: 'mRNA', p: 'm-R-N-A', k: 'Zellbiologie', d: 'Messenger-RNA; Boten-RNA, die die genetische Information vom DNA-Gen zum Ribosom transportiert.', wz: '<strong>engl.</strong> messenger = Bote', b: 'Die mRNA wird im Zellkern durch Transkription von der DNA abgelesen.' },
  { w: 'tRNA', p: 't-R-N-A', k: 'Zellbiologie', d: 'Transfer-RNA; transportiert Aminosäuren zum Ribosom während der Proteinsynthese.', wz: '<strong>engl.</strong> transfer = übertragen', b: 'Jede tRNA trägt eine spezifische Aminosäure und ein Anticodon zur mRNA-Erkennung.' },
  { w: 'rRNA', p: 'r-R-N-A', k: 'Zellbiologie', d: 'Ribosomale RNA; Strukturbestandteil der Ribosomen; katalysiert die Peptidbindungsbildung.', wz: '<strong>engl.</strong> ribosomal', b: 'rRNA macht etwa 80% der gesamten RNA in der Zelle aus.' },
  { w: 'Chromosom', p: 'chro-mo-SOM', k: 'Zellbiologie', d: 'Träger der Erbanlagen; kondensierte DNA-Protein-Struktur im Zellkern; der Mensch hat 46 Chromosomen (23 Paare).', wz: '<strong>gr.</strong> chroma = Farbe + soma = Körper (färbt sich stark an)', b: '22 Autosomenpaare (Körperchromosomen) + 1 Paar Gonosomen (XX = weiblich, XY = männlich).' },
  { w: 'Autosom', p: 'AU-to-som', k: 'Zellbiologie', d: 'Körperchromosom; nicht-geschlechtsbestimmendes Chromosom; der Mensch hat 22 Autosomenpaare.', wz: '<strong>gr.</strong> autos = selbst + soma = Körper', b: 'Autosomale Vererbung betrifft Merkmale, die nicht an das Geschlecht gekoppelt sind.' },
  { w: 'Heterosom', p: 'he-te-ro-SOM', k: 'Zellbiologie', d: 'Geschlechtschromosom (Gonosom); X- oder Y-Chromosom; bestimmt das genetische Geschlecht (XX = weiblich, XY = männlich).', wz: '<strong>gr.</strong> heteros = verschieden + soma = Körper', b: 'Das Y-Chromosom enthält das SRY-Gen, das die männliche Entwicklung einleitet.' },
  { w: 'Translation', p: 'trans-la-TION', k: 'Zellbiologie', d: 'Übersetzung der mRNA-Sequenz in eine Aminosäuresequenz am Ribosom; zweiter Schritt der Proteinbiosynthese.', wz: '<strong>lat.</strong> translatio = Übersetzung', b: 'Bei der Translation lesen Ribosomen die mRNA-Codons ab und verknüpfen entsprechende Aminosäuren.' },
  { w: 'Transkription', p: 'tran-skrip-TION', k: 'Zellbiologie', d: 'Umschreibung der DNA-Sequenz in mRNA im Zellkern; erster Schritt der Proteinbiosynthese.', wz: '<strong>lat.</strong> transcribere = abschreiben', b: 'Die RNA-Polymerase liest den DNA-Strang ab und synthetisiert einen komplementären mRNA-Strang.' },
  { w: 'Mitose', p: 'mi-TO-se', k: 'Zellbiologie', d: 'Kernteilung; Zellteilung, bei der zwei identische Tochterzellen mit vollständigem Chromosomensatz entstehen.', wz: '<strong>gr.</strong> mitos = Faden (Spindelfasern)', b: 'Phasen: Interphase → Prophase → Metaphase → Anaphase → Telophase → Zytokinese.' },
  { w: 'Meiose', p: 'mei-O-se', k: 'Zellbiologie', d: 'Reduktionsteilung; Zellteilung zur Bildung von Keimzellen mit halbiertem Chromosomensatz (23 statt 46).', wz: '<strong>gr.</strong> meiosis = Verminderung', b: 'Bei der Befruchtung verschmelzen zwei haploide Keimzellen wieder zu einer diploiden Zygote.' },
  { w: 'Interphase', p: 'IN-ter-pha-se', k: 'Zellbiologie', d: 'Ruhephase zwischen zwei Zellteilungen; Zelle wächst, DNA wird verdoppelt (Replikation).', wz: '<strong>lat.</strong> inter = zwischen + gr. phasis = Erscheinung', b: 'Die Interphase macht etwa 90% des Zellzyklus aus; sie gliedert sich in G1-, S- und G2-Phase.' },
  { w: 'Prophase', p: 'PRO-pha-se', k: 'Zellbiologie', d: 'Erste Phase der Mitose; Chromosomen kondensieren und werden sichtbar, Kernhülle beginnt sich aufzulösen.', wz: '<strong>gr.</strong> pro = vor + phasis = Erscheinung', b: 'In der Prophase löst sich der Nucleolus auf und die Spindelfasern beginnen sich zu bilden.' },
  { w: 'Metaphase', p: 'ME-ta-pha-se', k: 'Zellbiologie', d: 'Zweite Phase der Mitose; Chromosomen ordnen sich in der Äquatorialebene (Metaphaseplatte) an.', wz: '<strong>gr.</strong> meta = zwischen + phasis = Erscheinung', b: 'In der Metaphase sind die Chromosomen am stärksten kondensiert und gut sichtbar.' },
  { w: 'Anaphase', p: 'A-na-pha-se', k: 'Zellbiologie', d: 'Dritte Phase der Mitose; Schwesterchromatiden werden getrennt und zu den Zellpolen gezogen.', wz: '<strong>gr.</strong> ana = hinauf + phasis = Erscheinung', b: 'Die Spindelfasern verkürzen sich und ziehen die Chromatiden auseinander.' },
  { w: 'Telophase', p: 'TE-lo-pha-se', k: 'Zellbiologie', d: 'Letzte Phase der Mitose; neue Kernhüllen bilden sich, Chromosomen dekondensieren, Zellteilung wird eingeleitet.', wz: '<strong>gr.</strong> telos = Ende + phasis = Erscheinung', b: 'Nach der Telophase folgt die Zytokinese (Teilung des Zytoplasmas).' },
  // ── Gewebetypen aus "Zellen & Gewebe" ──
  { w: 'Epithelgewebe', p: 'e-pi-TEL-ge-we-be', k: 'Zellbiologie', d: 'Deckgewebe; bedeckt äußere und innere Körperoberflächen; Funktionen: Schutz, Sekretion, Resorption.', wz: '<strong>gr.</strong> epi = auf + thelos = Brustwarze, Hülle', b: 'Epithelgewebe ist gefäßlos; Ernährung erfolgt durch Diffusion vom darunterliegenden Bindegewebe.' },
  { w: 'Basalmembran', p: 'ba-sal-mem-BRAN', k: 'Zellbiologie', d: 'Dünne Grenzschicht zwischen Epithel und Bindegewebe; verankert das Epithel und dient als Filter.', wz: '<strong>lat.</strong> basis = Grundlage + membrana = Häutchen', b: 'Bei Karzinomen durchbrechen die Tumorzellen die Basalmembran (invasives Wachstum).' },
  { w: 'Mesothel', p: 'me-so-TEL', k: 'Zellbiologie', d: 'Epitheliale Auskleidung der serösen Höhlen (Peritoneum, Pleura, Perikard); einschichtiges Plattenepithel.', wz: '<strong>gr.</strong> mesos = Mitte + thelos = Hülle', b: 'Das Mesothel produziert seröse Flüssigkeit zur Gleitfähigkeit der Organe.' },
  { w: 'Endothel', p: 'en-do-TEL', k: 'Zellbiologie', d: 'Einschichtige Zelllage, die Blutgefäße, Lymphgefäße und Herzhöhlen von innen auskleidet.', wz: '<strong>gr.</strong> endon = innen + thelos = Hülle', b: 'Das Endothel reguliert Gefäßtonus, Blutgerinnung und Durchlässigkeit; Dysfunktion begünstigt Arteriosklerose.' },
  { w: 'Deckepithel', p: 'DECK-e-pi-tel', k: 'Zellbiologie', d: 'Epithel mit Schutzfunktion und Stoffaustauschfunktion; kann ein- oder mehrschichtig sein.', wz: '<strong>dt.</strong> Deck(en) + Epithel', b: 'Mehrschichtiges Plattenepithel in Haut und Speiseröhre schützt vor mechanischer Belastung.' },
  { w: 'Drüsenepithel', p: 'DRÜ-sen-e-pi-tel', k: 'Zellbiologie', d: 'Spezialisiertes Epithel zur Sekretion; produziert Gallensaft, Magensaft, Speichel, Schweiß.', wz: '<strong>dt.</strong> Drüse + Epithel', b: 'Exokrine Drüsen geben Sekret nach außen ab, endokrine direkt ins Blut.' },
  { w: 'Sinnesepithel', p: 'SIN-nes-e-pi-tel', k: 'Zellbiologie', d: 'Spezialisiertes Epithel mit sensorischen Zellen zur Reizaufnahme.', wz: '<strong>dt.</strong> Sinne + Epithel', b: 'Beispiele: Riechepithel der Nase, Geschmacksknospen der Zunge, Corti-Organ im Innenohr.' },
  { w: 'Plattenepithel', p: 'PLAT-ten-e-pi-tel', k: 'Zellbiologie', d: 'Epitheltyp mit flachen, schuppenartigen Zellen; einschichtig oder mehrschichtig.', wz: '<strong>dt.</strong> Platte + Epithel', b: 'Einschichtig in Gefäßen (Endothel), mehrschichtig in Haut, Mundhöhle, Ösophagus, Vagina.' },
  { w: 'Zylinderepithel', p: 'zy-LIN-der-e-pi-tel', k: 'Zellbiologie', d: 'Epitheltyp mit säulenförmigen, hochprismatischen Zellen; typisch für Darm und Magen.', wz: '<strong>dt.</strong> Zylinder + Epithel', b: 'Das Zylinderepithel des Darms trägt Mikrovilli (Bürstensaum) zur Oberflächenvergrößerung.' },
  { w: 'Exokrin', p: 'ex-o-KRIN', k: 'Zellbiologie', d: 'Nach außen absondernd; exokrine Drüsen geben ihr Sekret über Ausführungsgänge an Körperoberflächen ab.', wz: '<strong>gr.</strong> exo = außen + krinein = absondern', b: 'Exokrine Drüsen: Speicheldrüsen, Schweißdrüsen, Bauchspeicheldrüse (exokriner Anteil).' },
  { w: 'Endokrin', p: 'en-do-KRIN', k: 'Zellbiologie', d: 'Nach innen absondernd; endokrine Drüsen geben Hormone direkt ins Blut ab (keine Ausführungsgänge).', wz: '<strong>gr.</strong> endon = innen + krinein = absondern', b: 'Endokrine Drüsen: Hypophyse, Schilddrüse, Nebenniere, Langerhans-Inseln des Pankreas.' },
  { w: 'Bindegewebe', p: 'BIN-de-ge-we-be', k: 'Zellbiologie', d: 'Am häufigsten vorkommendes Gewebstyp; verbindet, stützt und füllt; besteht aus Zellen, Fasern und Grundsubstanz.', wz: '<strong>dt.</strong> binden + Gewebe', b: 'Fasertypen: Kollagenfasern (Zugfestigkeit), elastische Fasern (Dehnbarkeit), retikuläre Fasern (Gerüst).' },
  { w: 'Fibroblasten', p: 'fi-bro-BLAS-ten', k: 'Zellbiologie', d: 'Aktive Bindegewebszellen; produzieren Fasern und Grundsubstanz; wichtig für Wundheilung.', wz: '<strong>lat.</strong> fibra = Faser + gr. blastos = Keim', b: 'Bei der Wundheilung wandern Fibroblasten ein und bilden Narbengewebe.' },
  { w: 'Fibrozyten', p: 'fi-bro-ZY-ten', k: 'Zellbiologie', d: 'Ruhende, ausdifferenzierte Bindegewebszellen; bilden die eigentliche Grundsubstanz.', wz: '<strong>lat.</strong> fibra = Faser + gr. kytos = Zelle', b: 'Fibrozyten sind weniger stoffwechselaktiv als Fibroblasten.' },
  { w: 'Histiozyten', p: 'his-ti-o-ZY-ten', k: 'Zellbiologie', d: 'Ortsständige Fresszellen (Makrophagen) im Bindegewebe; Teil des retikuloendothelialen Systems.', wz: '<strong>gr.</strong> histion = Gewebe + kytos = Zelle', b: 'Histiozyten phagozytieren Fremdpartikel, Bakterien und Zelltrümmer.' },
  { w: 'Kollagenfasern', p: 'kol-la-GEN-fa-sern', k: 'Zellbiologie', d: 'Zugfeste Bindegewebsfasern aus dem Strukturprotein Kollagen; machen etwa 30% des Körpereiweißes aus.', wz: '<strong>gr.</strong> kolla = Leim + gennan = erzeugen', b: 'Kollagen findet sich in Sehnen, Bändern, Knorpel, Knochen, Haut und Blutgefäßwänden.' },
  { w: 'Elastische Fasern', p: 'e-LAS-ti-sche FA-sern', k: 'Zellbiologie', d: 'Stark dehnbare Bindegewebsfasern aus Elastin; können auf das Mehrfache gedehnt werden und schnellen zurück.', wz: '<strong>gr.</strong> elastos = dehnbar', b: 'Vorkommen: Lunge, Aorta, Haut, Ohrmuschel, Epiglottis.' },
  { w: 'Fettgewebe', p: 'FETT-ge-we-be', k: 'Zellbiologie', d: 'Spezialisiertes Bindegewebe aus Adipozyten; Speicher- und Baufett; Wärmeisolierung und Polsterung.', wz: '<strong>dt.</strong> Fett + Gewebe', b: 'Speicherfett: subkutan; Baufett: Nierenlager, Fußsohle, Orbita (mechanischer Schutz).' },
  { w: 'Sehne', p: 'SEH-ne', k: 'Zellbiologie', d: 'Straffes Bindegewebe; verbindet Muskeln mit Knochen; besteht aus parallel angeordneten Kollagenfasern.', wz: '<strong>ahd.</strong> senawa = Sehne', b: 'Die Achillessehne ist die kräftigste Sehne des Körpers.' },
  { w: 'Aponeurose', p: 'a-po-neu-RO-se', k: 'Zellbiologie', d: 'Flächenhafte Sehnenplatte; dient als Muskelansatz oder zur Kraftübertragung (z.B. Palmaraponeurose).', wz: '<strong>gr.</strong> apo = weg + neuron = Sehne', b: 'Aponeurosen finden sich an der Schädeldecke (Galea aponeurotica), Hohlhand und Fußsohle.' },
  { w: 'Faszie', p: 'FA-szie', k: 'Zellbiologie', d: 'Bindegewebige Hülle; umgibt Muskeln, Muskelgruppen, Organe und bildet Gleitschichten.', wz: '<strong>lat.</strong> fascia = Binde, Band', b: 'Die Fascia thoracolumbalis stabilisiert die Lendenwirbelsäule.' },
  { w: 'Knorpelgewebe', p: 'KNOR-pel-ge-we-be', k: 'Zellbiologie', d: 'Stützgewebe aus Chondrozyten in fester Grundsubstanz; gefäßlos, Ernährung durch Diffusion; 3 Typen.', wz: '<strong>dt.</strong> Knorpel + Gewebe', b: 'Hyaliner Knorpel (Gelenke), elastischer Knorpel (Ohr), Faserknorpel (Bandscheiben).' },
  { w: 'Hyaliner Knorpel', p: 'hy-a-LI-ner KNOR-pel', k: 'Zellbiologie', d: 'Häufigster Knorpeltyp; glasig-transparent; bildet Gelenkflächen, Rippenknorpel, Nasenscheidewand, Luftröhrenspangen.', wz: '<strong>gr.</strong> hyalos = Glas', b: 'Hyaliner Knorpel hat keine Regenerationsfähigkeit – Schäden heilen nicht vollständig.' },
  { w: 'Elastischer Knorpel', p: 'e-LAS-ti-scher KNOR-pel', k: 'Zellbiologie', d: 'Knorpel mit vielen elastischen Fasern; gelblich, biegsam; Ohrmuschel, Nasenspitze, Kehldeckel.', wz: '<strong>gr.</strong> elastos = dehnbar', b: 'Elastischer Knorpel kann verbogen werden und kehrt in seine Ausgangsform zurück.' },
  { w: 'Faserknorpel', p: 'FA-ser-knor-pel', k: 'Zellbiologie', d: 'Druckbeständiger Knorpel mit vielen Kollagenfasern; Bandscheiben, Menisken, Symphyse.', wz: '<strong>dt.</strong> Faser + Knorpel', b: 'Faserknorpel ist besonders widerstandsfähig gegen Druck- und Zugbelastungen.' },
  { w: 'Knochengewebe', p: 'KNO-chen-ge-we-be', k: 'Zellbiologie', d: 'Mineralisiertes Stützgewebe; besteht aus organischer Matrix (Kollagen) und anorganischen Salzen (v.a. Hydroxylapatit).', wz: '<strong>dt.</strong> Knochen + Gewebe', b: 'Knochen wird ständig umgebaut (Remodeling) durch Osteoblasten (Aufbau) und Osteoklasten (Abbau).' },
  { w: 'Osteoblasten', p: 'os-te-o-BLAS-ten', k: 'Zellbiologie', d: 'Knochenbildende Zellen; produzieren die organische Knochenmatrix (Osteoid) und lagern Calcium ein.', wz: '<strong>gr.</strong> osteon = Knochen + blastos = Keim', b: 'Osteoblasten werden zu Osteozyten, wenn sie sich in die Knochenmatrix einmauern.' },
  { w: 'Osteozyten', p: 'os-te-o-ZY-ten', k: 'Zellbiologie', d: 'Reife Knochenzellen; liegen in Lakunen der Knochenmatrix; kommunizieren über Kanälchen.', wz: '<strong>gr.</strong> osteon = Knochen + kytos = Zelle', b: 'Osteozyten registrieren mechanische Belastung und steuern den Knochenumbau.' },
  { w: 'Osteoklasten', p: 'os-te-o-KLAS-ten', k: 'Zellbiologie', d: 'Knochenabbauende Riesenzellen; resorbieren Knochenmatrix und setzen dabei Calcium frei.', wz: '<strong>gr.</strong> osteon = Knochen + klastos = zerbrochen', b: 'Bei Osteoporose überwiegt die Osteoklastenaktivität gegenüber den Osteoblasten.' },
  { w: 'Haversche Kanäle', p: 'HA-vers-che ka-NÄ-le', k: 'Zellbiologie', d: 'Längskanäle im kompakten Knochen; enthalten Blutgefäße und Nerven zur Ernährung des Knochengewebes.', wz: 'Benannt nach Clopton Havers (1657–1702)', b: 'Die konzentrisch um die Haversche Kanäle angeordneten Knochenlamellen bilden das Osteon.' },
  { w: 'Desmale Ossifikation', p: 'des-MA-le os-si-fi-ka-TION', k: 'Zellbiologie', d: 'Direkte Knochenbildung aus Bindegewebe ohne Knorpelvorstufe; bei flachen Schädelknochen und Schlüsselbein.', wz: '<strong>gr.</strong> desmos = Band + lat. os = Knochen + facere = machen', b: 'Die Fontanellen des Säuglings bestehen aus bindegewebigen Arealen, die später verknöchern.' },
  { w: 'Chondrale Ossifikation', p: 'chon-DRA-le os-si-fi-ka-TION', k: 'Zellbiologie', d: 'Indirekte Knochenbildung über Knorpelvorstufe; bei Röhrenknochen und Wirbeln über Epiphysenfugen.', wz: '<strong>gr.</strong> chondros = Knorpel + lat. os + facere', b: 'Längenwachstum erfolgt durch Vermehrung der Knorpelzellen in den Epiphysenfugen.' },
  // ── Muskel- und Nervengewebe aus "Zellen & Gewebe" ──
  { w: 'Glatte Muskulatur', p: 'GLAT-te mus-ku-la-TUR', k: 'Zellbiologie', d: 'Unwillkürliche Muskulatur ohne Querstreifung; kommt in Hohlorganen vor; langsam, rhythmisch, unermüdbar.', wz: 'Erscheint mikroskopisch „glatt" ohne Querstreifung', b: 'Vorkommen: Magen-Darm-Trakt, Blutgefäße, Bronchien, Harnblase, Uterus.' },
  { w: 'Quergestreifte Muskulatur', p: 'QUER-ge-streif-te mus-ku-la-TUR', k: 'Zellbiologie', d: 'Willkürliche Skelettmuskulatur mit typischer Querstreifung (Aktin-Myosin-Anordnung); schnell kontrahierend, ermüdbar.', wz: 'Zeigt mikroskopisch eine Querstreifung durch regelmäßige Sarkomere', b: 'Skelettmuskeln, Zunge, Zwerchfell, Gesichtsmuskeln sind quergestreift.' },
  { w: 'Herzmuskulatur', p: 'HERZ-mus-ku-la-tur', k: 'Zellbiologie', d: 'Sonderform; Aufbau wie quergestreift, aber unwillkürlich, rhythmisch und unermüdbar; Zellen durch Glanzstreifen verbunden.', wz: '<strong>dt.</strong> Herz + Muskulatur', b: 'Das Herz schlägt autonom durch das Erregungsbildungs- und Leitungssystem.' },
  { w: 'Neuron', p: 'NEU-ron', k: 'Zellbiologie', d: 'Nervenzelle; besteht aus Zellkörper (Soma/Perikaryon), Dendriten (Reizaufnahme) und Axon (Reizweiterleitung).', wz: '<strong>gr.</strong> neuron = Nerv', b: 'Nervenzellen sind stark spezialisiert und können sich beim Erwachsenen kaum noch teilen.' },
  { w: 'Gliazellen', p: 'GLI-a-zel-len', k: 'Zellbiologie', d: 'Stützzellen des Nervensystems; ernähren, schützen und isolieren Neuronen; ca. 10× mehr als Nervenzellen.', wz: '<strong>gr.</strong> glia = Leim', b: 'Typen: Astrozyten (Ernährung), Oligodendrozyten (Myelin im ZNS), Schwann-Zellen (Myelin im PNS), Mikroglia (Immunabwehr).' },
  { w: 'Dendrit', p: 'den-DRIT', k: 'Zellbiologie', d: 'Kurze, baumartig verzweigte Fortsätze des Neurons; empfangen Signale von anderen Nervenzellen.', wz: '<strong>gr.</strong> dendron = Baum', b: 'Die zahlreichen Dendriten vergrößern die Oberfläche für synaptische Eingänge.' },
  { w: 'Axon', p: 'AX-on', k: 'Zellbiologie', d: 'Neurit; langer Fortsatz des Neurons, der elektrische Impulse vom Zellkörper wegleitet; kann bis zu 1 m lang sein.', wz: '<strong>gr.</strong> axon = Achse', b: 'Die längsten Axone verlaufen von der Großhirnrinde bis zum Rückenmark und zur Beinmuskulatur.' },
  { w: 'Synapse', p: 'sy-NAP-se', k: 'Zellbiologie', d: 'Kontaktstelle zwischen zwei Neuronen oder Neuron und Erfolgsorgan; Signalübertragung chemisch (Neurotransmitter) oder elektrisch.', wz: '<strong>gr.</strong> synapsis = Verbindung', b: 'Präsynaptische Endigung → synaptischer Spalt → postsynaptische Membran.' },
  { w: 'Motorische Endplatte', p: 'mo-TO-ri-sche END-plat-te', k: 'Zellbiologie', d: 'Synapse zwischen Motoneuron und Skelettmuskelzelle; Transmitter: Acetylcholin.', wz: '<strong>lat.</strong> motor = Beweger', b: 'Curare blockiert die motorische Endplatte → Muskellähmung.' },
  { w: 'Neurotransmitter', p: 'neu-ro-trans-MIT-ter', k: 'Zellbiologie', d: 'Chemische Botenstoffe zur Signalübertragung an Synapsen; werden in Vesikeln gespeichert und freigesetzt.', wz: '<strong>gr.</strong> neuron + lat. transmittere = hinüberschicken', b: 'Wichtige Transmitter: Acetylcholin, Noradrenalin, Dopamin, Serotonin, GABA, Glutamat.' },
  { w: 'Acetylcholin', p: 'a-ce-tyl-CHO-lin', k: 'Zellbiologie', d: 'Neurotransmitter; wichtig für Muskelkontraktion, parasympathisches NS und Gedächtnisfunktion.', wz: '<strong>lat.</strong> acetum = Essig + gr. chole = Galle', b: 'Wird durch Acetylcholinesterase schnell abgebaut; Hemmer: Neostigmin bei Myasthenia gravis.' },
  { w: 'Noradrenalin', p: 'nor-a-dre-na-LIN', k: 'Zellbiologie', d: 'Neurotransmitter und Hormon; wichtig für Aufmerksamkeit, Sympathikus und Stressreaktion.', wz: 'Nor(mal) + Adrenalin (ohne N-Methylgruppe)', b: 'Noradrenalin erhöht Herzfrequenz, Blutdruck und Wachheit.' },
  { w: 'Serotonin', p: 'se-ro-to-NIN', k: 'Zellbiologie', d: 'Neurotransmitter; beeinflusst Stimmung, Schlaf, Appetit und Schmerzwahrnehmung; "Glückshormon".', wz: '<strong>lat.</strong> serum = Blutflüssigkeit + gr. tonos = Spannung', b: 'Serotoninmangel wird mit Depression assoziiert; SSRI erhöhen die Serotoninverfügbarkeit.' },
  { w: 'Dopamin', p: 'DO-pa-min', k: 'Zellbiologie', d: 'Neurotransmitter; wichtig für Belohnung, Motivation, Motorik; Vorstufe von Noradrenalin.', wz: 'Abgeleitet von DOPA (Dihydroxyphenylalanin)', b: 'Dopaminmangel im Striatum → Morbus Parkinson. Dopaminüberschuss → Psychosen.' },
  { w: 'Myelinscheide', p: 'MY-e-lin-schei-de', k: 'Zellbiologie', d: 'Lipidreiche Isolierschicht um Axone; beschleunigt die Erregungsleitung (saltatorisch); gebildet von Schwann-Zellen (PNS) oder Oligodendrozyten (ZNS).', wz: '<strong>gr.</strong> myelos = Mark', b: 'Bei Multipler Sklerose wird die Myelinscheide durch Autoimmunprozesse zerstört (Demyelinisierung).' },
  { w: 'Schwann-Zellen', p: 'SCHWANN-zel-len', k: 'Zellbiologie', d: 'Gliazellen des peripheren Nervensystems; bilden die Myelinscheide um periphere Nervenfasern.', wz: 'Benannt nach Theodor Schwann (1810–1882)', b: 'Eine Schwann-Zelle umwickelt einen Axonabschnitt zwischen zwei Ranvierschen Schnürringen.' },
  { w: 'Ranviersche Schnürringe', p: 'ran-vi-ER-sche SCHNÜR-rin-ge', k: 'Zellbiologie', d: 'Einschnürungen zwischen Myelinsegmenten; Orte der saltatorischen Erregungsleitung.', wz: 'Benannt nach Louis-Antoine Ranvier (1835–1922)', b: 'Das Aktionspotenzial springt von Schnürring zu Schnürring → viel schnellere Leitung.' },
  { w: 'Afferente Fasern', p: 'af-fe-REN-te FA-sern', k: 'Zellbiologie', d: 'Sensorische Nervenfasern; leiten Informationen von Rezeptoren zum ZNS (Gehirn/Rückenmark).', wz: '<strong>lat.</strong> afferre = hinbringen', b: 'Afferente Bahnen übermitteln Schmerz-, Temperatur-, Druck- und Berührungsempfindungen.' },
  { w: 'Efferente Fasern', p: 'ef-fe-REN-te FA-sern', k: 'Zellbiologie', d: 'Motorische Nervenfasern; leiten Befehle vom ZNS zu Muskeln und Drüsen.', wz: '<strong>lat.</strong> efferre = hinaustragen', b: 'Efferente Fasern innervieren Skelettmuskeln (somatisch) und glatte Muskulatur/Drüsen (vegetativ).' },
  { w: 'Ganglion', p: 'GAN-gli-on', k: 'Zellbiologie', d: 'Ansammlung von Nervenzellkörpern außerhalb des ZNS; Schaltstationen im peripheren Nervensystem.', wz: '<strong>gr.</strong> ganglion = Knoten', b: 'Spinalganglien enthalten die Zellkörper der sensorischen Neurone.' },
  // ── Keimblätter und Entwicklung ──
  { w: 'Keimblätter', p: 'KEIM-blät-ter', k: 'Zellbiologie', d: 'Drei embryonale Zellschichten (Ektoderm, Mesoderm, Endoderm); aus ihnen entwickeln sich alle Gewebe und Organe.', wz: '<strong>dt.</strong> Keim + Blatt', b: 'Die Differenzierung der Keimblätter erfolgt während der Gastrulation in der 3. Entwicklungswoche.' },
  { w: 'Ektoderm', p: 'EK-to-derm', k: 'Zellbiologie', d: 'Äußeres Keimblatt; bildet Epidermis, Nervensystem, Sinnesorgane, Zahnschmelz.', wz: '<strong>gr.</strong> ektos = außen + derma = Haut', b: 'Aus dem Ektoderm entstehen auch Haut, Haare, Nägel und Schweißdrüsen.' },
  { w: 'Mesoderm', p: 'ME-so-derm', k: 'Zellbiologie', d: 'Mittleres Keimblatt; bildet Bindegewebe, Muskulatur, Skelett, Herz-Kreislauf-System, Nieren, Gonaden.', wz: '<strong>gr.</strong> mesos = Mitte + derma = Haut', b: 'Das Mesoderm liefert den Großteil des Bewegungsapparats und der inneren Organe.' },
  { w: 'Entoderm', p: 'EN-to-derm', k: 'Zellbiologie', d: 'Inneres Keimblatt (Endoderm); bildet Epithel des Verdauungstrakts, der Atemwege, Leber, Pankreas, Schilddrüse.', wz: '<strong>gr.</strong> entos = innen + derma = Haut', b: 'Das Entoderm kleidet das Innere des Körpers aus – vom Pharynx bis zum Rektum.' },
  { w: 'Zirrhose', p: 'tsi-ROH-se', k: 'Gastroenterologie', d: 'Leberzirrhose; irreversible Vernarbung des Lebergewebes durch chronische Schädigung; führt zu Pfortaderhochdruck, Aszites, Ösophagusvarizen.', wz: '<strong>gr.</strong> kirrhos = gelblich-orange (Farbe der zirrhotischen Leber)', b: 'Häufigste Ursachen: Alkohol (60 %), Hepatitis B/C; Komplikationen: Aszites, Enzephalopathie, hepatozelluläres Karzinom.' },
  // ── Zusätzliche Begriffe A ──
  { w: 'Ablatio', p: 'ab-LA-tio', k: 'Allgemein', d: 'Abtragung, operative Entfernung von Gewebe oder Organen.', wz: '<strong>lat.</strong> ablatio = Wegnahme', b: 'Ablatio mammae: operative Entfernung der Brustdrüse bei Mammakarzinom.' },
  { w: 'Achlorhydrie', p: 'a-chlor-hy-DRIE', k: 'Gastroenterologie', d: 'Fehlen von Salzsäure im Magensaft; kann bei atrophischer Gastritis oder nach Gastrektomie auftreten.', wz: '<strong>gr.</strong> a = ohne + chlor = grün (Chlorwasserstoff) + hydor = Wasser', b: 'Achlorhydrie führt zu Vitamin-B12-Mangel, da der Intrinsic Factor nicht ausreichend produziert wird.' },
  { w: 'Adenokarzinom', p: 'a-de-no-kar-tsi-NOM', k: 'Onkologie', d: 'Bösartiger Tumor, der von Drüsengewebe ausgeht; häufig in Lunge, Kolon, Prostata, Mamma.', wz: '<strong>gr.</strong> aden = Drüse + karkinos = Krebs', b: 'Das Adenokarzinom der Lunge ist heute der häufigste Subtyp des Bronchialkarzinoms.' },
  { w: 'Adhäsion', p: 'ad-hä-SION', k: 'Pathologie', d: 'Verwachsung; narbige Verbindung zwischen normalerweise getrennten Gewebsflächen, häufig nach Operationen oder Entzündungen.', wz: '<strong>lat.</strong> adhaesio = Anhaften', b: 'Intraabdominelle Adhäsionen nach Laparotomie können zu mechanischem Ileus führen.' },
  { w: 'Adnexitis', p: 'ad-NEX-itis', k: 'Gynäkologie', d: 'Entzündung der Eileiter und Eierstöcke; meist durch aufsteigende bakterielle Infektion.', wz: '<strong>lat.</strong> adnexa = Anhänge + gr. -itis = Entzündung', b: 'Symptome: Unterbauchschmerzen, Fieber, eitriger Ausfluss; Risiko der Infertilität.' },
  { w: 'Aerob', p: 'ae-ROB', k: 'Physiologie', d: 'Mit Sauerstoff; aerober Stoffwechsel nutzt O₂ zur Energiegewinnung.', wz: '<strong>gr.</strong> aer = Luft + bios = Leben', b: 'Aerobe Glykolyse: vollständiger Abbau von Glukose zu CO₂ und H₂O mit hoher ATP-Ausbeute.' },
  { w: 'Allergie', p: 'al-ler-GIE', k: 'Immunologie', d: 'Überschießende Immunreaktion auf normalerweise harmlose Substanzen (Allergene); verschiedene Typen (I–IV nach Coombs/Gell).', wz: '<strong>gr.</strong> allos = anders + ergon = Arbeit', b: 'Typ-I-Allergie: Sofortreaktion durch IgE (z.B. Heuschnupfen, Anaphylaxie). Typ-IV: Spätreaktion durch T-Zellen (z.B. Kontaktekzem).' },
  { w: 'Amenorrhoe', p: 'a-me-nor-RÖ', k: 'Gynäkologie', d: 'Ausbleiben der Menstruation; primär (nie eingetreten) oder sekundär (war vorhanden, dann ausgeblieben).', wz: '<strong>gr.</strong> a = ohne + men = Monat + rhein = fließen', b: 'Sekundäre Amenorrhoe: häufige Ursachen sind Schwangerschaft, Stress, Gewichtsverlust, Hyperprolaktinämie.' },
  { w: 'Anaerob', p: 'an-ae-ROB', k: 'Physiologie', d: 'Ohne Sauerstoff; anaerober Stoffwechsel gewinnt Energie ohne O₂.', wz: '<strong>gr.</strong> an = ohne + aer = Luft + bios = Leben', b: 'Anaerobe Glykolyse: Abbau von Glukose zu Laktat, wenn O₂ nicht ausreicht (z.B. intensive Muskelarbeit).' },
  { w: 'Analgetikum', p: 'an-al-GE-ti-kum', k: 'Pharmakologie', d: 'Schmerzmittel; Medikament zur Schmerzlinderung ohne Bewusstseinsverlust.', wz: '<strong>gr.</strong> an = ohne + algos = Schmerz', b: 'Einteilung: nicht-opioide Analgetika (NSAR, Paracetamol) und Opioide (Morphin, Tramadol).' },
  { w: 'Anastomose', p: 'ana-sto-MO-se', k: 'Anatomie', d: 'Natürliche oder chirurgisch geschaffene Verbindung zwischen zwei Hohlorganen, Blutgefäßen oder Nerven.', wz: '<strong>gr.</strong> anastomosis = Öffnung', b: 'Darm-Anastomose: Verbindung zweier Darmabschnitte nach Resektion.' },
  { w: 'Aneurysma', p: 'a-neu-RYS-ma', k: 'Kardiologie', d: 'Lokale Erweiterung eines arteriellen Blutgefäßes durch Wandschwäche; Ruptur führt zu lebensbedrohlicher Blutung.', wz: '<strong>gr.</strong> aneurysma = Erweiterung', b: 'Bauchaortenaneurysma: ab 5,5 cm Durchmesser besteht hohes Rupturrisiko → OP indiziert.' },
  { w: 'Angina pectoris', p: 'an-GI-na PEK-to-ris', k: 'Kardiologie', d: 'Brustenge; anfallsartiger Thoraxschmerz durch vorübergehende Myokardischämie bei koronarer Herzkrankheit.', wz: '<strong>lat.</strong> angina = Enge + pectus = Brust', b: 'Stabile Angina: tritt bei Belastung auf, verschwindet in Ruhe. Instabile Angina: auch in Ruhe → Vorstufe Infarkt.' },
  { w: 'Anurie', p: 'an-U-rie', k: 'Nephrologie', d: 'Komplettes Fehlen oder extreme Verminderung der Harnproduktion (<100 ml/Tag); akutes Nierenversagen.', wz: '<strong>gr.</strong> an = ohne + ouron = Urin', b: 'Anurie bei akutem Nierenversagen → dringend Dialyse erforderlich.' },
  { w: 'Aorta', p: 'a-OR-ta', k: 'Kardiologie', d: 'Hauptschlagader; größte Arterie des Körpers, entspringt aus dem linken Ventrikel.', wz: '<strong>gr.</strong> aorte = das Aufgehängte (am Herzen)', b: 'Aorta ascendens, Aortenbogen, Aorta descendens (thorakalis und abdominalis).' },
  { w: 'Aphasie', p: 'a-pha-SIE', k: 'Neurologie', d: 'Erworbene Sprachstörung durch Hirnschädigung; Verlust der Fähigkeit zu sprechen, zu verstehen, zu lesen oder zu schreiben.', wz: '<strong>gr.</strong> a = ohne + phasis = Sprache', b: 'Broca-Aphasie: motorische Sprachstörung (versteht, kann aber nicht sprechen). Wernicke-Aphasie: sensorisch (spricht, versteht aber nicht).' },
  { w: 'Appendix', p: 'ap-PEN-dix', k: 'Anatomie', d: 'Wurmfortsatz; kleiner, fingerförmiger Anhang am Blinddarm (Zäkum).', wz: '<strong>lat.</strong> appendix = Anhang', b: 'Appendizitis: Entzündung des Wurmfortsatzes → McBurney-Punkt-Schmerz, Abwehrspannung.' },
  { w: 'Arrhythmie', p: 'ar-RYTH-mie', k: 'Kardiologie', d: 'Herzrhythmusstörung; unregelmäßiger, zu schneller oder zu langsamer Herzschlag.', wz: '<strong>gr.</strong> a = ohne + rhythmos = Takt', b: 'Vorhofflimmern ist die häufigste Arrhythmie; erhöht das Schlaganfallrisiko.' },
  { w: 'Arthroskopie', p: 'ar-thro-sko-PIE', k: 'Orthopädie', d: 'Minimalinvasive Gelenkspiegelung mit Kamera zur Diagnostik und Therapie von Gelenkerkrankungen.', wz: '<strong>gr.</strong> arthron = Gelenk + skopein = schauen', b: 'Arthroskopie des Knies: Meniskusresektion, Kreuzbandrekonstruktion.' },
  { w: 'Aspiration', p: 'as-pi-RA-tion', k: 'Pneumologie', d: 'Einatmen von Fremdmaterial (Speisen, Flüssigkeiten, Magensaft) in die Atemwege.', wz: '<strong>lat.</strong> aspirare = einatmen', b: 'Aspirationspneumonie: Lungenentzündung durch eingesaugten Mageninhalt.' },
  { w: 'Ataxie', p: 'a-TAK-sie', k: 'Neurologie', d: 'Koordinationsstörung der Bewegungsabläufe ohne Lähmung; meist durch Kleinhirn- oder Rückenmarkschädigung.', wz: '<strong>gr.</strong> a = ohne + taxis = Ordnung', b: 'Zerebelläre Ataxie: breitbasiger, schwankender Gang; Dysmetrie bei Finger-Nase-Versuch.' },
  { w: 'Audiometrie', p: 'au-dio-me-TRIE', k: 'HNO', d: 'Hörprüfung; Messung der Hörfähigkeit und Bestimmung von Hörschwellen.', wz: '<strong>lat.</strong> audire = hören + gr. metron = Maß', b: 'Tonaudiometrie prüft die Hörschwelle für reine Töne in verschiedenen Frequenzen.' },
  { w: 'Auskultation', p: 'aus-kul-TA-tion', k: 'Diagnostik', d: 'Abhören mit dem Stethoskop; Untersuchungsmethode zur Beurteilung von Herz-, Lungen- und Darmgeräuschen.', wz: '<strong>lat.</strong> auscultare = horchen', b: 'Herzauskultation: 4 Klappenauskultationspunkte (Aorten-, Pulmonal-, Trikuspidal-, Mitralklappe).' },
  { w: 'Autoimmunerkrankung', p: 'au-to-im-mun-er-KRAN-kung', k: 'Immunologie', d: 'Erkrankung, bei der das Immunsystem körpereigene Strukturen angreift und zerstört.', wz: '<strong>gr.</strong> autos = selbst + lat. immunis = frei', b: 'Beispiele: Hashimoto-Thyreoiditis, SLE, Rheumatoide Arthritis, Multiple Sklerose, Typ-1-Diabetes.' },
  // ── Zusätzliche Begriffe B ──
  { w: 'Bakteriämie', p: 'bak-te-ri-Ä-mie', k: 'Infektiologie', d: 'Vorhandensein von Bakterien im Blut; kann asymptomatisch sein oder zu Sepsis führen.', wz: '<strong>gr.</strong> bakterion = Stäbchen + haima = Blut', b: 'Transiente Bakteriämie nach Zahnbehandlung kann bei Herzklappenfehlern zur Endokarditis führen.' },
  { w: 'Basophilie', p: 'ba-so-phi-LIE', k: 'Hämatologie', d: 'Vermehrung der basophilen Granulozyten im Blut; selten, kann bei myeloproliferativen Erkrankungen vorkommen.', wz: '<strong>gr.</strong> basis = Grundlage + philein = lieben (färbt sich mit basischen Farbstoffen)', b: 'Basophilie kann bei CML (chronisch myeloischer Leukämie) als Zeichen der Krankheitsprogression auftreten.' },
  { w: 'Benigne', p: 'be-NIG-ne', k: 'Onkologie', d: 'Gutartig; ein benigner Tumor wächst langsam, verdrängt Gewebe, aber infiltriert nicht und metastasiert nicht.', wz: '<strong>lat.</strong> benignus = gutartig', b: 'Benigne Tumoren: Lipom (Fett), Myom (Muskel), Adenom (Drüse). Gegensatz: maligne = bösartig.' },
  { w: 'Biopsie', p: 'bi-OP-sie', k: 'Diagnostik', d: 'Gewebeentnahme zur mikroskopischen Untersuchung; diagnostisches Verfahren bei Tumorverdacht.', wz: '<strong>gr.</strong> bios = Leben + opsis = Anschauen', b: 'Stanzbiopsie der Prostata: mehrere Gewebeproben zur Diagnosesicherung bei PSA-Erhöhung.' },
  { w: 'Blutdruck', p: 'BLUT-druck', k: 'Kardiologie', d: 'Druck des Blutes auf die Arterienwände; gemessen in mmHg, angegeben als systolisch/diastolisch.', wz: '<strong>dt.</strong> Blut + Druck', b: 'Normalwert: <120/<80 mmHg. Hypertonie: ≥140/90 mmHg.' },
  { w: 'Bronchitis', p: 'bron-CHI-tis', k: 'Pneumologie', d: 'Entzündung der Bronchialschleimhaut; akut (meist viral) oder chronisch (produktiver Husten ≥3 Monate in 2 Jahren).', wz: '<strong>gr.</strong> bronchos = Luftröhre + -itis = Entzündung', b: 'Chronische Bronchitis als Teil der COPD: meist durch Rauchen verursacht.' },
  { w: 'Bronchospasmus', p: 'bron-cho-SPAS-mus', k: 'Pneumologie', d: 'Krampfhafte Verengung der Bronchien durch Kontraktion der glatten Muskulatur; typisches Zeichen bei Asthma.', wz: '<strong>gr.</strong> bronchos = Luftröhre + spasmos = Krampf', b: 'Symptome: Giemen, Pfeifen, Dyspnoe. Therapie: Beta-2-Sympathomimetika (Salbutamol) zur Bronchodilatation.' },
  { w: 'Bulimie', p: 'bu-li-MIE', k: 'Psychiatrie', d: 'Ess-Brech-Sucht; Essstörung mit wiederkehrenden Essanfällen, gefolgt von kompensatorischem Verhalten (Erbrechen, Abführmittel).', wz: '<strong>gr.</strong> boulimia = Ochsenhunger (bous = Ochse + limos = Hunger)', b: 'Komplikationen: Elektrolytstörungen (Hypokaliämie), Schädigung des Zahnschmelzes durch Magensäure.' },
  { w: 'Bypass', p: 'BY-pass', k: 'Kardiologie', d: 'Umgehungsoperation; chirurgische Umleitung des Blutflusses an einem verengten oder verstopften Gefäß vorbei.', wz: '<strong>engl.</strong> by = vorbei + pass = führen', b: 'Koronarer Bypass (CABG): Venentransplantate oder Arterien überbrücken stenosierte Koronararterien.' },
  // ── Zusätzliche Begriffe C ──
  { w: 'Carboplatin', p: 'kar-bo-PLA-tin', k: 'Onkologie', d: 'Platinhaltiges Zytostatikum zur Chemotherapie; DNA-Quervernetzung führt zu Apoptose der Tumorzellen.', wz: '<strong>lat.</strong> carbo = Kohle (Kohlenstoff im Molekül) + Platin', b: 'Einsatz bei Ovarial-, Lungen- und Blasenkarzinom. Nephrotoxizität geringer als bei Cisplatin.' },
  { w: 'Cholangitis', p: 'cho-lan-GI-tis', k: 'Gastroenterologie', d: 'Entzündung der Gallenwege; meist bakteriell aufsteigend bei Gallenabflussstörung.', wz: '<strong>gr.</strong> chole = Galle + angeion = Gefäß + -itis', b: 'Charcot-Trias: Ikterus + Fieber mit Schüttelfrost + rechtsseitiger Oberbauchschmerz.' },
  { w: 'Cholezystitis', p: 'cho-le-zys-TI-tis', k: 'Gastroenterologie', d: 'Gallenblasenentzündung; meist durch Gallensteine verursacht; Gefahr der Perforation.', wz: '<strong>gr.</strong> chole = Galle + kystis = Blase + -itis', b: 'Murphy-Zeichen: Schmerzhafte Unterbrechung der Inspiration bei Palpation unter dem rechten Rippenbogen.' },
  { w: 'Claudicatio intermittens', p: 'klau-di-KA-tio in-ter-MIT-tens', k: 'Kardiologie', d: 'Schaufensterkrankheit; belastungsabhängige Wadenschmerzen bei pAVK durch Durchblutungsstörung.', wz: '<strong>lat.</strong> claudicare = hinken + intermittere = unterbrechen', b: 'Stadium IIb nach Fontaine: schmerzfreie Gehstrecke <200 m → Therapie: Gehtraining, Revaskularisation.' },
  { w: 'Colitis ulcerosa', p: 'ko-LI-tis ul-ze-RO-sa', k: 'Gastroenterologie', d: 'Chronisch-entzündliche Darmerkrankung mit kontinuierlicher Ulzeration der Dickdarmschleimhaut; beginnt im Rektum.', wz: '<strong>lat.</strong> colon = Dickdarm + gr. -itis + lat. ulcus = Geschwür', b: 'Blutig-schleimige Durchfälle, Tenesmen; erhöhtes Kolonkarzinomrisiko bei langjährigem Verlauf.' },
  { w: 'Commotio cerebri', p: 'kom-MO-tio ZE-re-bri', k: 'Neurologie', d: 'Gehirnerschütterung; leichtes Schädel-Hirn-Trauma mit kurzer Bewusstlosigkeit (<15 min) ohne strukturelle Schädigung.', wz: '<strong>lat.</strong> commotio = Erschütterung + cerebrum = Gehirn', b: 'Symptome: Kopfschmerzen, retrograde Amnesie, Übelkeit. CT unauffällig.' },
  { w: 'Compliance (Lungencompliance)', p: 'kom-PLI-ans', k: 'Pneumologie', d: 'Dehnbarkeit der Lunge; Volumenänderung pro Druckänderung. Vermindert bei Fibrose, erhöht bei Emphysem.', wz: '<strong>lat.</strong> complire = erfüllen', b: 'Verminderte Compliance → steife Lunge → restriktive Ventilationsstörung.' },
  { w: 'Cor pulmonale', p: 'kor pul-mo-NA-le', k: 'Kardiologie', d: 'Rechtsherzvergrößerung/-insuffizienz durch chronische Lungenerkrankung oder Pulmonale Hypertonie.', wz: '<strong>lat.</strong> cor = Herz + pulmo = Lunge', b: 'Ursachen: COPD, Lungenembolie, Lungenfibrose → pulmonale Hypertonie → Rechtsherzbelastung.' },
  { w: 'CRP', p: 'C-R-P', k: 'Diagnostik', d: 'C-reaktives Protein; Akute-Phase-Protein der Leber; unspezifischer Entzündungsmarker, steigt rasch bei Infektionen und Gewebeschäden.', wz: 'Benannt nach Präzipitation mit C-Polysaccharid von Pneumokokken', b: 'CRP reagiert schneller als BSG; Normwert <5 mg/l; bei bakterieller Infektion oft >100 mg/l.' },
  { w: 'Cyanose', p: 'cy-a-NO-se', k: 'Kardiologie', d: 'Blauverfärbung von Haut und Schleimhäuten durch vermehrtes desoxygeniertesHämoglobin (>5 g/dl).', wz: '<strong>gr.</strong> kyanos = blau', b: 'Zentrale Cyanose: Hypoxämie (Lippen, Zunge). Periphere Cyanose: verminderte Durchblutung (Akren, kalt).' },
  // ── Zusätzliche Begriffe D ──
  { w: 'Dekompensation', p: 'de-kom-pen-SA-tion', k: 'Allgemein', d: 'Versagen von Kompensationsmechanismen; ein Organ kann seine Funktion nicht mehr aufrechterhalten.', wz: '<strong>lat.</strong> de = weg + compensare = ausgleichen', b: 'Kardiale Dekompensation: Herzinsuffizienz mit Ödemen, Dyspnoe, Pleuraerguss.' },
  { w: 'Demenz', p: 'de-MENZ', k: 'Neurologie', d: 'Erworbener, fortschreitender Verlust kognitiver Fähigkeiten (Gedächtnis, Denken, Orientierung) mit Beeinträchtigung der Alltagsfunktionen.', wz: '<strong>lat.</strong> dementia = Unvernunft (de = weg + mens = Geist)', b: 'Häufigste Form: Alzheimer-Demenz (60-70%). Weitere: vaskuläre Demenz, Lewy-Körper-Demenz.' },
  { w: 'Depression', p: 'de-pres-SION', k: 'Psychiatrie', d: 'Psychische Erkrankung mit gedrückter Stimmung, Interessenverlust, Antriebsminderung, oft mit somatischen Symptomen.', wz: '<strong>lat.</strong> deprimere = niederdrücken', b: 'Leitsymptome: Niedergeschlagenheit, Anhedonie, Schlafstörungen, Suizidgedanken; Therapie: Antidepressiva + Psychotherapie.' },
  { w: 'Dermatom', p: 'der-ma-TOM', k: 'Anatomie', d: 'Hautareal, das von einem einzelnen Spinalnerv sensibel versorgt wird.', wz: '<strong>gr.</strong> derma = Haut + tomos = Schnitt', b: 'Herpes Zoster breitet sich typisch in einem Dermatom aus (Gürtelrose).' },
  { w: 'Dextrokardie', p: 'dex-tro-kar-DIE', k: 'Anatomie', d: 'Lage des Herzens auf der rechten Thoraxseite; kann isoliert oder Teil eines Situs inversus sein.', wz: '<strong>lat.</strong> dexter = rechts + gr. kardia = Herz', b: 'Bei Situs inversus totalis sind alle Organe spiegelverkehrt angeordnet.' },
  { w: 'Dialyse', p: 'di-a-LY-se', k: 'Nephrologie', d: 'Blutreinigungsverfahren bei Nierenversagen; Hämodialyse (extrakorporal) oder Peritonealdialyse (über Bauchfell).', wz: '<strong>gr.</strong> dialysis = Auflösung, Trennung', b: 'Hämodialyse: 3x wöchentlich 4-5 Stunden; entfernt harnpflichtige Substanzen und überschüssiges Wasser.' },
  { w: 'Dilatation', p: 'di-la-TA-tion', k: 'Pathologie', d: 'Erweiterung eines Hohlorgans oder Gefäßes; pathologisch oder therapeutisch herbeigeführt.', wz: '<strong>lat.</strong> dilatare = ausbreiten', b: 'Dilatative Kardiomyopathie: pathologische Erweiterung der Herzkammern mit reduzierter Pumpleistung.' },
  { w: 'Diplegie', p: 'di-PLE-gie', k: 'Neurologie', d: 'Lähmung symmetrischer Körperteile (z.B. beider Beine oder beider Arme).', wz: '<strong>gr.</strong> di = zwei + plege = Schlag, Lähmung', b: 'Infantile Zerebralparese: spastische Diplegie betrifft v.a. beide Beine.' },
  { w: 'Divertikel', p: 'di-ver-TI-kel', k: 'Gastroenterologie', d: 'Ausstülpung der Darmwand; häufig im Sigma. Divertikulose = viele Divertikel. Divertikulitis = Entzündung.', wz: '<strong>lat.</strong> diverticulum = Abweg, Nebenwege', b: 'Sigma-Divertikulitis: linksseitige Bauchschmerzen, Fieber, Leukozytose. Komplikation: Perforation.' },
  { w: 'Dorsal', p: 'dor-SAL', k: 'Anatomie', d: 'Rückenseitig gelegen; zum Rücken hin. Gegenteil: ventral.', wz: '<strong>lat.</strong> dorsum = Rücken', b: 'Die dorsale Wurzel des Spinalnervs enthält afferente (sensorische) Fasern.' },
  { w: 'Ductus', p: 'DUK-tus', k: 'Anatomie', d: 'Gang, Rohr, Kanal; Verbindungsstruktur zum Transport von Sekreten oder anderen Flüssigkeiten.', wz: '<strong>lat.</strong> ductus = Führung, Leitung', b: 'Ductus choledochus: gemeinsamer Gallengang; Ductus pancreaticus: Bauchspeicheldrüsengang.' },
  { w: 'Duodenum', p: 'du-o-DE-num', k: 'Anatomie', d: 'Zwölffingerdarm; erster Teil des Dünndarms, ca. 25-30 cm lang; Mündung von Gallen- und Pankreasgang.', wz: '<strong>lat.</strong> duodeni = je zwölf (12 Fingerbreiten lang)', b: 'Ulcus duodeni: Geschwür im Zwölffingerdarm, häufiger als Ulcus ventriculi; nächtlicher Schmerz.' },
  { w: 'Dysfunktion', p: 'dys-FUNK-tion', k: 'Allgemein', d: 'Funktionsstörung; eingeschränkte oder gestörte Funktion eines Organs oder Systems.', wz: '<strong>gr.</strong> dys = schlecht + lat. functio = Verrichtung', b: 'Erektile Dysfunktion: Unfähigkeit, eine für den Geschlechtsverkehr ausreichende Erektion zu erreichen oder aufrechtzuerhalten.' },
  { w: 'Dysmenorrhoe', p: 'dys-me-nor-RÖ', k: 'Gynäkologie', d: 'Schmerzhafte Regelblutung; primär (ohne organische Ursache) oder sekundär (z.B. bei Endometriose).', wz: '<strong>gr.</strong> dys = schlecht + men = Monat + rhein = fließen', b: 'Therapie: NSAR (Ibuprofen), hormonelle Kontrazeptiva, Wärmeanwendung.' },
  { w: 'Dysurie', p: 'dys-U-rie', k: 'Urologie', d: 'Schmerzhaftes, erschwertes Wasserlassen; typisches Symptom einer Harnwegsinfektion.', wz: '<strong>gr.</strong> dys = schlecht + ouron = Urin', b: 'Dysurie + Pollakisurie + Brennen = typische Trias der unkomplizierten Zystitis.' },
  // ── Zusätzliche Begriffe E ──
  { w: 'EKG', p: 'E-K-G', k: 'Kardiologie', d: 'Elektrokardiogramm; Aufzeichnung der elektrischen Herzaktivität über Hautelektroden.', wz: '<strong>gr.</strong> elektron = Bernstein + kardia = Herz + gramma = Schrift', b: '12-Kanal-EKG: Standarddiagnostik bei Brustschmerzen; zeigt Herzrhythmus, Ischämiezeichen, Infarktmuster.' },
  { w: 'Eklampsie', p: 'ek-LAMP-sie', k: 'Gynäkologie', d: 'Lebensbedrohliche Schwangerschaftskomplikation mit Krampfanfällen bei einer Frau mit Präeklampsie.', wz: '<strong>gr.</strong> eklampsis = Aufblitzen', b: 'Präeklampsie: Hypertonie + Proteinurie ab der 20. SSW; Eklampsie: + tonisch-klonische Krämpfe → Notfall.' },
  { w: 'Elektrolyte', p: 'e-lek-tro-LY-te', k: 'Physiologie', d: 'Geladene Ionen in Körperflüssigkeiten; wichtig für Nervenleitung, Muskelkontraktion, Wasserhaushalt.', wz: '<strong>gr.</strong> elektron = Bernstein + lyein = lösen', b: 'Wichtige Elektrolyte: Na⁺, K⁺, Ca²⁺, Mg²⁺, Cl⁻, HCO₃⁻. Störungen: Hypo-/Hyperkaliämie, -natriämie, -kalzämie.' },
  { w: 'Emphysem', p: 'em-phy-SEM', k: 'Pneumologie', d: 'Irreversible Erweiterung und Zerstörung der Alveolarwände mit Luftansammlung; Teil der COPD.', wz: '<strong>gr.</strong> emphysema = Aufblähung', b: 'Fassthorax, hypersonorer Klopfschall, abgeschwächtes Atemgeräusch; häufigste Ursache: Rauchen.' },
  { w: 'Encephalitis', p: 'en-ce-pha-LI-tis', k: 'Neurologie', d: 'Entzündung des Gehirns; meist viral (Herpes simplex, FSME); Symptome: Fieber, Bewusstseinsstörung, Krampfanfälle.', wz: '<strong>gr.</strong> enkephalos = Gehirn + -itis = Entzündung', b: 'Herpes-Encephalitis: häufigste sporadische virale Encephalitis; Therapie: sofort Aciclovir i.v.' },
  { w: 'Endokard', p: 'en-do-KARD', k: 'Anatomie', d: 'Herzinnenhaut; Endothelschicht, die Herzinnenraum und Herzklappen auskleidet.', wz: '<strong>gr.</strong> endon = innen + kardia = Herz', b: 'Endokarditis: Entzündung des Endokards, meist bakteriell; betrifft v.a. die Herzklappen.' },
  { w: 'Endokrin', p: 'en-do-KRIN', k: 'Physiologie', d: 'In das Blut absondernd; endokrine Drüsen geben Hormone direkt ins Blut ab (ohne Ausführungsgang).', wz: '<strong>gr.</strong> endon = innen + krinein = absondern', b: 'Endokrine Drüsen: Hypophyse, Schilddrüse, Nebenniere, Pankreas (endokriner Anteil = Langerhans-Inseln), Gonaden.' },
  { w: 'Endometriose', p: 'en-do-me-tri-O-se', k: 'Gynäkologie', d: 'Auftreten von Gebärmutterschleimhaut (Endometrium) außerhalb der Gebärmutter; verursacht zyklische Schmerzen und Infertilität.', wz: '<strong>gr.</strong> endon = innen + metra = Gebärmutter + -osis = Zustand', b: 'Häufige Lokalisationen: Ovarien, Douglas-Raum, Ligg. sacrouterina; Goldstandard: diagnostische Laparoskopie.' },
  { w: 'Endoskopie', p: 'en-do-sko-PIE', k: 'Diagnostik', d: 'Untersuchung von Körperhöhlen mit optischen Instrumenten (Endoskopen).', wz: '<strong>gr.</strong> endon = innen + skopein = schauen', b: 'Gastroskopie (Magenspiegelung), Koloskopie (Darmspiegelung), Bronchoskopie (Atemwegsspiegelung).' },
  { w: 'Enzephalopathie', p: 'en-ze-pha-lo-pa-THIE', k: 'Neurologie', d: 'Diffuse Hirnfunktionsstörung verschiedener Ursachen; äußert sich in Bewusstseins- und Verhaltensänderungen.', wz: '<strong>gr.</strong> enkephalos = Gehirn + pathos = Leiden', b: 'Hepatische Enzephalopathie: Hirnfunktionsstörung bei Leberversagen durch Ammoniakanstieg.' },
  { w: 'Eosinophilie', p: 'e-o-si-no-phi-LIE', k: 'Hämatologie', d: 'Vermehrung der eosinophilen Granulozyten im Blut (>500/µl); bei Parasitosen, Allergien, manchen Autoimmunerkrankungen.', wz: '<strong>gr.</strong> eos = Morgenröte (rötliche Färbung) + philein = lieben', b: 'Merksatz für Eosinophilie: NAACP (Neoplasie, Allergie, Asthma, Colitis, Parasiten).' },
  { w: 'Epistaxis', p: 'e-pi-STAK-sis', k: 'HNO', d: 'Nasenbluten; Blutung aus der Nasenschleimhaut, meist aus dem Locus Kiesselbachii (vorderes Septum).', wz: '<strong>gr.</strong> epistazo = herabtropfen', b: 'Ursachen: Trauma, Hypertonie, Gerinnungsstörung, trockene Schleimhaut. Erstmaßnahme: Nasenflügel komprimieren, Kopf nach vorn.' },
  { w: 'Erosion', p: 'e-RO-sion', k: 'Pathologie', d: 'Oberflächlicher Schleimhautdefekt, der nur die Mukosa betrifft und ohne Narbenbildung abheilt.', wz: '<strong>lat.</strong> erodere = wegnagen', b: 'Im Gegensatz zum Ulkus (Geschwür) reicht die Erosion nicht bis in die Submukosa.' },
  { w: 'Erysipel', p: 'e-ry-SI-pel', k: 'Dermatologie', d: 'Wundrose; akute bakterielle Hautinfektion durch β-hämolysierende Streptokokken mit scharfbegrenzter Rötung.', wz: '<strong>gr.</strong> erythros = rot + pella = Haut', b: 'Scharf begrenzte, überwärmte Rötung mit Fieber; häufig am Unterschenkel; Therapie: Penicillin.' },
  { w: 'Exazerbation', p: 'ex-a-zer-ba-TION', k: 'Allgemein', d: 'Akute Verschlechterung einer chronischen Erkrankung; akuter Schub.', wz: '<strong>lat.</strong> exacerbare = verschärfen', b: 'Akute Exazerbation der COPD: Zunahme von Dyspnoe, Husten und Auswurf; häufig durch Infekte ausgelöst.' },
  { w: 'Exsikkose', p: 'ek-si-KO-se', k: 'Physiologie', d: 'Austrocknung; schwerer Flüssigkeitsmangel des Körpers.', wz: '<strong>lat.</strong> ex = aus + siccus = trocken', b: 'Zeichen: trockene Schleimhäute, stehende Hautfalten, Tachykardie, Oligurie, Verwirrtheit (v.a. bei Älteren).' },
  { w: 'Extrasystole', p: 'extra-sys-TO-le', k: 'Kardiologie', d: 'Zusätzlicher, vorzeitiger Herzschlag außerhalb des normalen Rhythmus.', wz: '<strong>lat.</strong> extra = außerhalb + gr. systole = Zusammenziehung', b: 'Supraventrikuläre ES (SVES) oder ventrikuläre ES (VES); oft harmlos, bei Häufung abklärungsbedürftig.' },
  // ── Zusätzliche Begriffe F ──
  { w: 'Faszie', p: 'FAS-zie', k: 'Anatomie', d: 'Bindegewebige Hülle, die Muskeln, Organe und andere Strukturen umgibt und zusammenhält.', wz: '<strong>lat.</strong> fascia = Binde, Band', b: 'Faszien bilden Gleitebenen zwischen Muskeln und übertragen Kraft.' },
  { w: 'Febrile Krampfanfälle', p: 'fe-BRI-le KRAMPF-an-fäl-le', k: 'Pädiatrie', d: 'Krampfanfälle bei fieberhaften Infekten im Kindesalter (meist 6 Monate bis 5 Jahre); meist harmlos.', wz: '<strong>lat.</strong> febris = Fieber', b: 'Einfache Fieberkrämpfe: generalisiert, <15 min, keine Residuen; kompliziert: fokal, >15 min oder rezidivierend.' },
  { w: 'Fieber', p: 'FIE-ber', k: 'Allgemein', d: 'Erhöhung der Körperkerntemperatur über 38,0°C; Abwehrreaktion des Körpers auf Infektionen oder Entzündungen.', wz: '<strong>lat.</strong> febris = Fieber', b: 'Subfebrile Temperatur: 37,5-38°C; Fieber: >38°C; hohes Fieber: >39°C; Hyperpyrexie: >41°C.' },
  { w: 'Fibrose', p: 'fi-BRO-se', k: 'Pathologie', d: 'Vermehrte Bildung von Bindegewebe als Reaktion auf chronische Schädigung; führt zu Organverhärtung und Funktionseinschränkung.', wz: '<strong>lat.</strong> fibra = Faser + gr. -osis', b: 'Lungenfibrose, Leberfibrose (Vorstufe der Zirrhose), Myokardfibrose nach Infarkt.' },
  { w: 'Fissur', p: 'fis-SUR', k: 'Anatomie', d: 'Spalte, Rinne, Riss; natürliche Furche an Organen oder pathologischer Riss in Gewebe.', wz: '<strong>lat.</strong> fissura = Spalte', b: 'Analfissur: schmerzhafter, oberflächlicher Längsriss im Analkanal.' },
  { w: 'Flatulenz', p: 'fla-tu-LENZ', k: 'Gastroenterologie', d: 'Vermehrte Darmgasbildung mit Blähungen und Windabgang.', wz: '<strong>lat.</strong> flatus = Wind, Hauch', b: 'Ursachen: Nahrungsmittel, Laktoseintoleranz, bakterielle Fehlbesiedlung, Malabsorption.' },
  { w: 'Folsäure', p: 'FOL-säu-re', k: 'Hämatologie', d: 'Vitamin B9; essentiell für DNA-Synthese und Zellteilung; wichtig für Erythropoese und Neuralrohrentiwicklung des Fetus.', wz: '<strong>lat.</strong> folium = Blatt (in grünem Blattgemüse enthalten)', b: 'Folsäuremangel → megaloblastäre Anämie; in der Schwangerschaft → Neuralrohrdefekte (Spina bifida).' },
  { w: 'Frakturtypen', p: 'FRAK-tur-ty-pen', k: 'Orthopädie', d: 'Verschiedene Arten von Knochenbrüchen nach Form und Entstehung.', wz: '<strong>lat.</strong> fractura = Bruch', b: 'Quer-, Schräg-, Spiral-, Trümmer-, Grünholz-, pathologische Fraktur.' },

  { w: 'Myalgie', p: 'my-AL-gie', k: 'Orthopädie', d: 'Muskelschmerz; kann lokal oder generalisiert auftreten.', wz: '<strong>gr.</strong> mys = Muskel + algos = Schmerz', b: 'Häufig bei Virusinfekten (Grippe); auch bei Statineinnahme (Myopathie) oder Fibromyalgie.' },

  // ── Zusätzliche Begriffe N ──

  // ── Zusätzliche Begriffe O ──

  { w: 'Pneumothorax', p: 'pneu-mo-THO-rax', k: 'Pneumologie', d: 'Luft im Pleuraspalt; führt zum Lungenkollaps; spontan, traumatisch oder iatrogen.', wz: '<strong>gr.</strong> pneuma = Luft + thorax = Brustkorb', b: 'Spannungspneumothorax: Notfall mit Mediastinalverschiebung; Zeichen: Atemnot, einseitig fehlendes AG.' },
  { w: 'Pollakisurie', p: 'pol-la-ki-su-RIE', k: 'Urologie', d: 'Häufiges Wasserlassen in kleinen Portionen; bei Zystitis, BPH, überaktiver Blase.', wz: '<strong>gr.</strong> pollakis = oft + ouron = Urin', b: 'Unterschied Polyurie: große Gesamtmenge; Pollakisurie: häufig, aber kleine Portionen.' },
  { w: 'Polyurie', p: 'po-ly-U-rie', k: 'Nephrologie', d: 'Vermehrte Harnausscheidung (>3 Liter/Tag); bei Diabetes mellitus, Diabetes insipidus, erhöhter Flüssigkeitszufuhr.', wz: '<strong>gr.</strong> polys = viel + ouron = Urin', b: 'Polyurie + Polydipsie + Polyphagie = klassische Trias bei unkontrolliertem Diabetes mellitus.' },

  { w: 'Prolaps', p: 'pro-LAPS', k: 'Pathologie', d: 'Vorfall; Austritt eines Organs oder Gewebes aus seiner normalen Position.', wz: '<strong>lat.</strong> prolabi = herausgleiten', b: 'Bandscheibenprolaps (Nucleus pulposus drückt auf Nerv), Gebärmutterprolaps, Rektumprolaps.' },

let termInitialized = false;
let activeCatFilter = 'Alle';
let activeAlphaFilter = '';
let currentSpeech = null;
let currentSpeakBtn = null;

function initTerminologie() {
  if (termInitialized) return;
  termInitialized = true;

  // TTS-Check NICHT beim Laden anzeigen — iOS Safari benötigt User-Gesture.
  // Speak-Buttons bleiben sichtbar; bei erstem Klick wird degradiert.

  // Stats
  const cats = [...new Set(GLOSSAR.map(g => g.k))].sort();
  document.getElementById('term-stats').innerHTML =
    `<strong>${GLOSSAR.length}</strong> Begriffe<br>${cats.length} Kategorien`;

  // Category buttons
  const catEl = document.getElementById('term-cats');
  ['Alle', ...cats].forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'term-cat-btn' + (cat === 'Alle' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCatFilter = cat; activeAlphaFilter = ''; renderGlossar(); updateCatBtns(); updateAlphaBtns(); };
    catEl.appendChild(btn);
  });

  buildAlphaBtns();
  renderGlossar();
}

function buildAlphaBtns() {
  const used = new Set(GLOSSAR.map(g => g.w[0].toUpperCase()));
  const alphaEl = document.getElementById('term-alpha');
  alphaEl.innerHTML = '';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'term-alpha-btn' + (used.has(l) ? '' : ' inactive') + (l === activeAlphaFilter ? ' active' : '');
    btn.textContent = l;
    btn.dataset.letter = l;
    btn.onclick = () => {
      activeAlphaFilter = activeAlphaFilter === l ? '' : l;
      document.getElementById('term-search').value = '';
      renderGlossar(); updateAlphaBtns();
    };
    alphaEl.appendChild(btn);
  });
}

function updateCatBtns() {
  document.querySelectorAll('.term-cat-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === activeCatFilter);
  });
}
function updateAlphaBtns() {
  document.querySelectorAll('.term-alpha-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.letter === activeAlphaFilter);
  });
}

function filterGlossar() {
  activeAlphaFilter = '';
  updateAlphaBtns();
  const val = document.getElementById('term-search').value;
  document.getElementById('term-clear').style.display = val ? 'block' : 'none';
  renderGlossar();
}
function clearSearch() {
  document.getElementById('term-search').value = '';
  document.getElementById('term-clear').style.display = 'none';
  renderGlossar();
}

function renderGlossar() {
  const search = document.getElementById('term-search').value.trim().toLowerCase();
  let items = GLOSSAR;

  // Apply filters
  if (activeCatFilter !== 'Alle') items = items.filter(g => g.k === activeCatFilter);
  if (activeAlphaFilter) items = items.filter(g => g.w[0].toUpperCase() === activeAlphaFilter);
  if (search) items = items.filter(g =>
    g.w.toLowerCase().includes(search) ||
    g.d.toLowerCase().includes(search) ||
    g.k.toLowerCase().includes(search)
  );

  const list = document.getElementById('term-list');

  if (!items.length) {
    list.innerHTML = '<div class="term-empty"><div>🔍</div>Keine Begriffe gefunden.</div>';
    return;
  }

  // Group by first letter
  const groups = {};
  items.sort((a,b) => a.w.localeCompare(b.w, 'de')).forEach(g => {
    const l = g.w[0].toUpperCase();
    if (!groups[l]) groups[l] = [];
    groups[l].push(g);
  });

  list.innerHTML = Object.keys(groups).sort().map(letter => `
    <div class="term-letter-group" id="alpha-${letter}">
      <div class="term-letter-heading">${letter}</div>
      ${groups[letter].map((g, i) => renderEntry(g, letter + i)).join('')}
    </div>`).join('');
}

function renderEntry(g, uid) {
  const col = CAT_COLORS[g.k] || CAT_COLORS['Allgemein'];
  return `
    <div class="term-entry" id="entry-${uid}">
      <div class="term-entry-head" onclick="toggleEntry('${uid}')">
        <button class="term-speak-btn" id="speak-${uid}"
          onclick="event.stopPropagation(); speakTerm('${escHtml(g.w)}', '${uid}')"
          title="Begriff vorlesen">🔊</button>
        <div class="term-entry-main">
          <div class="term-word">${g.w}</div>
          <div class="term-pronunciation">[${g.p}]</div>
        </div>
        <span class="term-category-tag" style="background:${col.bg}; color:${col.color};">${g.k}</span>
        <span class="term-chevron">▼</span>
      </div>
      <div class="term-entry-body">
        <div class="term-definition">${g.d}</div>
        ${g.wz ? `<div class="term-breakdown">🌱 <strong>Wortzerlegung:</strong> ${g.wz}</div>` : ''}
        ${g.b ? `<div class="term-example">${g.b}</div>` : ''}
      </div>
    </div>`;
}

function toggleEntry(uid) {
  const el = document.getElementById('entry-' + uid);
  el.classList.toggle('expanded');
}

function speakTerm(word, uid) {
  // iOS Safari: speechSynthesis.speak() nur in User-Gesture erlaubt
  if (!window.speechSynthesis) {
    // Gerät unterstützt kein TTS → Button dezent ausblenden
    const b = document.getElementById('speak-' + uid);
    if (b) b.style.display = 'none';
    return;
  }

  // Laufende Ausgabe stoppen
  window.speechSynthesis.cancel();
  if (currentSpeakBtn) currentSpeakBtn.classList.remove('speaking');

  const btn = document.getElementById('speak-' + uid);
  const utter = new SpeechSynthesisUtterance(word);

  // Fallback-Reihenfolge: Latein > Italienisch > Deutsch
  utter.lang = 'it-IT';
  utter.rate = 0.7;
  utter.pitch = 1;

  // Passende Stimme wählen
  const voices = window.speechSynthesis.getVoices();
  let voice = voices.find(v => v.lang.startsWith('la'))
           || voices.find(v => v.lang.startsWith('it'))
           || voices.find(v => v.lang.startsWith('de'));
  if (!voice) utter.lang = 'de-DE';
  if (voice) utter.voice = voice;

  // iOS-Bug: speechSynthesis bricht nach ~15 s ab → periodisch resume()
  let resumeTimer;
  utter.onstart = () => {
    btn.classList.add('speaking');
    currentSpeakBtn = btn;
    resumeTimer = setInterval(() => {
      if (speechSynthesis.speaking) speechSynthesis.resume();
      else clearInterval(resumeTimer);
    }, 10000);
  };
  const cleanup = () => {
    btn.classList.remove('speaking');
    btn.textContent = '🔊';
    currentSpeakBtn = null;
    clearInterval(resumeTimer);
  };
  utter.onend  = cleanup;
  utter.onerror = cleanup;

  window.speechSynthesis.speak(utter);
}

// Voices asynchron laden (Chrome / Firefox)
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => {};
}

// Dynamische Fallverwaltung
const DIAGNOSE_STORAGE_KEY = 'heilpraktiker_diagnose_cases';
const DIAGNOSE_JSON_FILE = 'diagnose-cases.json';
let externalCasesLoaded = false;

// Versuche externe JSON-Datei zu laden
async function loadExternalCases() {
  try {
    const response = await fetch(DIAGNOSE_JSON_FILE);
    if (response.ok) {
      const data = await response.json();
      let cases = [];
      
      // Unterstütze verschiedene Formate
      if (Array.isArray(data)) {
        cases = data;
      } else if (data.cases && Array.isArray(data.cases)) {
        cases = data.cases;
      }
      
      if (cases.length > 0) {
        // Speichere in localStorage (überschreibt vorhandene)
        localStorage.setItem(DIAGNOSE_STORAGE_KEY, JSON.stringify(cases));
        externalCasesLoaded = true;
        console.log(`${cases.length} Diagnose-Fälle aus JSON geladen`);
        
        // Aktualisiere Ansicht falls Diagnose-Spiel aktiv
        const diagnoseContent = document.getElementById('diagnose-content');
        if (diagnoseContent && diagnoseContent.innerHTML.includes('diagnose-case-grid')) {
          renderDiagnoseCaseSelection(diagnoseContent);
        }
        
        // Aktualisiere Admin falls aktiv
        const adminContent = document.getElementById('admin-content');
        if (adminContent && adminContent.innerHTML.includes('admin-cases-list')) {
          renderAdminCaseList(adminContent);
        }
        
        return true;
      }
    }
  } catch (e) {
    console.log('JSON-Datei konnte nicht geladen werden (normal bei lokalem Öffnen):', e.message);
  }
  return false;
}

function getDiagnoseCases() {
  try {
    const stored = localStorage.getItem(DIAGNOSE_STORAGE_KEY);
    if (stored) {
      const parsed = JSON.parse(stored);
      if (Array.isArray(parsed) && parsed.length > 0) {
        return parsed;
      }
    }
  } catch (e) {
    console.warn('Fehler beim Laden der Diagnose-Fälle:', e);
  }
  return DEFAULT_DIAGNOSE_CASES;
}

function saveDiagnoseCases(cases) {
  try {
    localStorage.setItem(DIAGNOSE_STORAGE_KEY, JSON.stringify(cases));
    return true;
  } catch (e) {
    console.error('Fehler beim Speichern:', e);
    return false;
  }
}

let currentDiagnoseCase = null;
let currentDiagnosePhase = 0;
let diagnoseAnswers = {};
let diagnoseScore = 0;
let currentDiagnoseFilter = 'all';

// Lade Kategorien aus der JSON
async function loadDiagnoseCategories() {
  try {
    const response = await fetch(DIAGNOSE_JSON_FILE);
    if (response.ok) {
      const data = await response.json();
      if (data.categories && Array.isArray(data.categories)) {
        diagnoseCategories = data.categories;
        localStorage.setItem('diagnose-categories', JSON.stringify(data.categories));
      }
    }
  } catch (e) {
    // Fallback auf localStorage
    const stored = localStorage.getItem('diagnose-categories');
    if (stored) {
      diagnoseCategories = JSON.parse(stored);
    }
  }
}

function getDiagnoseCategories() {
  if (diagnoseCategories.length > 0) return diagnoseCategories;
  const stored = localStorage.getItem('diagnose-categories');
  if (stored) {
    diagnoseCategories = JSON.parse(stored);
    return diagnoseCategories;
  }
  // Fallback: extrahiere Kategorien aus den Fällen
  const cases = getDiagnoseCases();
  const uniqueCategories = [...new Set(cases.map(c => c.categoryId))];
  return uniqueCategories.map(id => {
    const caseWithCat = cases.find(c => c.categoryId === id);
    return { id: id, name: caseWithCat?.category || id, icon: '📋', color: '#666' };
  });
}

function renderDiagnosePhase() {
  const container = document.getElementById('diagnose-content');
  const caseData = currentDiagnoseCase;
  const phase = caseData.phases[currentDiagnosePhase];

  const phasesHTML = caseData.phases.map((p, i) => {
    let cls = 'diagnose-phase';
    if (i < currentDiagnosePhase) cls += ' completed';
    if (i === currentDiagnosePhase) cls += ' active';
    return `<div class="${cls}">${p.title}</div>`;
  }).join('');

  const optionsHTML = phase.options.map((opt, i) => `
    <div class="diagnose-option" data-index="${i}" onclick="toggleDiagnoseOption(this, ${i})">
      <div class="diagnose-checkbox"></div>
      <div class="diagnose-option-text">${opt.text}</div>
    </div>
  `).join('');

  container.innerHTML = `
    <button class="back-btn" onclick="backToDiagnoseCases()">← Zurück zur Fallauswahl</button>
    <div class="diagnose-game">
      <div class="diagnose-header">
        <h2>${caseData.name}</h2>
        <div class="subtitle">${caseData.subtitle}</div>
        <div class="diagnose-phase-indicator">
          ${phasesHTML}
        </div>
      </div>
      <div class="diagnose-body">
        <div class="diagnose-scenario">
          <h3>👤 Patientenszenario</h3>
          <p>${caseData.scenario}</p>
        </div>
        <div class="diagnose-question">${phase.question}</div>
        <div class="diagnose-options" id="diagnose-options">
          ${optionsHTML}
        </div>
        <div class="diagnose-feedback" id="diagnose-feedback"></div>
        <div class="diagnose-actions">
          <button class="diagnose-btn diagnose-btn-primary" id="diagnose-check-btn" onclick="checkDiagnoseAnswer()">Antwort prüfen</button>
          <button class="diagnose-btn diagnose-btn-primary" id="diagnose-next-btn" onclick="nextDiagnosePhase()" style="display:none;">Weiter →</button>
        </div>
      </div>
    </div>
  `;
}

function toggleDiagnoseOption(el, index) {
  el.classList.toggle('selected');
  const checkbox = el.querySelector('.diagnose-checkbox');
  checkbox.textContent = el.classList.contains('selected') ? '✓' : '';
}

function checkDiagnoseAnswer() {
  const phase = currentDiagnoseCase.phases[currentDiagnosePhase];
  const options = document.querySelectorAll('.diagnose-option');
  const feedback = document.getElementById('diagnose-feedback');
  
  let correctCount = 0;
  let totalCorrect = phase.options.filter(o => o.correct).length;
  let wrongSelected = 0;

  options.forEach((opt, i) => {
    const isSelected = opt.classList.contains('selected');
    const isCorrect = phase.options[i].correct;

    if (isSelected && isCorrect) {
      opt.classList.add('correct');
      correctCount++;
    } else if (isSelected && !isCorrect) {
      opt.classList.add('incorrect');
      wrongSelected++;
    } else if (!isSelected && isCorrect) {
      opt.classList.add('correct');
    }
    opt.style.pointerEvents = 'none';
  });

  const score = Math.max(0, correctCount - wrongSelected);
  const maxScore = totalCorrect;
  diagnoseScore += score;
  diagnoseAnswers[phase.id] = { score, maxScore, correctCount, wrongSelected };

  let feedbackClass = 'success';
  let feedbackTitle = '✓ Sehr gut!';
  if (correctCount < totalCorrect || wrongSelected > 0) {
    if (correctCount >= totalCorrect / 2 && wrongSelected <= 1) {
      feedbackClass = 'partial';
      feedbackTitle = '◐ Teilweise richtig';
    } else {
      feedbackClass = 'error';
      feedbackTitle = '✗ Nicht ganz richtig';
    }
  }

  feedback.className = `diagnose-feedback show ${feedbackClass}`;
  feedback.innerHTML = `
    <h4>${feedbackTitle}</h4>
    <p>${phase.feedback}</p>
    <p style="margin-top:0.5rem;font-size:0.85rem;color:#888;">Punkte: ${score}/${maxScore} (${correctCount} richtig, ${wrongSelected} falsch ausgewählt)</p>
  `;

  document.getElementById('diagnose-check-btn').style.display = 'none';
  document.getElementById('diagnose-next-btn').style.display = 'inline-block';
}

function nextDiagnosePhase() {
  currentDiagnosePhase++;
  if (currentDiagnosePhase < currentDiagnoseCase.phases.length) {
    renderDiagnosePhase();
  } else {
    renderDiagnoseResult();
  }
}

function renderDiagnoseResult() {
  const container = document.getElementById('diagnose-content');
  const caseData = currentDiagnoseCase;
  
  let totalMax = 0;
  caseData.phases.forEach(p => {
    totalMax += p.options.filter(o => o.correct).length;
  });
  
  const percentage = Math.round((diagnoseScore / totalMax) * 100);
  let emoji = '🎓';
  let message = 'Ausgezeichnet! Du hast den Fall hervorragend gelöst.';
  if (percentage < 50) {
    emoji = '📚';
    message = 'Hier gibt es noch Lernbedarf. Wiederhole den Fall oder schau dir die Lernhinweise an.';
  } else if (percentage < 75) {
    emoji = '💪';
    message = 'Gut gemacht! Mit etwas Übung wirst du noch sicherer.';
  } else if (percentage < 90) {
    emoji = '🌟';
    message = 'Sehr gut! Du hast ein solides Verständnis des Krankheitsbildes.';
  }

  const summaryHTML = caseData.phases.map(p => {
    const answer = diagnoseAnswers[p.id] || { score: 0, maxScore: 0 };
    return `
      <div class="diagnose-summary-item">
        <span class="diagnose-summary-label">${p.title}:</span>
        <span class="diagnose-summary-value">${answer.score}/${answer.maxScore} Punkte</span>
      </div>
    `;
  }).join('');

  const hintsHTML = caseData.hints.map(h => `<li>${h}</li>`).join('');

  container.innerHTML = `
    <div class="diagnose-game">
      <div class="diagnose-result">
        <div class="diagnose-result-icon">${emoji}</div>
        <h2>Fall abgeschlossen: ${caseData.name}</h2>
        <div class="diagnose-result-score">${percentage}%</div>
        <p>${message}</p>
        
        <div class="diagnose-summary">
          <h3><i data-lucide="chart-line" style="width:18px;height:18px;stroke-width:1.8;vertical-align:middle;margin-right:6px;"></i>Deine Ergebnisse</h3>
          ${summaryHTML}
          <div class="diagnose-summary-item" style="border-top:2px solid #ddd;padding-top:0.8rem;margin-top:0.5rem;">
            <span class="diagnose-summary-label"><strong>Gesamt:</strong></span>
            <span class="diagnose-summary-value"><strong>${diagnoseScore}/${totalMax} Punkte</strong></span>
          </div>
        </div>

        <div class="diagnose-hints">
          <h4><i data-lucide="info" style="width:16px;height:16px;stroke-width:1.8;vertical-align:middle;margin-right:6px;"></i>Lernhinweise</h4>
          <ul>${hintsHTML}</ul>
        </div>

        <div class="diagnose-actions" style="justify-content:center;border:none;padding:0;">
          <button class="diagnose-btn diagnose-btn-secondary" onclick="startDiagnoseCase('${caseData.id}')">Fall wiederholen</button>
          <button class="diagnose-btn diagnose-btn-primary" onclick="backToDiagnoseCases()">Anderen Fall wählen</button>
        </div>
      </div>
    </div>
  `;
}

function backToDiagnoseCases() {
  currentDiagnoseCase = null;
  currentDiagnosePhase = 0;
  diagnoseAnswers = {};
  diagnoseScore = 0;
  const container = document.getElementById('diagnose-content');
  renderDiagnoseCaseSelection(container);
}
