  // ══════════════════════════════════════════════════════════════════
  // Fragen 1,3,5,6,12,15,16,18,20,22,23,25,27,28,30,31,33,34,36,38,39,40,42,44,46,47,48,51,52,54,55,56,57,58,59,60
  // sind Aussagenkombinationen → werden als Kombinationsfragen dargestellt (richtige Aussagen-Kombination)

  { cat: 'pruefung2023', q: '[FJ23/1] Ursachen für Nasenbluten (Epistaxis) können sein. Welche Aussagenkombination ist korrekt? (1=Nasenbeinfraktur, 2=Rhinitis sicca, 3=Art. Hypertonie, 4=Gerinnungsstörungen, 5=Virusinfektion)', opts: ['Nur 1 und 3','Nur 2, 4 und 5','Nur 1, 2, 3 und 4','Alle Aussagen sind richtig (1–5)'], ans: 3, exp: 'Lösung E – Alle Aussagen sind richtig. Epistaxis kann durch Trauma (Nasenbeinfraktur), trockene Schleimhaut (Rhinitis sicca), Hypertonie, Gerinnungsstörungen und virale Infekte ausgelöst werden.' },
  { cat: 'pruefung2023', q: '[FJ23/2] Welche Aussage zu Basaliomen trifft zu?', opts: ['Häufiger an den Extremitäten als im Gesicht','Imponiert zunächst als hautfarbenes, derbes Knötchen','Niemals pigmentiert','Häufigkeit sinkt mit zunehmendem Alter'], ans: 1, exp: 'Lösung B – Das Basaliom zeigt sich zunächst als hautfarbenes, derbes Knötchen, typischerweise im Gesicht an lichtexponierten Stellen. Es metastasiert kaum, wächst aber lokal invasiv.' },
  { cat: 'pruefung2023', q: '[FJ23/3] Welche Wirkungen entstehen durch eine längerfristige Kortikosteroidtherapie? (1=Osteoporose, 2=Diabetogene Wirkung, 3=Fettumverteilung, 4=Verzögerte Wundheilung / Infektanfälligkeit, 5=Allergieförderung)', opts: ['Nur 1 und 3','Nur 2 und 5','Nur 2, 3 und 4','Nur 1, 2, 3 und 4 – Lösung D'], ans: 3, exp: 'Lösung D – Langzeit-Kortison: Osteoporose, Diabetes, Fettumverteilung (Vollmondgesicht, Büffelnacken), verzögerte Wundheilung und erhöhte Infektanfälligkeit. Allergien werden NICHT gefördert.' },
  { cat: 'pruefung2023', q: '[FJ23/4] Welche zwei Aussagen zur Suizidalität treffen zu?', opts: ['Fragen nach Suizidgedanken erhöhen das Risiko / Suchtkranke sind nicht gefährdet','Suchtkranke sind erhöht gefährdet / In Deutschland sterben mehr Menschen an Suizid als im Verkehr','Plötzliche Ruhe ist immer ein Zeichen der Besserung / Nur wenige kündigen an','Nur wenige kündigen an / Fragen erhöhen das Risiko'], ans: 1, exp: 'Lösung B+E – Suchtkranke haben deutlich erhöhtes Suizidrisiko. In Deutschland sterben mehr Menschen durch Suizid als durch Verkehrsunfälle. Direkte Fragen erhöhen das Risiko NICHT.' },
  { cat: 'pruefung2023', q: '[FJ23/5] Ursachen für Hypokaliämie: Welche Aussagenkombination ist korrekt? (1=Laxantienabusus, 2=Saluretika z.B. Furosemid, 3=Hämolyse, 4=Addison, 5=Säure-Basen-Störung)', opts: ['Nur 1, 2 und 3','Nur 1, 2 und 5','Nur 1, 4 und 5','Nur 2, 3 und 4'], ans: 1, exp: 'Lösung B – Hypokaliämie durch Laxantien (Kaliumverlust über Darm), Schleifendiuretika (renal) und Säure-Basen-Störungen (Alkalose → K+ intrazellulär). Hämolyse und Addison → Hyperkaliämie.' },
  { cat: 'pruefung2023', q: '[FJ23/6] Welche zwei Aussagen zu Venen treffen zu?', opts: ['Pfortader gehört zum Venensystem / Lungenvenen enthalten sauerstoffarmes Blut','Pfortader gehört zum Venensystem / Venenklappen dienen zur Aufrechterhaltung des venösen Blutflusses','Obere Mesenterialvene mündet in V. cava / Flussrichtung am Bein ist von innen nach außen','Lungenvenen sauerstoffreich / Flussrichtung am Bein ist von außen nach innen'], ans: 1, exp: 'Lösung A+D – Die Pfortader ist eine Vene (führt Blut aus dem Darm zur Leber). Venenklappen verhindern Rückfluss und sorgen für gerichteten Blutfluss zum Herzen.' },
  { cat: 'pruefung2023', q: '[FJ23/7] Grundsätze der Sterilisation: Welche zwei Aussagen treffen zu?', opts: ['Trockene Hitze ist der Dampfsterilisation überlegen / Kein Reinigen nötig','Material muss nicht gereinigt werden / Große Packungen sind besser','Lagerung des Materials ist wichtig / Erfolg muss durch Indikatoren überprüft werden','Instrumente müssen nicht verpackt werden / Lagerung ist unwichtig'], ans: 2, exp: 'Lösung C+D – Vor Sterilisation muss gereinigt werden (Biofilm behindert den Prozess). Die Lagerung (z.B. in Sterilcontainern) ist entscheidend. Der Erfolg wird durch Bioindikatoren (Sporenpäckchen) geprüft.' },
  { cat: 'pruefung2023', q: '[FJ23/8] Zuordnung Erkrankung – Symptom: Welche zwei treffen zu?', opts: ['Phlebothrombose – blaurote Extremität / Thrombophlebitis – klassische Entzündungszeichen','Extremitätenembolie – überwärmte Extremität mit Puls / Lungenembolie – Leistenschmerz','Beckenvenenthrombose – chronischer Brustschmerz / Thrombophlebitis – keine Entzündung','Alle Zuordnungen sind falsch'], ans: 0, exp: 'Lösung A+D – Phlebothrombose (tiefe Venenthrombose): Zyanose, Schwellung, Schmerz. Thrombophlebitis (oberflächliche Venenentzündung): klassische Entzündungszeichen (Rubor, Calor, Dolor, Tumor).' },
  { cat: 'pruefung2023', q: '[FJ23/9] Ein fieberfreies Kleinkind zeigt plötzlich Husten und Atemnot. Wahrscheinlichste Diagnose?', opts: ['Asthma bronchiale','Tuberkulose','Fremdkörperaspiration','Pneumonie'], ans: 2, exp: 'Lösung C – Plötzlicher Husten + Atemnot ohne Fieber bei einem Kleinkind = Fremdkörperaspiration bis zum Beweis des Gegenteils. Sofortmaßnahme: Rückenklaps / Heimlich-Manöver.' },
  { cat: 'pruefung2023', q: '[FJ23/10] Laborparameter bei fortgeschrittener Lebererkrankung: Welche zwei treffen zu?', opts: ['Quick 35% (erniedrigt) / Bilirubin 4,5 mg/dl (erhöht)','Thrombozyten 348.000 (normal) / HbA1c 7,1% (erhöht)','Quick erniedrigt / Kalium normal','Bilirubin erhöht / Thrombozyten erhöht'], ans: 0, exp: 'Lösung A+E – Bei Leberinsuffizienz: Quick ↓ (Syntheseleistung ↓), Bilirubin ↑ (Ausscheidungsstörung). HbA1c, Thrombozyten und Kalium in den beschriebenen Werten sind nicht spezifisch.' },
  { cat: 'pruefung2023', q: '[FJ23/11] Einseitige Pupillenerweiterung – wahrscheinlichste Ursache?', opts: ['Drogeneinnahme (bilateral)','Vergiftung durch Pflanzenschutzmittel','Verschluss des Tränengangs','Subdurale Blutung'], ans: 3, exp: 'Lösung E – Einseitige Mydriasis = Druckschädigung des N. oculomotorius durch ipsilaterale Raumforderung (z.B. Epidural-/Subduralblutung, Tumor). Immer ein neurologischer Notfall!' },
  { cat: 'pruefung2023', q: '[FJ23/12] Welche Aussagen zur Gicht/Hyperurikämie treffen alle zu?', opts: ['Nur Großzehengrundgelenk und metabolisches Syndrom zusammen','Fasten + Fieber beim Anfall','Großzehe + metabol. Syndrom + Fasten als Auslöser + Fieber beim Anfall + asymptom. Hyperurikämie häufiger','Nur Fasten und asymptomatische Form'], ans: 2, exp: 'Lösung E – Alle Aussagen stimmen: Großzehengrundgelenk (Podagra), metabolisches Syndrom, Fasten als Auslöser, Fieber/Leukozytose beim Anfall, asymptomatische Hyperurikämie häufiger als manifeste Gicht.' },
  { cat: 'pruefung2023', q: '[FJ23/13] Welche Aussage zum Herz-Kreislauf-System trifft zu?', opts: ['Herzgewicht gesund ca. 800 g','RR < 100 mmHg muss immer behandelt werden','Vorhofflimmern braucht i.d.R. keine Therapie','Blasse kühle Füße und Gehschmerzen können Arteriosklerose-Zeichen sein'], ans: 3, exp: 'Lösung D – Claudicatio intermittens (Schaufensterkrankheit): blasse, kühle Beine und belastungsabhängige Schmerzen bei pAVK durch Arteriosklerose. Das Herzgewicht liegt bei ca. 300 g.' },
  { cat: 'pruefung2023', q: '[FJ23/14] Welche Aussage zur Lebensmittelvergiftung durch S. aureus trifft zu?', opts: ['Es ist eine direkte Infektion mit S. aureus','Die Toxine werden durch 30 min Erhitzen auf 100°C nicht zuverlässig zerstört','Krankheitsdauer meist 1 Woche','Antibiotika müssen schnell gegeben werden'], ans: 1, exp: 'Lösung B – S. aureus bildet hitzestabile Exotoxine (Enterotoxine), die auch durch Kochen nicht inaktiviert werden. Typisch: kurze Inkubation (1–6h), kurze Krankheitsdauer (< 24h), keine Antibiotika nötig.' },
  { cat: 'pruefung2023', q: '[FJ23/15] Epilepsie – Welche Aussagenkombination ist korrekt? (1=HirnSchaden beim Status möglich, 2=Chron. Psychosyndrom mögl., 3=Terminschlaf → Schocklage, 4=Hypoglykämie erhöht Anfallsrisiko, 5=Primär generalisiert immer mit Aura)', opts: ['Nur 1, 2 und 4 sind richtig','Nur 1, 2 und 5','Nur 1, 3 und 5','Nur 2, 3 und 4'], ans: 0, exp: 'Lösung A – Richtig: (1) Status epilepticus kann hypoxischen Hirnschaden verursachen, (2) Chronisch-organisches Psychosyndrom möglich, (4) Hypoglykämie senkt Anfallsschwelle. Falsch: (3) Terminschlaf → Seitenlage, nicht Schocklage; (5) Primär generalisierte Anfälle haben KEINE Aura.' },
  { cat: 'pruefung2023', q: '[FJ23/16] Positivsymptome der Schizophrenie: Welche Aussagen treffen zu? (1=Mangelnde Körperpflege, 2=Lautes Hören eigener Gedanken, 3=Antriebsmangel, 4=Verfolgungswahn, 5=Hypersomnie)', opts: ['Nur Aussage 1','Nur 2 und 4','Nur 1, 3 und 5','Nur 1, 2, 3 und 5'], ans: 1, exp: 'Lösung B – Positivsymptome (Produktivsymptome) der Schizophrenie: Wahnvorstellungen (Verfolgungswahn), Halluzinationen (Gedankenlautwerden). Antriebsmangel, Körperpflegevernachlässigung = Negativsymptome.' },
  { cat: 'pruefung2023', q: '[FJ23/17] Welche Aussage zum Stoffwechsel trifft zu?', opts: ['Glykogen wird vor allem in der Milz gespeichert','Galle wird in der Gallenblase produziert','Lipase wird von der Leber produziert','Glukagon steigert den Blutzuckerspiegel'], ans: 3, exp: 'Lösung D – Glukagon (aus α-Zellen des Pankreas) erhöht den Blutzucker durch Glykogenolyse und Glukoneogenese. Glykogen wird in Leber und Muskulatur gespeichert, Galle wird in der Leber produziert.' },
  { cat: 'pruefung2023', q: '[FJ23/18] TNM-Klassifikation berücksichtigt welche Parameter? (1=Alter, 2=Primärtumorgröße, 3=Hb-Wert, 4=Fernmetastasen, 5=Lymphknotenmetastasen)', opts: ['Nur 4','Nur 1 und 2','Nur 4 und 5','Nur 2, 4 und 5'], ans: 3, exp: 'Lösung D – TNM: T=Tumor (Größe/Ausdehnung), N=Nodus (Lymphknotenbefall), M=Metastasen (Fernmetastasen). Alter und Hb-Wert sind nicht Teil der TNM-Klassifikation.' },
  { cat: 'pruefung2023', q: '[FJ23/19] Fieber, Dyspnoe, gedämpfter Klopfschall, feinblasige Rasselgeräusche – wahrscheinlichste Diagnose?', opts: ['Lungenödem','Pneumonie','Asthmaanfall','Lungenemphysem'], ans: 1, exp: 'Lösung B – Pneumonie-Trias: Fieber + Dyspnoe + Dämpfung bei Perkussion + klingende (feuchte) Rasselgeräusche. Asthma: Giemen. Emphysem: hypersonorer Klopfschall. Ödem: bilateral, kein Fieber.' },
  { cat: 'pruefung2023', q: '[FJ23/20] Essstörungen – Welche Aussagen treffen zu? (1=Anorexie vor allem junge Männer, 2=Eiweißmangelödeme und Menstruationsstörungen, 3=Nur in der Pubertät, 4=Elektrolytstörungen bei Laxantien/Diuretika, 5=Karies als Hinweis auf Bulimie)', opts: ['Nur 1, 2 und 4','Nur 2, 3 und 5','Nur 2, 4 und 5','Nur 3, 4 und 5'], ans: 2, exp: 'Lösung C – Richtig: (2) Eiweißmangelödeme und Amenorrhoe, (4) Elektrolytstörungen durch Laxantien/Diuretika, (5) Karies durch Magensäure beim Erbrechen (Bulimie). Falsch: Anorexie betrifft vor allem junge Frauen; Essstörungen treten auch im Erwachsenenalter auf.' },
  { cat: 'pruefung2023', q: '[FJ23/21] Asthma bronchiale – Welche zwei Aussagen treffen zu?', opts: ['ASS und Betablocker können Anfall auslösen / Feuchte RGs charakteristisch','ASS+Betablocker als Auslöser / Unspezifische bronchiale Hyperaktivität','Hauptsächlich bei über 65-Jährigen / Atemwegswiderstand ist vermindert','Bronchiale Hyperaktivität / Hauptsächlich Geriatrie'], ans: 1, exp: 'Lösung A+C – ASS (NSAR) und Betablocker können Asthmaanfälle auslösen. Das hyperreaktive Bronchialsystem (unspezifische bronchiale Hyperreaktivität) ist das pathophysiologische Kernmerkmal. Typisch: Giemen, nicht feuchte RGs.' },
  { cat: 'pruefung2023', q: '[FJ23/22] Typische Symptome einer unkomplizierten Zystitis: (1=Harndrang, 2=Fieber+Schüttelfrost, 3=Schmerzen beim Wasserlassen, 4=Übelkeit/Erbrechen, 5=Häufiges Wasserlassen)', opts: ['Nur Aussage 3','Nur 1 und 3','Nur 1, 2 und 4','Nur 1, 3 und 5 – Lösung D'], ans: 3, exp: 'Lösung D – Unkomplizierte Zystitis: Pollakisurie (häufiges Wasserlassen), Dysurie (Schmerzen beim Wasserlassen), Harndrang. Fieber/Schüttelfrost weist auf Pyelonephritis hin.' },
  { cat: 'pruefung2023', q: '[FJ23/23] Namentlich meldepflichtige Krankheiten nach § 6 IfSG – Alle zutreffend? (1=Meningokokkensepsis, 2=Tollwut, 3=Akute Virushepatitis, 4=HUS, 5=Diphtherie)', opts: ['Nur 1 und 3','Nur 2, 4 und 5','Nur 1, 3, 4 und 5','Alle Aussagen sind richtig'], ans: 3, exp: 'Lösung E – Alle sind meldepflichtig nach § 6 IfSG: Meningokokkensepsis, Tollwut, akute Virushepatitis (A–E), HUS und Diphtherie bei Krankheitsverdacht, Erkrankung und Tod.' },
  { cat: 'pruefung2023', q: '[FJ23/24] Miosis (Pupillenverengung) ist zu erwarten bei: Welche zwei Antworten?', opts: ['Sympathikomimetika / Hypovolämischer Schock','Parasympathikomimetika / Binokulare Fixation eines nahen Gegenstandes','Enzephalitis / Drogen','Sympathikomimetika / Enzephalitis'], ans: 1, exp: 'Lösung B+E – Miosis durch Parasympathikusaktivierung (Miotika, Pilocarpin) und bei Nahakkommodation (Konvergenzreaktion). Sympathikomimetika → Mydriasis.' },
  { cat: 'pruefung2023', q: '[FJ23/25] Lagerung im Notfall: (1=Bauchtrauma – Rückenlage angez. Beine, 2=SHT – Kopftieflage, 3=Kardiogener Schock – OKHoch 30°, 4=Arterielle Embolie Bein – Hochlagerung, 5=Lungenödem – Stabile SL)', opts: ['Nur 1 und 2','Nur 1 und 3 – Lösung B','Nur 2 und 5','Nur 3 und 5'], ans: 1, exp: 'Lösung B – Bauchtrauma: Rückenlage, Knie unterlagert (entlastet Bauchdecke). Kardiogener Schock: Oberkörper 30° hoch (senkt Vorlast). Falsch: SHT → OKHoch, NICHT Kopftieflage; arterielle Embolie → tief lagern, nicht hochlagern.' },
  { cat: 'pruefung2023', q: '[FJ23/26] STIKO-empfohlene Impfungen: Welche zwei?', opts: ['Krätze / Hepatitis B','Hepatitis B / Windpocken','Borreliose / Mononukleose','Windpocken / Borreliose'], ans: 1, exp: 'Lösung B+D – STIKO empfiehlt u.a. Hepatitis B (Grundimmunisierung) und Varizellen (Windpocken). Gegen Borreliose, Mononukleose und Krätze gibt es keine STIKO-empfohlenen Impfungen.' },
  { cat: 'pruefung2023', q: '[FJ23/27] Wurmbefall – Welche Aussagenkombination ist korrekt? (1=Eosinophilie mögl., 2=Nur Darm befallen, 3=Analer Juckreiz bei Oxyuren, 4=Impfung gegen Würmer, 5=Leberzysten bei Hundebandwurm)', opts: ['Nur 2 und 4','Nur 1, 2 und 3','Nur 1, 3 und 5','Nur 3, 4 und 5'], ans: 2, exp: 'Lösung C – Richtig: Eosinophilie bei Wurmbefall, analer Juckreiz bei Enterobius (Madenwurm), Leberzysten bei Echinococcus granulosus (Hundebandwurm). Falsch: Auch Lunge, Leber etc. befallen; keine Impfung gegen Würmer.' },
  { cat: 'pruefung2023', q: '[FJ23/28] Hämorrhagische Diathese: Welche Aussagenkombination ist korrekt? (1=Petechien bei Thrombozytenmangel, 2=Hämarthros bei Gerinnungsfaktormangel, 3=Purpura senilis durch Quick↓, 4=Ausgedehnte Hämatome bei tiefer Thrombopenie, 5=Leberer → Synthesestörung)', opts: ['Nur 1 und 2','Nur 2 und 3','Nur 1, 2 und 5','Nur 3, 4 und 5'], ans: 2, exp: 'Lösung C – Petechien = Thrombozytenmangel. Hämarthros = Hämophilie (Faktorenmangel). Schwere Lebererkrankungen stören die Gerinnungsfaktorsynthese. Purpura senilis = Kollagenabbau, NICHT Quick-abhängig.' },
  { cat: 'pruefung2023', q: '[FJ23/29] Somatoforme autonome Funktionsstörung Herz/Kreislauf: Welche zwei Maßnahmen sind sinnvoll?', opts: ['Kognitive Verhaltenstherapie / Regelmäßiger Ausdauersport','Mehrfach tägl. RR-Messung / Wöchentliche Herzauskultation','Generelle körperliche Schonung / Protokollierung','Wöchentl. Auskultation / Protokollierung durch Patient'], ans: 0, exp: 'Lösung A+D – Bei funktionellen Herzstörungen: Kognitive Verhaltenstherapie (psychosomatisch) und regelmäßiger Ausdauersport sind evidenzbasiert sinnvoll. Häufige Messungen verstärken die Somatisierung.' },
  { cat: 'pruefung2023', q: '[FJ23/30] Zeichen einer intrakraniellen Druckerhöhung: (1=Schwallartiges Erbrechen, 2=Peroneuslähmung, 3=Doppelbilder, 4=Psychische Veränderung/Aggressivität, 5=Händitremor)', opts: ['Nur 1 und 2','Nur 3 und 4','Nur 1, 3 und 4 – Lösung C','Nur 2, 4 und 5'], ans: 2, exp: 'Lösung C – Hirndruckzeichen: Schwallartige Nüchternerbrechen (ohne Übelkeit), Doppelbilder (N. abducens-Parese), Bewusstseinstrübung/Persönlichkeitsveränderung. Kein Tremor, keine Peroneuslähmung.' },
  { cat: 'pruefung2023', q: '[FJ23/31] Sympathikus – Welche Aussagenkombination ist korrekt? (1=Gehört zum autonomen NS, 2=Gangliäre Überträgersubstanz = Serotonin, 3=Bronchialerweiterung, 4=Herzfrequenz↓, 5=Pupillenverengung)', opts: ['Nur Aussage 1','Nur 1 und 3 – Lösung B','Nur 3 und 4','Nur 2, 4 und 5'], ans: 1, exp: 'Lösung B – Sympathikus: gehört zum vegetativen NS (1 ✓), gangliärer Überträger = Acetylcholin (nicht Serotonin, 2 ✗), Bronchialerweiterung (β2, 3 ✓), Herzfrequenz↑ (nicht↓, 4 ✗), Pupillenerweiterung (Mydriasis, 5 ✗).' },
  { cat: 'pruefung2023', q: '[FJ23/32] Vitamine und Vitaminmangel: Welche zwei Aussagen treffen zu?', opts: ['Vit. B12-Mangel = Nierenerkrankung / Vit. C = fettlöslich','Vit. B12-Mangel kann zu neurol. Symptomen führen / Vit. K-Mangel → Gerinnungsstörungen','Vit. B-Mangel → Skorbut / Vit. C = wasserlöslich','Vit. K = wasserlöslich / Vit. B12 = fettlöslich'], ans: 1, exp: 'Lösung D+E – Vit. B12-Mangel: funikuläre Myelose (Rückenmarksdegeneration), perniziöse Anämie. Vit. K: fettlöslich, essenziell für Gerinnungsfaktoren II, VII, IX, X → Mangel = Blutungsneigung.' },
  { cat: 'pruefung2023', q: '[FJ23/33] Komplexes regionales Schmerzsyndrom (M. Sudeck): (1=Regelhaft nach distaler Radiusfraktur, 2=Streptokokken-Toxine, 3=Glanzhaut + Überwärmung + Bewegungsschmerz, 4=Radiolog. Entkalkung im Spätstadium, 5=Heilung in Tagen)', opts: ['Nur Aussage 1','Nur 3 und 4 – Lösung B','Nur 2, 3 und 4','Nur 3, 4 und 5'], ans: 1, exp: 'Lösung B – CRPS (Sudeck): Glanzhaut, Überwärmung, Schmerz (3 ✓); radiologische Entkalkung im späteren Verlauf (4 ✓). Nicht regelhaft nach Fraktur (1 ✗); nicht durch Streptokokken (2 ✗); kein schnelles Abheilen (5 ✗).' },
  { cat: 'pruefung2023', q: '[FJ23/34] Risikofaktoren für Hypoglykämie unter Sulfonylharnstoffen: Alle 5 richtig?', opts: ['Nur Fasten und Alkohol','Nur 1, 3 und 4 (Fasten, Leberinsuffizienz, Durchfälle)','Nur 2, 3, 4, 5 (Alkohol, Leber, Durchfall, Sport)','Alle Aussagen sind richtig (Fasten, Alkohol, Leber, Durchfall, Sport)'], ans: 3, exp: 'Lösung E – Alle 5 begünstigen Hypoglykämie unter Sulfonylharnstoffen: Fasten, Alkohol (hemmt Glukoneogenese), Leberfunktionsstörungen (verlangsamter Abbau), Durchfall (unregelmäßige Resorption), körperliche Anstrengung (erhöhter Verbrauch).' },
  { cat: 'pruefung2023', q: '[FJ23/35] Formale Denkstörungen: Welche zwei treffen zu?', opts: ['Ich-Erlebnis-Störungen / Gedankenlautwerden','Neologismen / Perseverationen','Beeinflussungserleben / Neologismen','Perseverationen / Gedankenlautwerden'], ans: 1, exp: 'Lösung A+E – Formale Denkstörungen = Störungen des Denkablaufs: Neologismen (Wortneuschöpfungen), Perseverationen (Gedanken/Worte haften). Ich-Erlebnis-Störungen und Gedankenlautwerden = inhaltliche Denkstörungen.' },
  { cat: 'pruefung2023', q: '[FJ23/36] Differentialblutbild – Welche Aussage trifft zu?', opts: ['Parasiteninfektion → Eosinopenie','Viraler Infekt → Linksverschiebung','Allergien → Lymphozytose','Agranulozytose kann durch Medikamente ausgelöst werden'], ans: 3, exp: 'Lösung D – Agranulozytose (schwerer Neutrophilenmangel) kann durch Medikamente (Metamizol, Thyreostatika, Clozapin) ausgelöst werden. Parasiten → Eosinophilie; Virus → Lymphozytose; Bakterien → Linksverschiebung.' },
  { cat: 'pruefung2023', q: '[FJ23/37] Übertragungswege: Welche zwei Zuordnungen treffen zu?', opts: ['Mononukleose – Speichelkontakt / HIV – parenteral','Hepatitis B – aerogen / Herpes Zoster – fäkal-oral','Hepatitis A – Blut / Mononukleose – Tröpfchen','HIV – Tröpfchen / Hepatitis B – parenteral'], ans: 0, exp: 'Lösung A+C – Mononukleose (EBV) = Speichelkontakt ("Kissing disease"). HIV = parenteral, sexuell, vertikal. Hepatitis B = parenteral (nicht aerogen). Herpes Zoster = Kontakt/Tröpfchen (nicht fäkal-oral). Hepatitis A = fäkal-oral.' },
  { cat: 'pruefung2023', q: '[FJ23/38] Morbus Crohn: Welche zwei Aussagen treffen zu?', opts: ['Blutig-schleimige Durchfälle typisch / Heilbar durch Diät','Extraintestinale Symptome mögl. / Analfisteln als Erstsymptom mögl.','Kontinuierliche Dickdarmausbreitung / Keine extaintestinalen Symptome','Analfisteln häufig / Nur Dickdarmbefall'], ans: 1, exp: 'Lösung A+C – M. Crohn: befällt gesamten GI-Trakt segmental, extraintestinale Manifestationen (Augen, Haut, Gelenke) möglich, Analfisteln als Erstsymptom möglich. Im Gegensatz zur Colitis ulcerosa: diskontinuierlicher Befall.' },
  { cat: 'pruefung2023', q: '[FJ23/39] Befugnisse des Heilpraktikers mit allgemeiner Erlaubnis: (1=Leistenlymphknoten palpieren, 2=Rektale Untersuchung, 3=Hodenuntersuchung, 4=Augenspiegelung, 5=Röntgenuntersuchung)', opts: ['Nur 1 und 2','Nur 3 und 4','Nur 1, 2 und 4','Nur 1, 2, 3 und 4 – Lösung D'], ans: 3, exp: 'Lösung D – HP-Erlaubnis umfasst körperliche Untersuchungen inkl. Palpation, Rektoskopie, Hodenuntersuchung und Augenhintergrundspiegelung. Röntgen erfordert eine eigene Genehmigung (RöV).' },
  { cat: 'pruefung2023', q: '[FJ23/40] Tetanie kann auftreten bei: Welche zwei?', opts: ['Hypoparathyreoidismus / Massivem sauren Erbrechen','Primärem Hyperparathyreoidismus / Herzinsuffizienz','Nebenniereninsuffizienz / Hypoparathyreoidismus','Erbrechen / Hyperparathyreoidismus'], ans: 0, exp: 'Lösung A+D – Tetanie = Hypokalzämie. Ursachen: Hypoparathyreoidismus (Ca↓), massives saures Erbrechen (Alkalose → Ca²⁺ bindet an Albumin → ionisiertes Ca↓). Hyperparathyreoidismus → Hyperkalzämie.' },
  { cat: 'pruefung2023', q: '[FJ23/41] Kniegelenkserguss: Welches Phänomen?', opts: ['Positives Lachman-Zeichen','Tanzende Patella (ballottement)','Positives Payr-Zeichen','Schubladenphänomen'], ans: 0, exp: 'Lösung A – Die "tanzende Patella" (Patellaphänomen): Bei größerem Kniegelenkerguss schwimmt die Patella auf der Flüssigkeit und kann eingedrückt werden.' },
  { cat: 'pruefung2023', q: '[FJ23/42] Insulinmangel führt zu: (1=Gesteigerter Lipolyse, 2=Ketonkörperbildung, 3=Hyperglykämie, 4=Hypoglykämie, 5=Gesteigerter Eiweißsynthese)', opts: ['Nur 1 und 3','Nur 1 und 5','Nur 1, 2 und 3 – Lösung C','Nur 1, 3 und 5'], ans: 2, exp: 'Lösung C – Insulinmangel → Zellen nehmen keine Glukose auf (Hyperglykämie), Lipolyse steigt, Fettsäuren → Ketonkörper (diabetische Ketoazidose). Kein Insulinmangel = Hypoglykämie; Eiweißsynthese ↓, nicht ↑.' },
  { cat: 'pruefung2023', q: '[FJ23/43] 68-jährige Patientin: Antriebsarmut, Frieren, Obstipation, trockene teigige Haut, brüchiges Haar. Verdachtsdiagnose?', opts: ['M. Parkinson','Hyperthyreose','Hirntumor','Hypothyreose'], ans: 3, exp: 'Lösung E – Vollbild der Hypothyreose: Kälteintoleranz, Obstipation, Myxödem (teigige Haut), Bradykardie, Gewichtszunahme, Müdigkeit. TSH erhöht, fT4 erniedrigt.' },
  { cat: 'pruefung2023', q: '[FJ23/44] Therapieziele bei Diabetes mellitus Typ 2: (1=BMI < 30, 2=Nüchtern-BZ ≤ 120 mg/dl, 3=RR 160/100, 4=BZ postprandial < 160 mg/dl, 5=HbA1c 9,5–10,5%)', opts: ['Nur 1, 2 und 3','Nur 1, 2 und 4 – Lösung B','Nur 1, 4 und 5','Nur 2, 3 und 4'], ans: 1, exp: 'Lösung B – Sinnvolle Therapieziele: BMI < 30 (1 ✓), Nüchtern-BZ ≤ 120 mg/dl (2 ✓), postprandial < 160 mg/dl (4 ✓). RR-Ziel ist < 130/80 (nicht 160/100, 3 ✗); HbA1c-Ziel 6,5–7,5% (nicht 9,5–10,5%, 5 ✗).' },
  { cat: 'pruefung2023', q: '[FJ23/45] Netzhautablösung – Welche Aussage trifft zu?', opts: ['Vor allem bei starker Weitsichtigkeit','Kommt durch Stressreduktion zum Stillstand','Isolierter Verlust des Farbensehens','Kann Lichtblitze, Schleiersehen und Schattensehen aufweisen'], ans: 3, exp: 'Lösung D – Ablatio retinae: Lichtblitze, Rußregen (Mouches volantes), Schleiersehen, Schattensehen (Vorhang von einer Seite). Begünstigt durch hohe Myopie, Trauma, Alter. Notfall!' },
  { cat: 'pruefung2023', q: '[FJ23/46] Listeriose: (1=Listerien sind Viren, 2=Weltweit in Erde, 3=Übertragung durch kontaminierte Lebensmittel, 4=Behandlungsverbot für HP, 5=Ausscheidung über Stuhl)', opts: ['Nur Aussage 4','Nur 3 und 4','Nur 1, 2 und 3','Nur 2, 3, 4 und 5 – Lösung D'], ans: 3, exp: 'Lösung D – Richtig: Listerien sind Bakterien (1 ✗), kommen weltweit in Erde vor (2 ✓), werden durch Lebensmittel übertragen (3 ✓), Behandlungsverbot für HP (4 ✓ – meldepflichtig + Behandlung durch Arzt), Stuhlausscheidung (5 ✓).' },
  { cat: 'pruefung2023', q: '[FJ23/47] Herzauskultation: (1=Fortleitung Aortenstenose in Karotiden, 2=Spaltung 2. HT stets pathol., 3=Akzidentelle Geräusche stets systolisch, 4=Funktionelles Geräusch bei Fieber, 5=Lautstärke = Schwere)', opts: ['Nur 1, 2 und 3','Nur 1, 3 und 4 – Lösung B','Nur 1, 4 und 5','Nur 2, 3 und 4'], ans: 1, exp: 'Lösung B – Aortenstenose leitet in Karotiden weiter (1 ✓); akzidentelle Geräusche sind systolisch und ohne Fortleitung (3 ✓); funktionelle Geräusche bei Hyperdynämie (Fieber, Anämie, 4 ✓). Spaltung 2. HT kann physiologisch sein (2 ✗).' },
  { cat: 'pruefung2023', q: '[FJ23/48] Pruritus generalisatus als Begleitsymptom: Alle 5 richtig? (1=Leukämie, 2=Diabetes, 3=Alkoholismus, 4=Gallengangsverschluss, 5=Niereninsuffizienz)', opts: ['Nur 1, 2 und 3','Nur 1, 2, 4 und 5','Nur 1, 3, 4 und 5','Alle Aussagen sind richtig'], ans: 3, exp: 'Lösung E – Alle Erkrankungen können generalisierten Juckreiz verursachen: Leukämie (Histaminfreisetzung), Diabetes (Neuropathie/Pilz), Alkohol (Lebererkrankung), Cholestase (Gallensalze in Haut), Urämie (Niereninsuffizienz).' },
  { cat: 'pruefung2023', q: '[FJ23/49] Lungenembolie – Thrombenherkunft in der Regel?', opts: ['Pfortader','Linker Vorhof','Beinvenen','Nierenarterie'], ans: 2, exp: 'Lösung C – Lungenembolien entstehen fast ausschließlich durch Ablösung von Thromben aus den tiefen Bein- oder Beckenvenen (tiefe Beinvenenthrombose), die über den rechten Herzvorhof in die Lungenarterien gelangen.' },
  { cat: 'pruefung2023', q: '[FJ23/50] Nachweis von Blut im Urin – Welche Aussage trifft zu?', opts: ['Teststreifen haben hohe quantitative Genauigkeit','Bei Nierentumor nur erste Urinfraktion rot','Schmerzlose Hämaturie braucht keine Kontrolle','Ursachen können prä-, renal und postrenal sein'], ans: 3, exp: 'Lösung E – Hämaturie hat prä- (Gerinnung), renale (Glomerulonephritis, Tumor) und postrenale (Blase, Prostata) Ursachen. Schmerzlose Hämaturie ist immer abklärungsbedürftig (Karzinom!).' },
  { cat: 'pruefung2023', q: '[FJ23/51] Herzinfarkt: (1=Häufig in Morgenstunden, 2=Nur Oberbauchschmerzen mögl., 3=Diabetiker haben besonders starke Schmerzen, 4=RR kann niedrig/normal/erhöht sein, 5=Hinterwand-Infarkt keine Rhythmusstörungen)', opts: ['Nur Aussage 1','Nur 2 und 4','Nur 1, 2 und 4 – Lösung C','Nur 2, 3 und 4'], ans: 2, exp: 'Lösung C – Richtig: (1) Häufig morgens (Sympathikustonus ↑), (2) Silent infarction mit Oberbauchschmerzen v.a. bei Hinterwandinfarkt, (4) RR variabel. Falsch: Diabetiker haben oft KEINEN Schmerz (autonome Neuropathie); Hinterwandinfarkt → typisch bradykarde Rhythmusstörungen.' },
  { cat: 'pruefung2023', q: '[FJ23/52] Gastroösophageale Refluxkrankheit: Welche zwei Aussagen treffen zu?', opts: ['Keine Spätschäden / Kein Entartungsrisiko','Axiale Hiatushernie begünstigend / Ursache = gestörter unterer Ösophagussphinkter','Alle Hiatusherniepatienten leiden an Reflux / Schnelles Heilen','Entartungsrisiko vorhanden / Kein Zusammenhang mit Hiatushernie'], ans: 1, exp: 'Lösung B+D – Hiatushernie begünstigt Reflux (B ✓). Ursache = Insuffizienz des unteren Ösophagussphinkters (D ✓). Spätfolge: Barrett-Ösophagus mit Karzinomrisiko. Nicht alle Hernien → Reflux.' },
  { cat: 'pruefung2023', q: '[FJ23/53] 19-jähriger mit Halsschmerzen, Fieber, zervikalen LK-Schwellungen, vergrößerter Milz, 70% lymphoide Zellen. Wahrscheinlichste Diagnose?', opts: ['Akute Leukämie','Pfeiffer-Drüsenfieber (infektiöse Mononukleose)','Streptokokkenangina','Mumps'], ans: 1, exp: 'Lösung B – EBV-Mononukleose: Jugendliche, Lymphadenopathie, Splenomegalie, Angina, > 50% atypische (lymphoide) Lymphozyten, Paul-Bunnell-Test. "Kissing disease".' },
  { cat: 'pruefung2023', q: '[FJ23/54] 58-jährige Diabetikerin: Fieber, Schmerzen linker Unterschenkel, scharf begrenzte Rötung, Überwärmung, Druckschmerz, Fußpilz zwischen den Zehen. Verdachtsdiagnose?', opts: ['Akuter arterieller Verschluss','Tiefe Beinvenenthrombose','Erysipel','Gichtanfall'], ans: 2, exp: 'Lösung C – Erysipel (Wundrose) durch β-hämolysierende Streptokokken: scharf begrenzte, schmerzhafte, überwärmte Rötung + Fieber. Eintrittspforte oft Fußpilz (Tinea pedis). Häufig bei Diabetikern.' },
  { cat: 'pruefung2023', q: '[FJ23/55] Auslöser eines epileptischen Anfalls: Alle 5 richtig? (1=Alkoholentzug, 2=Hirntumor, 3=Hirnblutung, 4=Unregelmäßige Medikamenteneinnahme, 5=Zerebrale Durchblutungsstörungen)', opts: ['Nur 1 und 4','Nur 1, 2 und 3','Nur 3, 4 und 5','Alle Aussagen sind richtig'], ans: 3, exp: 'Lösung E – Alle sind epileptische Anfallsauslöser: Alkoholentzug (Entzugskrampf), Hirntumor, Hirnblutung, Absetzen/Vergessen der Antiepileptika, zerebrovaskuläre Insulte. Wichtig für die Differentialdiagnose!' },
  { cat: 'pruefung2023', q: '[FJ23/56] Doppelbilder (Diplopie) sind am ehesten typisch für: Welche zwei Ursachen?', opts: ['Zentralarterienverschluss / N. olfactorius-Schädigung','Multiple Sklerose / Botulismus','Chorea Huntington / Multiple Sklerose','N. olfactorius / Botulismus'], ans: 1, exp: 'Lösung B+E – Multiple Sklerose: Augenmotilitätsstörungen durch Demyelinisierung (Internukleäre Ophthalmoplegie). Botulismus: Acetylcholinblockade → Augenmuskellähmung → Doppelbilder, Ptosis.' },
  { cat: 'pruefung2023', q: '[FJ23/57] Blutdruckmessung: Welche Aussagen sind korrekt? (1=Optimaler RR 130–150/85–95, 2=Großer Arm + Normalmanschette → falsch niedrig, 3=Ventil 10 mmHg/s, 4=Auskultatorische Lücke → falsch niedrig, 5=Lockere Manschette → falsch hoch)', opts: ['Nur 4 und 5','Nur 1, 2 und 3','Nur 2, 4 und 5','Nur 1, 3, 4 und 5'], ans: 0, exp: 'Lösung A – Nur (4) und (5) sind korrekt: Auskultatorische Lücke → übersieht systolischen Wert → falsch zu niedrig. Zu lockere Manschette → höherer Druck nötig → falsch zu hoch. Optimaler RR < 120/80. Großer Arm → falsch HOCH (nicht niedrig).' },
  { cat: 'pruefung2023', q: '[FJ23/58] Hellrotes Blut im Stuhl – Welche zwei Ursachen kommen am ehesten in Frage?', opts: ['Cholezystolithiasis / Rote Beete','Hämorrhoidalblutung / Colitis ulcerosa','Rote Beete / Reizdarmsyndrom','Reizdarmsyndrom / Cholezystolithiasis'], ans: 1, exp: 'Lösung B+D – Hellrotes Blut = untere GI-Blutung: Hämorrhoiden (häufigste Ursache) und Colitis ulcerosa (blutig-schleimige Diarrhöen). Rote Beete → Rotfärbung ohne echtes Blut. Gallensteine/Reizdarm → kein Blut.' },
  { cat: 'pruefung2023', q: '[FJ23/59] Ursachen einer Tachykardie: (1=Hohes Fieber, 2=Starke Aufregung, 3=Betablocker-Überdosierung, 4=Anämie, 5=Hypothyreose)', opts: ['Nur 1, 2 und 3','Nur 1, 2 und 4 – Lösung B','Nur 2, 3 und 4','Nur 1, 3, 4 und 5'], ans: 1, exp: 'Lösung B – Tachykardie durch: Fieber (Sympathikusaktivierung, 1 ✓), Aufregung/Stress (2 ✓), Anämie (Kompensation durch Frequenz↑, 4 ✓). Betablocker-Überdosierung → Bradykardie (3 ✗). Hypothyreose → Bradykardie (5 ✗).' },
  { cat: 'pruefung2023', q: '[FJ23/60] Welche Maßnahme muss beim Auftreten von Kammerflimmern zunächst erfolgen?', opts: ['Antikoagulation mit Cumarin','Langzeit-EKG zur Diagnosesicherung','Defibrillation','Karotissinusmassage'], ans: 2, exp: 'Lösung C – Kammerflimmern = unmittelbar lebensbedrohlich (kein Auswurf, kein Puls). Einzige wirksame Sofortmaßnahme: Defibrillation (elektrische Kardioversion). Parallel CPR bis Defi verfügbar. Jede Verzögerung kostet Leben!' },

  { cat: 'pruefung2022', q: '[FJ22/1] Symptome der Dehydratation: (1=Trockene Haut/Schleimhäute, 2=Erhöhte Körpertemp., 3=Stehende Hautfalten, 4=Durst, 5=Polyurie)', opts: ['Nur 1 und 2','Nur 1, 3 und 4 – Lösung B','Nur 2, 4 und 5','Nur 1, 2, 3 und 4'], ans: 1, exp: 'Lösung D – Dehydratation: Trockene Haut/Schleimhäute, stehende Hautfalten (Turgorreduktion), Durst, erhöhte Körpertemperatur durch verminderte Schweißproduktion. Polyurie = eher Hyperhydratation oder Diabetes.' },
  { cat: 'pruefung2022', q: '[FJ22/2] STIKO-Impfung für Haushaltskontaktpersonen von Neugeborenen?', opts: ['Tuberkulose (BCG)','Humane Papillomviren (HPV)','Hepatitis A','Pertussis (Keuchhusten)'], ans: 3, exp: 'Lösung D – Cocoon-Strategie: Enge Kontaktpersonen von Neugeborenen sollen gegen Pertussis geimpft sein, da Säuglinge erst ab dem 2. Lebensmonat geimpft werden können und Keuchhusten für sie lebensbedrohlich ist.' },
  { cat: 'pruefung2022', q: '[FJ22/3] Ursachen chronischer Rechtsherzinsuffizienz: Alle 5 richtig? (1=Mitralklappenstenose, 2=COPD, 3=Lungenemphysem, 4=Wiederkehrende Lungenembolien, 5=Pulmonalklappenstenose)', opts: ['Nur 1 und 5','Nur 1 und 4','Nur 2, 3 und 4','Alle 5 sind richtig'], ans: 3, exp: 'Lösung E – Alle führen zu Rechtsherzinsuffizienz: Mitralklappenstenose → Rückstau, COPD/Emphysem → pulmonale Hypertonie → Cor pulmonale, Lungenembolien → chronisch-thromboembolische pulm. Hypertonie, Pulmonalklappenstenose → Druckbelastung rechts.' },
  { cat: 'pruefung2022', q: '[FJ22/4] Hypertensive Krise: (1=Kritischer RR-Anstieg mit Organschadengefahr, 2=Anstieg auf 160/100 mmHg, 3=Patient flach lagern, 4=Amphetamin/Kokain als Ursache, 5=RR-Senkung um 50% in erster Stunde)', opts: ['Nur 1 und 4 – Lösung A','Nur 2 und 3','Nur 1, 2 und 4','Nur 1, 4 und 5'], ans: 0, exp: 'Lösung A – Hypertensive Krise: kritischer RR-Anstieg mit Organbedrohung (1 ✓), Kokain/Amphetamine als Auslöser (4 ✓). Falsch: Krise = meist >180/120; Patient sitzt/liegt mit hochgelagertem OK; RR-Senkung langsam (max. 25% in 1h), nicht 50%!' },
  { cat: 'pruefung2022', q: '[FJ22/5] Typische Symptome der unkomplizierten Blasenentzündung: (1=Häufiger Harndrang, 2=Harnabflussstörung, 3=Flankenschmerz, 4=Schmerzhafte Harnentleerung, 5=Mehr Männer als Frauen)', opts: ['Nur 2','Nur 1 und 4 – Lösung B','Nur 1, 3 und 4','Nur 1, 4 und 5'], ans: 1, exp: 'Lösung B – Unkomplizierte Zystitis: Pollakisurie (1 ✓) und Dysurie (4 ✓). Flankenschmerz/Fieber → Pyelonephritis! Harnabflussstörung → Obstruktion. Frauen 10× häufiger (kurze Urethra).' },
  { cat: 'pruefung2022', q: '[FJ22/6] Rückenmark beim Erwachsenen bis wo?', opts: ['1. oder 2. Lendenwirbel – Lösung A','4. oder 5. Lendenwirbel','1. Brustwirbel','Steißbein'], ans: 0, exp: 'Lösung A – Das Rückenmark endet als Conus medullaris auf Höhe L1/L2. Darunter: Cauda equina (lose Nervenwurzeln). Wichtig für Punktionen: Lumbalpunktion unterhalb L3/L4 sicher.' },
  { cat: 'pruefung2022', q: '[FJ22/7] Ursachen einer Leukozytose: (1=Cortisontherapie, 2=Folsäuremangel, 3=Rheumatisches Fieber, 4=Stress, 5=Erysipel)', opts: ['Nur 1 und 5','Nur 3 und 5','Nur 1, 2 und 3','Nur 1, 3, 4 und 5 – Lösung D'], ans: 3, exp: 'Lösung D – Leukozytose durch: Kortison (Demargination), Entzündung/Fieber (Rheuma, 3 ✓), Stress (Katecholamine, 4 ✓), Infektion (Erysipel, 5 ✓). Folsäuremangel → Leukopenie (Reifungsstörung).' },
  { cat: 'pruefung2022', q: '[FJ22/8] M. quadriceps femoris – Funktion?', opts: ['Beugt Unterschenkel im Knie','Streckt Oberschenkel im Hüftgelenk','Beugt Oberschenkel + rollt nach außen','Beugt Oberschenkel + streckt Unterschenkel – Lösung D'], ans: 3, exp: 'Lösung D – Der M. rectus femoris (Teil des Quadrizeps) beugt den Oberschenkel im Hüftgelenk. Der gesamte Quadrizeps streckt das Kniegelenk (Kniestrecker = wichtigster Stabilisator beim Gehen/Stehen).' },
  { cat: 'pruefung2022', q: '[FJ22/9] Röteln: (1=Ansteckend 1 Woche vor Exanthem, 2=Nackenlymphknotenschwellung, 3=Makulopapulöses Exanthem, 4=Tröpfcheninfektion, 5=Therapie mit Antibiotika)', opts: ['Nur 2 und 3','Nur 1, 2 und 4','Nur 3, 4 und 5','Nur 1, 2, 3 und 4 – Lösung D'], ans: 3, exp: 'Lösung D – Röteln: Tröpfcheninfektion, Ansteckung 7d vor Exanthem, Nacken-LK-Schwellung, kleinfleckiges Exanthem. Antibiotika unwirksam (Virus!). Wichtig: Röteln in Frühschwangerschaft = Embryopathie-Risiko.' },
  { cat: 'pruefung2022', q: '[FJ22/10] Proteine im Blutserum: Welche zwei Aussagen treffen zu?', opts: ['Leberzirrhose → Albumin↑ / Serum 50% Proteine','Nephrotisches Syndrom → Hypalbuminämie / Albumin = größter Anteil bei Gesunden','Hämoglobin färbt Serum rot / Serum 50% Proteine','Nephrotisches Syndrom → Hyperalbuminämie / Albumin = kleinster Anteil'], ans: 1, exp: 'Lösung B+E – Nephrotisches Syndrom: massiver Eiweißverlust über Niere → Hypalbuminämie → Ödeme. Bei Gesunden macht Albumin ca. 60% der Serumproteine aus (größter Anteil). Leberzirrhose → Albumin↓.' },
  { cat: 'pruefung2022', q: '[FJ22/11] Potentiell reversible Ursachen eines Herzkreislaufstillstands (4 H, 4 T): Alle 5 richtig?', opts: ['Nur 2 und 5','Nur 1, 2 und 3','Nur 3, 4 und 5','Alle Aussagen sind richtig'], ans: 3, exp: 'Lösung E – Alle 5 (Hypoxie, Hypovolämie, Hypothermie, Thromboembolie, Spannungspneumothorax) gehören zu den reversibler Ursachen. Merke: 4 H (Hypoxie, Hypo-volämie, Hypo-/HyperK+, Hypo-thermie) + 4 T (Tamponade, Toxine, Thrombose, Tension-pneumo).' },
  { cat: 'pruefung2022', q: '[FJ22/12] Altersbedingte Sinnesstörungen: (1=Hörvermögen↓ vor allem Hochton, 2=Hörstörungen→psychische Symptome mögl., 3=Schwindel multifaktoriell, 4=Kataraktsymptome: Visus↓ Blendung Kontrast↓, 5=Riechvermögen bleibt erhalten)', opts: ['Nur 2 und 4','Nur 1, 3 und 4','Nur 1, 2, 3 und 4 – Lösung C','Nur 1, 2, 3 und 5'], ans: 2, exp: 'Lösung C – Richtig: Presbyakusis = Hochtonverlust (1 ✓), Hörstörungen → Depressionen, soziale Isolation (2 ✓), Altersschwinde multifaktoriell (3 ✓), Katarakt = Visus↓, Blendung, Kontrastminderung (4 ✓). Riechvermögen nimmt im Alter ab (5 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/13] Schizophrenes Residuum: (1=Depression nach Akutphase, 2=Paranoid-halluzinatorisch, 3=Psych.motorische Verlangsamung + Körperpflegevernachlässigung, 4=Negativsymptome = prognostisch ungünstig, 5=DD Demenz/Depression ausschließen)', opts: ['Nur 1 und 5','Nur 1, 3 und 4','Nur 2, 3 und 5','Nur 3, 4 und 5 – Lösung D'], ans: 3, exp: 'Lösung D – Schizophrenes Residuum: Negativsymptome (3 ✓, 4 ✓), DD Demenz/Depression (5 ✓). Kein Residuum = Depression (1 ✗); keine floriden Positivsymptome (2 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/14] Nikotinentzugssyndrom: (1=Hypertonie, 2=Krankheitsgefühl, 3=Konzentrationsstörungen, 4=Ängstlichkeit, 5=Hohe Risikobereitschaft)', opts: ['Nur 2 und 4','Nur 1, 2 und 3','Nur 1, 3 und 4','Nur 2, 3 und 4 – Lösung D'], ans: 3, exp: 'Lösung D – Nikotinentzug: Krankheitsgefühl, Konzentrationsstörungen, Ängstlichkeit, Reizbarkeit, Schlafstörungen, Appetitsteigerung. Hypertonie ist eher ein Zeichen des Nikotinkonsums, nicht des Entzugs.' },
  { cat: 'pruefung2022', q: '[FJ22/15] Langfristige Erregerpersistenz: (1=Herpes simplex Typ 1, 2=EBV, 3=Influenza, 4=Hepatitis A, 5=Syphilis)', opts: ['Nur 1, 2 und 3','Nur 1, 2 und 4','Nur 1, 2 und 5 – Lösung C','Nur 1, 4 und 5'], ans: 2, exp: 'Lösung C – HSV-1 latiert in Ganglien (lebenslang), EBV latiert in B-Lymphozyten (lebenslang), Treponema pallidum (Syphilis) persistiert jahrelang ohne Therapie. Influenza und Hep A: keine Persistenz.' },
  { cat: 'pruefung2022', q: '[FJ22/16] Kolorektales Karzinom – Symptome bei 55-jährigem: (1=Blut im Stuhl, 2=Stuhlgewohnheitsänderung, 3=Fettstühle, 4=Anämie, 5=Nüchternschmerzen)', opts: ['Nur 1 und 4','Nur 1, 2 und 4 – Lösung B','Nur 1, 2 und 5','Nur 2, 3 und 4'], ans: 1, exp: 'Lösung B – KRK: Blut im Stuhl (1 ✓), Stuhlgewohnheitsänderung (Wechsel Obstipation/Diarrhö, 2 ✓), Anämie (okkultes Blut, 4 ✓). Fettstühle = Pankreasinsuffizienz; Nüchternschmerz = Ulkus.' },
  { cat: 'pruefung2022', q: '[FJ22/17] Neugeborenes mit Mikrozephalie, verstrichenem Philtrum, fließendem Kinn. Mutter ist Impfgegnerin. Ursache?', opts: ['Mutter erkrankte an Röteln in der SS','Mutter hat AIDS','Mutter erkrankte an Varizellen','Mutter hat Diabetes Typ 2','Mutter konsumierte regelmäßig Alkohol in der SS'], ans: 4, exp: 'Lösung E – Fetales Alkoholsyndrom (FAS): Mikrozephalie, verstrichenes Philtrum, schmales Oberlippenrot, kurze Lidspalten, fließendes Kinn. Die Impfgegnerin-Info lenkt ab – Röteln-Embryopathie hat andere Merkmale (Katarakt, Herzfehler, Taubheit).' },
  { cat: 'pruefung2022', q: '[FJ22/18] Wann tritt M. Scheuermann auf?', opts: ['Säuglingsalter','Vorschulalter','Im zweiten Lebensjahrzehnt (Pubertät) – Lösung C','Fünftes Lebensjahrzehnt'], ans: 2, exp: 'Lösung C – M. Scheuermann (juvenile Kyphose): Wachstumsstörung der Wirbelkörper-Apophysen während der Pubertät (10–18 Jahre). Typisch: Rundrücken, Schmerzen, keilförmige Wirbelkörper im Röntgenbild.' },
  { cat: 'pruefung2022', q: '[FJ22/19] 1 Kohlenhydrateinheit (KE) entspricht?', opts: ['1 mg Kohlenhydraten','100 mg Kohlenhydraten','1 g Kohlenhydraten','10 g Kohlenhydraten – Lösung D'], ans: 3, exp: 'Lösung D – 1 KE = 10 g verwertbare Kohlenhydrate. Früher: 1 BE (Broteinheit) = 12 g KH. Die KE-Zählung ist wichtig für die Insulindosierung bei Typ-1-Diabetikern.' },
  { cat: 'pruefung2022', q: '[FJ22/20] Unterscheidung Demenz vs. Depression: Welche zwei Aussagen treffen zu?', opts: ['Depressive überspielen Unsicherheiten / Demente aggravieren früh Defizite','Uhrzeichentest spricht gegen schwere Demenz / MMST wird verwendet','MMST bei Demenz verwendet / Depressive haben Orientierungsstörungen','Uhrzeichentest spricht für Demenz / MMST nicht geeignet'], ans: 1, exp: 'Lösung C+D – Beim Uhrzeichentest (C ✓): Korrekte Ausführung spricht gegen schwere Demenz. MMST (D ✓): standardisierter Kurztest zur Demenzdiagnostik und Verlaufskontrolle. Depressive klagen über Gedächtnis, haben aber meist keine objektiven Defizite.' },
  { cat: 'pruefung2022', q: '[FJ22/21] Hyperkaliämie: (1=Lässt Niereninsuffizienz vermuten, 2=Wadenkrämpfe, 3=Herzrhythmusstörungen mögl., 4=Bei Durchfällen, 5=Oft symptomlos)', opts: ['Nur 1','Nur 1 und 3','Nur 1, 3 und 5 – Lösung C','Nur 3, 4 und 5'], ans: 2, exp: 'Lösung C – Hyperkaliämie: Niereninsuffizienz (1 ✓), bedrohliche Herzrhythmusstörungen (3 ✓), oft asymptomatisch (5 ✓). Durchfälle → Hypokaliämie (4 ✗); Wadenkrämpfe = Hypokaliämie oder Hypokalzämie (2 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/22] Sichere Todeszeichen: (1=Leichenflecken, 2=Fehlender Karotispuls, 3=Fäulnis, 4=Atemstillstand, 5=Weite reaktionslose Pupillen)', opts: ['Nur 1 und 2','Nur 1 und 3 – Lösung B','Nur 1, 2 und 3','Nur 1, 3 und 5'], ans: 1, exp: 'Lösung B – Sichere Todeszeichen: Leichenflecken (Livores, ab ca. 30 min), Leichenstarre, Fäulnis, Mumifikation, Skelettierung, mit Gewalt vereinbarte Verletzungen. Puls/Atem/Pupillen = unsichere Zeichen!' },
  { cat: 'pruefung2022', q: '[FJ22/23] Herzrhythmusstörungen: (1=VES aus Kammern, 2=Häufige VES beeinträchtigen Pumpleistung, 3=Vorhof-ES werden nicht auf Kammer übertragen, 4=WPW → Reentry → Herzrasen, 5=VES = Herzstolpern/Aussetzer)', opts: ['Nur 1, 2 und 5','Nur 1, 3 und 4','Nur 2, 4 und 5','Nur 1, 2, 4 und 5 – Lösung D'], ans: 3, exp: 'Lösung D – Richtig: VES = aus Kammern (1 ✓), Salven beeinträchtigen Auswurf (2 ✓), WPW = akzessorische Leitungsbahn → Reentry → Tachykardie (4 ✓), VES subjektiv als Stolpern wahrgenommen (5 ✓). Vorhof-ES werden meistens übergeleitet (3 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/24] Solitäre Leberzysten: Welche zwei Aussagen treffen zu?', opts: ['Meist Zufallsbefund / Schmerzen + Fieber typisch','Meist Zufallsbefund / Häufig erblich bedingt','Schnell wachsend / Folge von Leberzirrhose','Schmerzen typisch / Schnell wachsend'], ans: 1, exp: 'Lösung A+D – Solitäre Leberzysten: Meist asymptomatischer Zufallsbefund bei Sonographie (A ✓). Häufig erblich (polyzystische Lebererkrankung, D ✓). Nicht durch Zirrhose, kein schnelles Wachstum, selten Schmerzen.' },
  { cat: 'pruefung2022', q: '[FJ22/25] Diabetische Neuropathie an den Beinen: (1=Belastungsabh. Schmerzen, 2=Fußpulse nicht tastbar, 3=Nächtl. Kribbeln/Brennen, 4=Gesteigerter Schweiß, 5=Vermindertes Vibrationsempfinden)', opts: ['Nur 1 und 3','Nur 3 und 5 – Lösung B','Nur 1, 2 und 4','Nur 2, 3 und 4'], ans: 1, exp: 'Lösung B – Diabetische Polyneuropathie: nächtliches Kribbeln/Brennen (3 ✓), vermindertes Vibrationsempfinden (5 ✓). Fußpulse fehlen bei pAVK (nicht primär Neuropathie); belastungsabh. Schmerzen = pAVK; Neuropathie → verminderte Schweißsekretion.' },
  { cat: 'pruefung2022', q: '[FJ22/26] Bakterielle Lobärpneumonie: (1=Gedämpfter Klopfschall, 2=Exspir. Giemen, 3=Verschärftes Atemgeräusch, 4=Starke Schluckbeschwerden/Speichelfluss, 5=Verstärkter Stimmfremitus)', opts: ['Nur 2 und 5','Nur 1, 3 und 5 – Lösung B','Nur 2, 3 und 4','Nur 1, 3, 4 und 5'], ans: 1, exp: 'Lösung B – Lobärpneumonie: Dämpfung (Konsolidierung, 1 ✓), verschärftes Atemgeräusch (3 ✓), verstärkter Stimmfremitus (5 ✓). Giemen = Bronchospasmus; Schluckbeschwerden = Epiglottitis.' },
  { cat: 'pruefung2022', q: '[FJ22/27] Verdauungstrakt/Gallenblase: (1=Gallenblase verdünnt Galle, 2=Ductus-cysticus-Verschluss → Ikterus, 3=Gallensaft bei Fettverdauung, 4=Galle scheidet Fremdstoffe aus, 5=Meiste Gallensteinträger symptomlos)', opts: ['Nur 1 und 2','Nur 3 und 4','Nur 1, 2 und 3','Nur 3, 4 und 5 – Lösung D'], ans: 3, exp: 'Lösung D – Richtig: Gallensalze emulgieren Fette (3 ✓), Galle dient der Ausscheidung (Bilirubin, Medikamente, 4 ✓), ca. 80% der Gallensteinträger sind asymptomatisch (5 ✓). Falsch: Gallenblase konzentriert Galle (1 ✗); Ductus-cysticus-Verschluss → Hydrops, NICHT Ikterus (2 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/28] Karpaltunnelsyndrom: (1=Erst sensibel, dann motorisch, 2=Finger 1–3, 3=Nächtl. Schmerzen, 4=N. ulnaris, 5=Durchblutungsstörungen)', opts: ['Nur 1, 2 und 3 – Lösung A','Nur 1, 2 und 5','Nur 1, 3 und 4','Nur 2, 3 und 5'], ans: 0, exp: 'Lösung A – KTS = N. medianus-Kompression. Anfangs sensible Störungen (1 ✓) an Daumen, Zeige-, Mittelfinger (2 ✓), nachts verstärkt (3 ✓). Nicht N. ulnaris (4 ✗), keine Durchblutungsstörungen (5 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/29] Unterbringung psychisch Kranker – Welche Aussage trifft zu?', opts: ['PsychKG-Einweisung nur bei Eigengefährdung möglich','Betreuungsgesetz = zeitlich unbefristet','Betreuungsrecht erlaubt Unterbringung auch für ärztliche Untersuchungen – Lösung C','Psychiater kann selbst Unterbringung anordnen'], ans: 2, exp: 'Lösung C – § 1906 BGB: Unterbringung durch Betreuungsgericht auch zu notwendigen ärztlichen Maßnahmen möglich. PsychKG erlaubt Einweisung auch bei Fremdgefährdung; Unterbringung ist zeitlich befristet; kein Arzt kann allein einweisen.' },
  { cat: 'pruefung2022', q: '[FJ22/30] Basalzellkarzinom: (1=Lichtexponierte Areale, 2=OP = Therapie der Wahl, 3=Metastasiert häufig in Leber, 4="Schwarzer Hautkrebs", 5=Sonnenschutz verringert Risiko)', opts: ['Nur 1 und 2','Nur 1, 2 und 5 – Lösung B','Nur 2, 3 und 4','Nur 1, 2, 4 und 5'], ans: 1, exp: 'Lösung B – Basaliom: lichtexponiert (1 ✓), chirurgische Exzision Standard (2 ✓), Sonnenschutz prophylaktisch (5 ✓). Metastasiert kaum (3 ✗); "Schwarzer Hautkrebs" = Melanom (4 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/31] Der erste Herzton ist?', opts: ['Schluss der Aorten- und Pulmonalklappen','Korotkow-Geräusch beim Blutdruckmessen','Ein Anspannungston – Lösung C','Frühdiastolischer Füllungston'], ans: 2, exp: 'Lösung C – 1. Herzton = Anspannungston, entsteht beim Schluss der Mitral- und Trikuspidalklappe zu Beginn der Systole. 2. Herzton = Schluss der Aorten- und Pulmonalklappen.' },
  { cat: 'pruefung2022', q: '[FJ22/32] 18-jähriger nach Grippeinfektion: Gewichtsverlust, Durst, Abgeschlagenheit, häufiges Wasserlassen. Wahrscheinlichste Diagnose?', opts: ['Nephrotisches Syndrom','Diabetes mellitus – Lösung B','Lungenentzündung','Cushing-Syndrom'], ans: 1, exp: 'Lösung B – Klassische Manifestation des Typ-1-Diabetes nach Virusinfektion: Polyurie, Polydipsie, Gewichtsverlust, Abgeschlagenheit. Triggerung der Autoimmunreaktion durch Virus möglich.' },
  { cat: 'pruefung2022', q: '[FJ22/33] Akuter Gichtanfall: (1=Harnsäure stets erhöht, 2=Großzehengrundgelenk, 3=Ohrmuschel-Tophi, 4=Systemische Entzündungszeichen, 5=Trotz Therapie bleibende Deformationen)', opts: ['Nur 1 und 4','Nur 2 und 4 – Lösung B','Nur 1, 2 und 3','Nur 2, 4 und 5'], ans: 1, exp: 'Lösung B – Podagra: Großzehengrundgelenk (2 ✓), Fieber, Leukozytose, CRP↑ (4 ✓). Harnsäure kann im Anfall normal sein (1 ✗); Tophi erst bei chronischer Gicht (3 ✗); Deformationen unüblich bei guter Therapie (5 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/34] Lebererkrankungen bei i.v.-Drogenkonsum mit gemeinsamen Spritzen: Welche zwei?', opts: ['Hepatitis A / Alkoholische Fettleber','Hepatitis B / Hepatitis C – Lösung B+C','Hepatitis A / Hepatitis C','Alkoholfettleber / NASH'], ans: 1, exp: 'Lösung B+C – Hepatitis B und C werden parenteral übertragen (Blut, gemeinsame Nadeln). Hepatitis A = fäkal-oral. Alkohol-/NASH = keine parenterale Übertragung.' },
  { cat: 'pruefung2022', q: '[FJ22/35] Primäres Raynaud-Syndrom: (1=An Daumen, 2=Arteriosklerose, 3=Junge Frauen, 4=Trikolore-Phänomen: Blässe-Zyanose-Rötung, 5=Häufige Gangrän)', opts: ['Nur 1 und 3','Nur 3 und 4 – Lösung B','Nur 1, 4 und 5','Nur 2, 3 und 4'], ans: 1, exp: 'Lösung B – Primäres Raynaud: junge Frauen (3 ✓), vasomotorische Anfälle an Fingern 2–5 (nicht Daumen, 1 ✗), Trikolore-Phänomen (4 ✓). Nicht durch Arteriosklerose; Gangrän = sekundäres Raynaud.' },
  { cat: 'pruefung2022', q: '[FJ22/36] Schwere Lungenembolie – Symptome: (1=Dyspnoe, 2=Exspir. Stridor, 3=Tachykardie, 4=Thoraxschmerzen, 5=Erhöhte Atemfrequenz)', opts: ['Nur 1 und 4','Nur 1, 3 und 4','Nur 2, 3 und 5','Nur 1, 3, 4 und 5 – Lösung D'], ans: 3, exp: 'Lösung D – Lungenembolie: Dyspnoe (1 ✓), Tachykardie (3 ✓), Thoraxschmerz (4 ✓), Tachypnoe (5 ✓). Exspiratorischer Stridor = Bronchospasmus (z.B. Asthma), nicht Lungenembolie.' },
  { cat: 'pruefung2022', q: '[FJ22/37] Bauchspeicheldrüse: Welche zwei Aussagen treffen zu?', opts: ['Amylase baut Eiweiße ab / Glukagon senkt BZ','Endokriner Teil produziert Lipase / Pankreas bildet alkalischen Saft','Häufige Pankreatitis-Ursache = Alkohol / Pankreas bildet alkalischen Saft – Lösung C+D','Glukagon senkt BZ / Endokriner Teil = Lipase'], ans: 2, exp: 'Lösung C+D – Alkohol als häufigste Ursache akuter Pankreatitis (C ✓). Pankreas sezerniert alkalischen Verdauungssaft (D ✓, bikarbonatreich zur pH-Neutralisation im Duodenum). Amylase baut Stärke ab (nicht Eiweiß). Glukagon erhöht BZ.' },
  { cat: 'pruefung2022', q: '[FJ22/38] Körperliche Untersuchung: Welche zwei Aussagen treffen zu?', opts: ['Systolisches Geräusch = Mitralinsufizienz oder Aortenstenose / Tragusdruckschmerz = Otitis externa','Atemfrequenz 22–25/min = physiologisch / A. tibialis post. zwischen Außenknöchel und Achillessehne','Schilddrüse: Temp.-Unterschiede palpierbar / Keine Angaben zu Auskultation','Tragusdruckschmerz = Otitis externa / Atemfrequenz 22–25 = normal'], ans: 0, exp: 'Lösung A+E – Systolische Herzgeräusche häufig bei Mitralinsuffizienz und Aortenstenose (A ✓). Tragusdruckschmerz = Otitis externa (E ✓). Normfrequenz Erwachsener = 12–18/min (22–25 = Tachypnoe). A. tibialis post. = hinter Innenknöchel (nicht Außenknöchel).' },
  { cat: 'pruefung2022', q: '[FJ22/39] Direkte Mensch-zu-Mensch-Übertragung: Welche zwei?', opts: ['Borreliose / Malaria','Covid-19 / Keratokonjunktivitis epidemica – Lösung B+C','Legionellose / Borreliose','Malaria / Covid-19'], ans: 1, exp: 'Lösung B+C – Covid-19: Tröpfchen/Aerosole (B ✓). Keratokonjunktivitis epidemica (Adenoviren): direkter Kontakt, Schmierinfektion (C ✓). Borreliose/Malaria = Vektorkrankheiten; Legionellose = Aerosole aus Wassersystemen.' },
  { cat: 'pruefung2022', q: '[FJ22/40] Akute Glomerulonephritis: (1=Schmerzhafte Miktion, 2=Hypertonie, 3=Hämaturie, 4=Lidödeme, 5=Proteinurie)', opts: ['Nur 1 und 3','Nur 2 und 4','Nur 2, 3 und 5','Nur 2, 3, 4 und 5 – Lösung D'], ans: 3, exp: 'Lösung D – Akute GN (oft post-streptokokkös): Hypertonie (2 ✓), Hämaturie/Cola-Urin (3 ✓), Lidödeme morgens (4 ✓), Proteinurie (5 ✓). Schmerzhafte Miktion = Zystitis/Urethritis, nicht GN.' },
  { cat: 'pruefung2022', q: '[FJ22/41] Häufigste psychische Störung bei Erwachsenen?', opts: ['Schizophrenie','Heroinabhängigkeit','Angststörungen – Lösung C','Anorexia nervosa'], ans: 2, exp: 'Lösung C – Angststörungen sind die häufigsten psychischen Erkrankungen bei Erwachsenen (12-Monats-Prävalenz ca. 15%). Dazu gehören: Phobien, Panikstörung, generalisierte Angststörung.' },
  { cat: 'pruefung2022', q: '[FJ22/42] Doppelbilder bei welcher Lebensmittelvergiftung?', opts: ['Clostridium botulinum (Botulismus) – Lösung A','EHEC','Salmonella enterica','Staphylococcus aureus'], ans: 0, exp: 'Lösung A – Botulinum-Toxin blockiert Acetylcholinfreisetzung präsynaptisch → Lähmungen einschließlich Augenmuskellähmung (Diplopie, Ptosis), Schluckstörungen, Atemlähmung. Lebensbedrohlich!' },
  { cat: 'pruefung2022', q: '[FJ22/43] Patient erleidet Krampfanfall in der Praxis. Erstmaßnahmen: (1=Verletzungsgefahr reduzieren, 2=Rettungsdienst rufen, 3=Kissen unter Kopf, 4=Brille abnehmen, 5=Kiefer öffnen für Beißschutz)', opts: ['Nur 1, 2 und 4','Nur 1, 3 und 5','Nur 2, 3 und 4','Nur 1, 2, 3 und 4 – Lösung D'], ans: 3, exp: 'Lösung D – Beim Krampfanfall: Umgebung sichern (1 ✓), Notruf (2 ✓), Kopf schützen (3 ✓), Brille abnehmen (4 ✓). NIE Kiefer öffnen oder Gegenstände in den Mund stecken (Verletzungsgefahr, 5 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/44] Aderlass: (1=Bei Polyzythämie, 2=Hämatokrit↑ durch Aderlass, 3=Bei Eisenspeicherkrankheit, 4=Mehr als 2 L entnehmen, 5=Meldepflichtig für HP)', opts: ['Nur 1 und 3 – Lösung A','Nur 2 und 3','Nur 1, 2 und 3','Nur 1, 3 und 5'], ans: 0, exp: 'Lösung A – Therapeutischer Aderlass: Polyzythämia vera (1 ✓) und Hämochromatose/Eisenspeicherkrankheit (3 ✓). Durch Aderlass → Hämatokrit↓ (2 ✗). Entnahme ca. 500 ml (nicht 2 L, 4 ✗). Nicht meldepflichtig (5 ✗).' },
  { cat: 'pruefung2022', q: '[FJ22/45] Charakteristisch für Bronchospasmus?', opts: ['Giemen und Brummen – Lösung A','Bronchövesikuläres Atemgeräusch ohne Nebengeräusche','Zwerchfellhochstand','Hyposonorer Klopfschall'], ans: 0, exp: 'Lösung A – Bronchospasmus → Atemwegswiderstand↑ → turbulenter Fluss in verengten Bronchien → Giemen (hochfrequent, exspiratorisch) und Brummen (tieffrequent). Charakteristisch beim Asthmaanfall.' },
  { cat: 'pruefung2022', q: '[FJ22/46] Motivierende Gesprächsführung (Motivational Interviewing) – Welche Aussage trifft zu?', opts: ['Therapeut weist direkt auf Fehler hin','Therapeut vermeidet Diskussionen und konfrontatives Vorgehen – Lösung B','Bei jedem Klienten gleiches Vorgehen','Therapeut gibt möglichst viele Argumente für Verhaltensänderung'], ans: 1, exp: 'Lösung B – MI-Prinzipien: Empathie, "Roll with resistance" (keine Konfrontation), Diskrepanzentwicklung, Selbstwirksamkeit stärken. Der Therapeut begleitet, gibt keine Ratschläge, vermeidet Widerstand.' },
  { cat: 'pruefung2022', q: '[FJ22/47] Primärprävention: Welche zwei Maßnahmen?', opts: ['Krebsvorsorge / Herzsportgruppe nach Infarkt','Herzsportgruppe / Neugeborenen-Screening','Hygiene / Impfung – Lösung C+D','Krebsvorsorge / Impfung'], ans: 2, exp: 'Lösung C+D – Primärprävention = Vermeidung der Krankheitsentstehung: Hygiene (C ✓), Impfung (D ✓). Krebsvorsorge = Sekundärprävention (Früherkennung). Herzsportgruppe = Tertiärprävention. Neugeborenen-Screening = Sekundärprävention.' },
  { cat: 'pruefung2022', q: '[FJ22/48] 55-jähriger adipöser Mann, Krampfadern, Bein-Ödem, Ulkus über Innenknöchel, Fieber, scharf begrenzte schmerzhafte Rötung, heiße Haut. Verdachtsdiagnose?', opts: ['Erysipel – Lösung A','Impetigo contagiosa','Urtikaria','Venenentzündung'], ans: 0, exp: 'Lösung A – Erysipel (Wundrose): flammenförmige, scharf begrenzte, schmerzhafte Rötung + Fieber durch β-hämolysierende Streptokokken Gruppe A. Eintrittspforte oft das Unterschenkelulkus.' },
  { cat: 'pruefung2022', q: '[FJ22/49] Drogen und Symptome: Welche zwei Zuordnungen treffen zu?', opts: ['Benzodiazepine – Herzfrequenz↑ / Cannabis – Mydriasis','Cannabis – Mydriasis, gerötete Augen / GHB – Bewusstseinsstörungen – Lösung B+C','Halluzinogene – Miosis / Opioide – Blutdruck↑','Opioide – Pupillenweite / Benzodiazepine – Unruhe'], ans: 1, exp: 'Lösung B+C – Cannabis: Mydriasis, gerötete Bindehäute (B ✓). GHB (Liquid Ecstasy): Bewusstseinsstörungen bis Koma (C ✓). Benzodiazepine → Sedierung; Halluzinogene → Mydriasis; Opioide → Miosis, Blutdruck↓.' },
  { cat: 'pruefung2022', q: '[FJ22/50] Hygienische Händedesinfektion erforderlich – Alle 5 richtig?', opts: ['Nur Aussage 3','Nur 2 und 3','Nur 2, 4 und 5','Alle Aussagen sind richtig'], ans: 3, exp: 'Lösung E – Händedesinfektion vor/nach allen invasiven Maßnahmen, Wundversorgung, Patientenuntersuchungen und nach Handschuhablegen. Alle 5 Situationen erfordern Händedesinfektion.' },
  { cat: 'pruefung2022', q: '[FJ22/51] Delir: Welche zwei Aussagen treffen zu?', opts: ['Kein Bewusstseinsveränderung beim Delir / Akustische Halluzinationen nicht beim Alkoholdelir','Delir = Orientierungs- + Psychomotorik- + Wahrnehmungsstörung / Fremdbeurteilung bei klinischen Beobachtungen','Delir = keine Bewusstseinstörung / Testdauer Fremdbeurteilung = mehrere Stunden','Keine Halluzinationen beim Alkoholdelir / Fremdbeurteilung ungeeignet'], ans: 1, exp: 'Lösung C+E – Delir: Bewusstseinsstörung + Desorientiertheit + Halluzinationen + psychomotorische Unruhe (C ✓). Fremdbeurteilungsverfahren (z.B. CAM) basieren auf Verhaltensbeobachtung (E ✓). Alkoholdelir: typisch Tachykardie, Tremor, visuelle + akustische Halluzinationen.' },
  { cat: 'pruefung2022', q: '[FJ22/52] Welcher Tumor hat die ungünstigste Prognose?', opts: ['Lipom','Atherom','Myom','Sarkom – Lösung D'], ans: 3, exp: 'Lösung D – Das Sarkom ist ein maligner Tumor des Bindegewebes/Weichteilgewebes mit schlechter Prognose. Lipom, Atherom und Myom sind benigne (gutartige) Tumoren.' },

let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let currentCategory = '';

function buildCategories() {
  const grid = document.getElementById('cat-grid');
  // Add iOS class for grid styling
  grid.classList.add('ios-category-grid');
  
  CATEGORIES.forEach(cat => {
    const count = cat.id === 'mixed' ? QUESTIONS.length : QUESTIONS.filter(q => q.cat === cat.id).length;
    const card = document.createElement('button');
    card.className = 'ios-category-card';
    card.innerHTML = `
      <div class="ios-category-icon">${cat.icon}</div>
      <div class="ios-category-name">${cat.name}</div>
      <div class="ios-category-count">${count} Fragen</div>`;
    card.onclick = () => startQuiz(cat.id);
    grid.appendChild(card);
  });
}

function startQuiz(catId) {
  currentCategory = catId;
  let pool = catId === 'mixed' ? [...QUESTIONS] : QUESTIONS.filter(q => q.cat === catId);
  // shuffle
  pool = pool.sort(() => Math.random() - 0.5).slice(0, Math.min(10, pool.length));
  currentQuestions = pool;
  currentIndex = 0;
  score = 0;
  document.getElementById('category-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('q-total').textContent = currentQuestions.length;
  
  // Update iOS Nav Bar
  const catInfo = CATEGORIES.find(c => c.id === catId);
  updateIOSNavBar({
    title: catInfo ? catInfo.name : 'Quiz',
    showBack: true
  });
  
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = currentQuestions[currentIndex];
  const catInfo = CATEGORIES.find(c => c.id === q.cat);
  document.getElementById('q-num').textContent = currentIndex + 1;
  document.getElementById('score-display').textContent = '✓ ' + score;
  document.getElementById('progress-fill').style.width = (currentIndex / currentQuestions.length * 100) + '%';
  document.getElementById('q-tag').textContent = catInfo ? catInfo.name : q.cat;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-hint').textContent = '';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('explanation').className = 'explanation-box';
  document.getElementById('next-btn').style.display = 'none';

  const letters = ['A','B','C','D','E'];
  const container = document.getElementById('answers');
  container.innerHTML = '';
  container.classList.add('ios-answer-list');
  
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'ios-answer-btn';
    btn.innerHTML = `<span class="ios-answer-letter">${letters[i]}</span><span class="ios-answer-text">${opt}</span>`;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = currentQuestions[currentIndex];
  const btns = document.querySelectorAll('.ios-answer-btn');
  btns.forEach(b => b.disabled = true);
  const expBox = document.getElementById('explanation');

  if (idx === q.ans) {
    score++;
    btns[idx].classList.add('correct');
    expBox.className = 'ios-explanation success';
    expBox.innerHTML = `<div class="ios-explanation-title">✓ Richtig!</div><div class="ios-explanation-text">${q.exp}</div>`;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.ans].classList.add('correct');
    expBox.className = 'ios-explanation error';
    expBox.innerHTML = `<div class="ios-explanation-title">✗ Leider falsch</div><div class="ios-explanation-text">${q.exp}</div>`;
  }
  expBox.style.display = 'block';
  document.getElementById('score-display').textContent = '✓ ' + score;
  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('next-btn').textContent =
    currentIndex < currentQuestions.length - 1 ? 'Nächste Frage →' : 'Ergebnis anzeigen →';
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  
  // Update iOS Nav Bar
  updateIOSNavBar({
    title: 'Ergebnis',
    showBack: true
  });
  
  const total = currentQuestions.length;
  const pct = Math.round(score / total * 100);
  document.getElementById('res-right').textContent = score;
  document.getElementById('res-wrong').textContent = total - score;
  document.getElementById('res-total').textContent = total;
  const scoreEl = document.getElementById('res-score');
  scoreEl.textContent = pct + '%';
  scoreEl.className = 'ios-result-score ' + (pct >= 75 ? 'good' : pct >= 50 ? 'medium' : 'poor');
  let emoji, title, msg;
  if (pct >= 90) { emoji='🏆'; title='Ausgezeichnet!'; msg='Hervorragende Leistung! Du bist bestens für die Prüfung vorbereitet.'; }
  else if (pct >= 75) { emoji='🎓'; title='Sehr gut!'; msg='Solides Wissen! Noch ein wenig üben und du bist prüfungsbereit.'; }
  else if (pct >= 50) { emoji='📚'; title='Ausbaufähig'; msg='Gutes Fundament, aber einige Themen solltest du nochmals vertiefen.'; }
  else { emoji='💪'; title='Weiter üben!'; msg='Keine Sorge – wiederhole diese Themen und versuche es erneut!'; }
  document.getElementById('res-emoji').textContent = emoji;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-msg').textContent = msg;
}

function retryQuiz() {
  startQuiz(currentCategory);
}

function showCategories() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('category-screen').style.display = 'block';
  
  // Reset iOS Nav Bar
  updateIOSNavBar({
    title: 'Quiz',
    showBack: false
  });
}

function switchMainTab(tab) {
  const quizArea       = document.getElementById('quiz-area');
  const wissenArea     = document.getElementById('wissen-area');
  const termArea       = document.getElementById('terminologie-area');
  const diagnoseArea   = document.getElementById('diagnose-area');
  const pruefungArea   = document.getElementById('pruefung-area');
  const fehlerArea     = document.getElementById('fehler-area');
  const adminArea      = document.getElementById('admin-area');
  
  // Update iOS Tab Bar
  document.querySelectorAll('.ios-tab-item').forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`.ios-tab-item[data-tab="${tab}"]`);
  if (activeTab) activeTab.classList.add('active');
  
  // Update iOS Nav Title
  const navTitle = document.getElementById('nav-title');
  if (navTitle) navTitle.textContent = iosNavTitles[tab] || tab;
  
  // Legacy: Update old main-tab if present
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  
  // Hide all areas
  quizArea.style.display     = 'none';
  wissenArea.style.display   = 'none';
  termArea.style.display     = 'none';
  diagnoseArea.style.display = 'none';
  pruefungArea.style.display = 'none';
  fehlerArea.style.display   = 'none';
  adminArea.style.display    = 'none';
  
  // Show selected area
  if (tab === 'quiz') {
    quizArea.style.display = 'block';
    document.querySelectorAll('.main-tab')[0]?.classList.add('active');
  } else if (tab === 'wissen') {
    wissenArea.style.display = 'block';
    document.querySelectorAll('.main-tab')[1]?.classList.add('active');
    initWissen();
  } else if (tab === 'terminologie') {
    termArea.style.display = 'block';
    document.querySelectorAll('.main-tab')[2]?.classList.add('active');
    initTerminologie();
  } else if (tab === 'diagnose') {
    diagnoseArea.style.display = 'block';
    document.querySelectorAll('.main-tab')[3]?.classList.add('active');
    initDiagnoseSpiel();
  } else if (tab === 'pruefung') {
    pruefungArea.style.display = 'block';
    document.querySelectorAll('.main-tab')[4]?.classList.add('active');
    initPruefungstrainer();
  } else if (tab === 'fehler') {
    fehlerArea.style.display = 'block';
    initFehlerDashboard();
  } else if (tab === 'admin') {
    adminArea.style.display = 'block';
    document.querySelectorAll('.main-tab')[5]?.classList.add('active');
    initAdmin();
  }
  
  // Haptic feedback simulation (visual)
  if (activeTab) {
    activeTab.style.transform = 'scale(0.95)';
    setTimeout(() => activeTab.style.transform = '', 100);
  }
  
  // Re-initialize Lucide icons for dynamic content
  if (typeof lucide !== 'undefined') {
    setTimeout(() => lucide.createIcons(), 50);
  }
}

  showCategories();

// Update Nav Bar for different states
function updateIOSNavBar(options = {}) {
  const navTitle = document.getElementById('nav-title');
  const backBtn = document.getElementById('nav-back-btn');
  const actionBtn = document.getElementById('nav-action-btn');
  
  if (options.title && navTitle) {
    navTitle.textContent = options.title;
  }
  
  if (backBtn) {
    backBtn.style.visibility = options.showBack ? 'visible' : 'hidden';
  }
  
  if (actionBtn) {
    if (options.actionText) {
      actionBtn.textContent = options.actionText;
      actionBtn.style.visibility = 'visible';
      actionBtn.onclick = options.actionHandler || null;
    } else {
      actionBtn.style.visibility = 'hidden';
    }
  }
}

let karteikarten = {
  currentDeck: null,
  currentCardIndex: 0,
  cards: [],
  allCards: [],
  isFlipped: false,
  progress: {},
  shuffled: false,
  showOnlyUnlearned: false
};

// Karteikarten-Deck laden
async function loadKarteikartenDeck(deckId) {
  try {
    const [deckResponse, progressResponse] = await Promise.all([
      fetch(`/api/karteikarten/${deckId}`),
      fetch(`/api/karteikarten/${deckId}/progress`)
    ]);
    
    if (!deckResponse.ok) {
      throw new Error('Deck nicht gefunden');
    }
    
    const deck = await deckResponse.json();
    const progress = await progressResponse.json();
    
    karteikarten.currentDeck = deck;
    karteikarten.allCards = [...deck.cards];
    karteikarten.cards = [...deck.cards];
    karteikarten.progress = progress;
    karteikarten.currentCardIndex = 0;
    karteikarten.isFlipped = false;
    karteikarten.showOnlyUnlearned = false;
    
    return deck;
  } catch (e) {
    console.error('Fehler beim Laden der Karteikarten:', e);
    return null;
  }
}

// Karteikarten-Modal öffnen

// Modal schließen
function closeKarteikarten() {
  const modal = document.getElementById('karteikarten-modal');
  if (modal) {
    modal.remove();
    document.body.style.overflow = '';
    document.removeEventListener('keydown', handleKarteikartenKeydown);
  }
}

// Tastatur-Handler
function handleKarteikartenKeydown(e) {
  if (e.key === 'Escape') {
    closeKarteikarten();
  } else if (e.key === 'ArrowLeft') {
    prevKarteikarte();
  } else if (e.key === 'ArrowRight') {
    nextKarteikarte();
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    flipKarteikarte();
  } else if (e.key === '1' || e.key === 'n') {
    rateKarteikarte(false);
  } else if (e.key === '2' || e.key === 'j') {
    rateKarteikarte(true);
  }
}

// Prüfen ob Karte als gelernt gilt
function isCardLearned(cardId) {
  const progress = karteikarten.progress[cardId];
  return progress && progress.correct >= 1;
}

// Karte anzeigen
function showKarteikarte(index) {
  if (!karteikarten.cards || karteikarten.cards.length === 0) {
    // Keine Karten vorhanden (z.B. alle gefiltert)
    const cardEl = document.getElementById('kk-card');
    if (cardEl) {
      document.getElementById('kk-front-content').innerHTML = '<p style="text-align:center; color:#666;">Alle Karten gelernt! \ud83c\udf89<br><br>Klicke "Alle" um alle Karten zu sehen.</p>';
      document.getElementById('kk-category').textContent = '';
    }
    document.getElementById('kk-current').textContent = '0';
    document.getElementById('kk-total').textContent = '0';
    return;
  }
  
  if (index < 0) index = karteikarten.cards.length - 1;
  if (index >= karteikarten.cards.length) index = 0;
  
  karteikarten.currentCardIndex = index;
  karteikarten.isFlipped = false;
  
  const card = karteikarten.cards[index];
  const cardEl = document.getElementById('kk-card');
  const learned = isCardLearned(card.id);
  
  cardEl.classList.remove('flipped');
  cardEl.classList.toggle('kk-learned', learned);
  
  // Kategorie mit Gelernt-Badge
  const categoryEl = document.getElementById('kk-category');
  if (learned) {
    categoryEl.innerHTML = `${card.category || ''} <span class="kk-learned-badge">✓ Gelernt</span>`;
  } else {
    categoryEl.textContent = card.category || '';
  }
  
  document.getElementById('kk-front-content').innerHTML = formatKarteikartenText(card.front);
  document.getElementById('kk-back-content').innerHTML = formatKarteikartenText(card.back);
  document.getElementById('kk-current').textContent = index + 1;
  document.getElementById('kk-total').textContent = karteikarten.cards.length;
  
  const diffEl = document.getElementById('kk-difficulty');
  const stars = '⭐'.repeat(card.difficulty || 1);
  diffEl.innerHTML = `Schwierigkeit: ${stars}`;
  
  const tagsEl = document.getElementById('kk-tags');
  if (card.tags && card.tags.length > 0) {
    tagsEl.innerHTML = card.tags.map(t => `<span class="kk-tag">${t}</span>`).join('');
  } else {
    tagsEl.innerHTML = '';
  }
  
  document.getElementById('kk-rating').style.display = 'none';
  
  // Mastered-Status basierend auf altem Kriterium
  const progress = karteikarten.progress[card.id];
  if (progress && progress.attempts >= 3 && (progress.correct / progress.attempts) >= 0.8) {
    cardEl.classList.add('kk-mastered');
  } else {
    cardEl.classList.remove('kk-mastered');
  }
}

// Text formatieren
function formatKarteikartenText(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/↑/g, '<span class="kk-arrow-up">↑</span>')
    .replace(/↓/g, '<span class="kk-arrow-down">↓</span>')
    .replace(/→/g, '<span class="kk-arrow">→</span>')
    .replace(/💡/g, '<span class="kk-icon-tip">💡</span>')
    .replace(/⚠️/g, '<span class="kk-icon-warn">⚠️</span>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// Karte umdrehen
function flipKarteikarte() {
  const cardEl = document.getElementById('kk-card');
  karteikarten.isFlipped = !karteikarten.isFlipped;
  cardEl.classList.toggle('flipped', karteikarten.isFlipped);
  
  if (karteikarten.isFlipped) {
    document.getElementById('kk-rating').style.display = 'flex';
  }
}

// Nächste Karte
function nextKarteikarte() {
  showKarteikarte(karteikarten.currentCardIndex + 1);
}

// Vorherige Karte
function prevKarteikarte() {
  showKarteikarte(karteikarten.currentCardIndex - 1);
}

// Karteikarten mischen
function shuffleKarteikarten() {
  for (let i = karteikarten.cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [karteikarten.cards[i], karteikarten.cards[j]] = [karteikarten.cards[j], karteikarten.cards[i]];
  }
  karteikarten.shuffled = true;
  showKarteikarte(0);
}

// Karte bewerten
async function rateKarteikarte(correct) {
  const card = karteikarten.cards[karteikarten.currentCardIndex];
  const deckId = karteikarten.currentDeck.id;
  
  try {
    const response = await fetch(`/api/karteikarten/${deckId}/progress`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cardId: card.id,
        correct: correct,
        timestamp: new Date().toISOString()
      })
    });
    
    if (response.ok) {
      const result = await response.json();
      karteikarten.progress[card.id] = result.progress;
      updateKarteikartenProgress();
      
      const cardEl = document.getElementById('kk-card');
      cardEl.classList.add(correct ? 'kk-flash-correct' : 'kk-flash-wrong');
      setTimeout(() => {
        cardEl.classList.remove('kk-flash-correct', 'kk-flash-wrong');
        nextKarteikarte();
      }, 500);
    }
  } catch (e) {
    console.error('Fehler beim Speichern des Fortschritts:', e);
  }
}

// Fortschritts-Anzeige aktualisieren
function updateKarteikartenProgress() {
  // Fortschritt basiert immer auf ALLEN Karten, nicht nur gefilterten
  const total = karteikarten.allCards.length;
  let mastered = 0;
  
  for (const card of karteikarten.allCards) {
    if (isCardLearned(card.id)) {
      mastered++;
    }
  }
  
  const percent = total > 0 ? Math.round((mastered / total) * 100) : 0;
  document.getElementById('kk-progress-text').textContent = `${percent}%`;
}

// Filter für ungelernte Karten umschalten
function toggleUnlearnedFilter() {
  karteikarten.showOnlyUnlearned = !karteikarten.showOnlyUnlearned;
  
  const filterBtn = document.getElementById('kk-filter-btn');
  if (karteikarten.showOnlyUnlearned) {
    // Nur ungelernte Karten zeigen
    karteikarten.cards = karteikarten.allCards.filter(card => !isCardLearned(card.id));
    filterBtn.innerHTML = '📖 Ungelernte';
    filterBtn.classList.add('kk-filter-active');
  } else {
    // Alle Karten zeigen
    karteikarten.cards = [...karteikarten.allCards];
    filterBtn.innerHTML = '📚 Alle';
    filterBtn.classList.remove('kk-filter-active');
  }
  
  // Counter aktualisieren
  document.getElementById('kk-total').textContent = karteikarten.cards.length;
  
  // Zur ersten Karte springen
  karteikarten.currentCardIndex = 0;
  showKarteikarte(0);
}

// Fortschritt zurücksetzen
async function resetKarteikartenProgress(deckId) {
  if (!confirm('Möchtest du deinen Lernfortschritt für dieses Deck wirklich zurücksetzen?')) {
    return;
  }
  
  try {
    await fetch(`/api/karteikarten/${deckId}/progress`, { method: 'DELETE' });
    karteikarten.progress = {};
    
    // Filter zurücksetzen auf "Alle"
    karteikarten.showOnlyUnlearned = false;
    karteikarten.cards = [...karteikarten.allCards];
    const filterBtn = document.getElementById('kk-filter-btn');
    if (filterBtn) {
      filterBtn.innerHTML = '📚 Alle';
      filterBtn.classList.remove('kk-filter-active');
    }
    document.getElementById('kk-total').textContent = karteikarten.cards.length;
    
    updateKarteikartenProgress();
    showKarteikarte(0);
  } catch (e) {
    console.error('Fehler beim Zurücksetzen:', e);
  }
}

      <span class="kk-btn-text">Karteikarten lernen</span>
      <span class="kk-btn-arrow">→</span>
    </button>
  `;
}
