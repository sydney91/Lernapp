// Standard-Phasen für alle Diagnose-Fälle
const STANDARD_PHASES = [
  { id: 'anamnese', title: 'Anamnese', type: 'multiple' },
  { id: 'ursachen', title: 'Ursachen & Risikofaktoren', type: 'multiple' },
  { id: 'komplikationen', title: 'Komplikationen', type: 'multiple' },
  { id: 'diagnostik', title: 'Diagnostik', type: 'multiple' },
  { id: 'massnahmen', title: 'Maßnahmen', type: 'multiple' }
];

function createNewCase() {
  currentEditingCase = {
    id: 'case_' + Date.now(),
    name: '',
    icon: '🩺',
    category: '',
    subtitle: '',
    description: '',
    phases: STANDARD_PHASES.map(p => ({
      id: p.id,
      title: p.title,
      question: '',
      type: p.type,
      options: [],
      feedback: ''
    })),
    hints: []
  };
  renderCaseEditor();
}

function editDiagnoseCase(caseId) {
  const cases = getDiagnoseCases();
  const caseData = cases.find(c => c.id === caseId);
  if (caseData) {
    currentEditingCase = JSON.parse(JSON.stringify(caseData)); // Deep copy
    // Stelle sicher, dass alle 5 Standard-Phasen vorhanden sind
    STANDARD_PHASES.forEach((sp, idx) => {
      if (!currentEditingCase.phases[idx] || currentEditingCase.phases[idx].id !== sp.id) {
        // Phase fehlt oder ist falsch - füge Standard ein
        const existingPhase = currentEditingCase.phases.find(p => p.id === sp.id);
        if (existingPhase) {
          currentEditingCase.phases[idx] = existingPhase;
        } else {
          currentEditingCase.phases[idx] = {
            id: sp.id,
            title: sp.title,
            question: '',
            type: sp.type,
            options: [],
            feedback: ''
          };
        }
      }
      // Aktualisiere Titel auf Standard
      currentEditingCase.phases[idx].title = sp.title;
    });
    // Beschränke auf 5 Phasen
    currentEditingCase.phases = currentEditingCase.phases.slice(0, 5);
    renderCaseEditor();
  }
}

function renderCaseEditor() {
  const container = document.getElementById('admin-content');
  const c = currentEditingCase;
  
  const phasesHTML = c.phases.map((phase, idx) => `
    <div class="admin-phase-item" data-phase-idx="${idx}">
      <div class="admin-phase-header">
        <span class="admin-phase-num">Phase ${idx + 1}</span>
        <span class="admin-phase-title-fixed">${escapeHtml(phase.title)}</span>
        <select class="admin-select" onchange="updatePhaseField(${idx}, 'type', this.value)">
          <option value="single" ${phase.type === 'single' ? 'selected' : ''}>Einzelauswahl</option>
          <option value="multiple" ${phase.type === 'multiple' ? 'selected' : ''}>Mehrfachauswahl</option>
        </select>
      </div>
      <textarea class="admin-textarea" placeholder="Frage für diese Phase" onchange="updatePhaseField(${idx}, 'question', this.value)">${escapeHtml(phase.question || '')}</textarea>
      
      <div class="admin-options-section">
        <h5>Antwortoptionen:</h5>
        ${renderPhaseOptions(phase, idx)}
        <button class="admin-btn admin-btn-small" onclick="addPhaseOption(${idx})">+ Option hinzufügen</button>
      </div>
      
      <textarea class="admin-textarea admin-feedback" placeholder="Feedback nach Beantwortung" onchange="updatePhaseField(${idx}, 'feedback', this.value)">${escapeHtml(phase.feedback || '')}</textarea>
    </div>
  `).join('');
  
  const hintsHTML = c.hints.map((hint, idx) => `
    <div class="admin-hint-item">
      <input type="text" class="admin-input" value="${escapeHtml(hint)}" onchange="updateHint(${idx}, this.value)">
      <button class="admin-btn admin-btn-small admin-btn-delete" onclick="removeHint(${idx})">✕</button>
    </div>
  `).join('');
  
  container.innerHTML = `
    <div class="admin-editor">
      <div class="admin-editor-header">
        <button class="admin-btn" onclick="cancelEditing()">← Zurück</button>
        <h2>${c.name ? 'Fall bearbeiten' : 'Neuen Fall erstellen'}</h2>
        <button class="admin-btn admin-btn-primary" onclick="saveCurrentCase()">💾 Speichern</button>
      </div>
      
      <div class="admin-form-section">
        <h3>Grunddaten</h3>
        <div class="admin-form-row">
          <label>Name:</label>
          <input type="text" class="admin-input" id="case-name" value="${escapeHtml(c.name)}" placeholder="z.B. Aortenstenose">
        </div>
        <div class="admin-form-row">
          <label>Icon:</label>
          <input type="text" class="admin-input admin-input-small" id="case-icon" value="${c.icon}" placeholder="🩺">
        </div>
        <div class="admin-form-row">
          <label>Kategorie:</label>
          <input type="text" class="admin-input" id="case-category" value="${escapeHtml(c.category)}" placeholder="z.B. Kardiologie">
        </div>
        <div class="admin-form-row">
          <label>Untertitel:</label>
          <input type="text" class="admin-input" id="case-subtitle" value="${escapeHtml(c.subtitle)}" placeholder="Kurzbeschreibung">
        </div>
        <div class="admin-form-row">
          <label>Beschreibung:</label>
          <textarea class="admin-textarea" id="case-description" placeholder="Ausführliche Beschreibung des Falls">${escapeHtml(c.description || '')}</textarea>
        </div>
      </div>
      
      <div class="admin-form-section">
        <h3>Phasen (5 Standard-Phasen)</h3>
        <p style="color:#666;font-size:0.9rem;margin-bottom:1rem;">Die 5 Phasen sind fest vorgegeben. Bearbeite Fragen und Antwortoptionen für jede Phase.</p>
        <div class="admin-phases-list">
          ${phasesHTML}
        </div>
      </div>
      
      <div class="admin-form-section">
        <h3>Hinweise (${c.hints.length})</h3>
        <div class="admin-hints-list">
          ${hintsHTML}
        </div>
        <button class="admin-btn" onclick="addNewHint()">➕ Neuen Hinweis hinzufügen</button>
      </div>
    </div>
  `;
}

function renderPhaseOptions(phase, phaseIdx) {
  if (!phase.options || phase.options.length === 0) {
    return '<p class="admin-empty-small">Keine Optionen vorhanden</p>';
  }
  
  return phase.options.map((opt, optIdx) => `
    <div class="admin-option-item">
      <input type="checkbox" ${opt.correct ? 'checked' : ''} onchange="updateOptionCorrect(${phaseIdx}, ${optIdx}, this.checked)">
      <input type="text" class="admin-input" value="${escapeHtml(opt.text)}" onchange="updateOptionText(${phaseIdx}, ${optIdx}, this.value)">
      <button class="admin-btn admin-btn-small admin-btn-delete" onclick="removeOption(${phaseIdx}, ${optIdx})">✕</button>
    </div>
  `).join('');
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function updatePhaseField(phaseIdx, field, value) {
  if (currentEditingCase && currentEditingCase.phases[phaseIdx]) {
    currentEditingCase.phases[phaseIdx][field] = value;
  }
}

function updateOptionText(phaseIdx, optIdx, value) {
  if (currentEditingCase?.phases[phaseIdx]?.options[optIdx]) {
    currentEditingCase.phases[phaseIdx].options[optIdx].text = value;
  }
}

function updateOptionCorrect(phaseIdx, optIdx, checked) {
  if (currentEditingCase?.phases[phaseIdx]?.options[optIdx]) {
    currentEditingCase.phases[phaseIdx].options[optIdx].correct = checked;
  }
}

function updateHint(idx, value) {
  if (currentEditingCase && currentEditingCase.hints[idx] !== undefined) {
    currentEditingCase.hints[idx] = value;
  }
}

function addPhaseOption(phaseIdx) {
  if (currentEditingCase?.phases[phaseIdx]) {
    if (!currentEditingCase.phases[phaseIdx].options) {
      currentEditingCase.phases[phaseIdx].options = [];
    }
    currentEditingCase.phases[phaseIdx].options.push({ text: '', correct: false });
    renderCaseEditor();
  }
}

function removeOption(phaseIdx, optIdx) {
  if (currentEditingCase?.phases[phaseIdx]?.options) {
    currentEditingCase.phases[phaseIdx].options.splice(optIdx, 1);
    renderCaseEditor();
  }
}

function addNewHint() {
  if (currentEditingCase) {
    currentEditingCase.hints.push('');
    renderCaseEditor();
  }
}

function removeHint(idx) {
  if (currentEditingCase) {
    currentEditingCase.hints.splice(idx, 1);
    renderCaseEditor();
  }
}

function saveCurrentCase() {
  if (!currentEditingCase) return;
  
  // Daten aus Formular übernehmen
  currentEditingCase.name = document.getElementById('case-name').value.trim();
  currentEditingCase.icon = document.getElementById('case-icon').value.trim() || '🩺';
  currentEditingCase.category = document.getElementById('case-category').value.trim();
  currentEditingCase.subtitle = document.getElementById('case-subtitle').value.trim();
  currentEditingCase.description = document.getElementById('case-description').value.trim();
  
  if (!currentEditingCase.name) {
    alert('Bitte gib einen Namen für den Fall ein.');
    return;
  }
  
  let cases = getDiagnoseCases();
  const existingIdx = cases.findIndex(c => c.id === currentEditingCase.id);
  
  if (existingIdx >= 0) {
    cases[existingIdx] = currentEditingCase;
  } else {
    cases.push(currentEditingCase);
  }
  
  if (saveDiagnoseCases(cases)) {
    alert('Fall erfolgreich gespeichert!');
    currentEditingCase = null;
    initAdmin();
  } else {
    alert('Fehler beim Speichern!');
  }
}

function cancelEditing() {
  currentEditingCase = null;
  initAdmin();
}

function deleteDiagnoseCase(caseId) {
  if (!confirm('Diesen Fall wirklich löschen?')) return;
  
  let cases = getDiagnoseCases();
  cases = cases.filter(c => c.id !== caseId);
  
  if (saveDiagnoseCases(cases)) {
    initAdmin();
  } else {
    alert('Fehler beim Löschen!');
  }
}

function exportCasesToJSON() {
  const cases = getDiagnoseCases();
  const data = {
    version: '1.0',
    exportDate: new Date().toISOString(),
    cases: cases
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'diagnose-cases_' + new Date().toISOString().split('T')[0] + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importCasesFromJSON(file) {
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      let casesToImport = [];
      
      // Unterstütze verschiedene Formate
      if (Array.isArray(data)) {
        casesToImport = data;
      } else if (data.cases && Array.isArray(data.cases)) {
        casesToImport = data.cases;
      } else {
        throw new Error('Ungültiges Format');
      }
      
      if (casesToImport.length === 0) {
        alert('Keine Fälle in der Datei gefunden.');
        return;
      }
      
      const mode = confirm(`${casesToImport.length} Fall/Fälle gefunden.\n\nOK = Hinzufügen zu bestehenden Fällen\nAbbrechen = Alle ersetzen`);
      
      let cases = mode ? getDiagnoseCases() : [];
      
      // Duplikate vermeiden basierend auf ID
      casesToImport.forEach(newCase => {
        const existingIdx = cases.findIndex(c => c.id === newCase.id);
        if (existingIdx >= 0) {
          cases[existingIdx] = newCase;
        } else {
          cases.push(newCase);
        }
      });
      
      if (saveDiagnoseCases(cases)) {
        alert(`${casesToImport.length} Fall/Fälle erfolgreich importiert!`);
        initAdmin();
      }
    } catch (err) {
      alert('Fehler beim Importieren: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function resetToDefaults() {
  if (!confirm('Alle Änderungen verwerfen und auf Standard-Fälle zurücksetzen?')) return;
  
  localStorage.removeItem(DIAGNOSE_STORAGE_KEY);
  alert('Zurückgesetzt auf Standard-Fälle.');
  initAdmin();
}

// Prüfungstrainer State
let currentPruefungsfall = null;
let currentPruefungsPhase = 0;
let pruefungsAntworten = {};
let pruefungsScore = 0;
let pruefungsTotalPunkte = 0;
let pruefungsStartTime = null;
let pruefungsTimerInterval = null;
let pruefungsChatHistory = [];

function initPruefungstrainer() {
  const container = document.getElementById('pruefung-content');
  renderPruefungsfallauswahl(container);
}

function renderPruefungsfallauswahl(container) {
  const faelleHTML = PRUEFUNGS_FAELLE.map(f => `
    <div class="pruefung-case-card" onclick="startPruefung('${f.id}')">
      <div class="pruefung-case-icon">${f.icon}</div>
      <div class="pruefung-case-name">${f.name}</div>
      <div class="pruefung-case-desc">${f.description}</div>
      <span class="pruefung-case-difficulty difficulty-${f.difficulty}">${f.difficulty.charAt(0).toUpperCase() + f.difficulty.slice(1)}</span>
    </div>
  `).join('');

  container.innerHTML = `
    <div class="pruefung-intro">
      <h2>🎓 Prüfungstrainer</h2>
      <p>Simuliere eine mündliche Heilpraktiker-Prüfung mit realistischen Patientenfällen. Übe Anamnese, Diagnostik und Therapieempfehlungen.</p>
    </div>
    <div class="screen-title">Wähle einen Prüfungsfall</div>
    <div class="screen-sub">Klicke auf einen Fall, um die Prüfungssimulation zu starten (ca. 30-45 Min.)</div>
    <div class="pruefung-case-grid">
      ${faelleHTML}
    </div>
  `;
}

function startPruefung(fallId) {
  currentPruefungsfall = PRUEFUNGS_FAELLE.find(f => f.id === fallId);
  if (!currentPruefungsfall) return;
  
  currentPruefungsPhase = 0;
  pruefungsAntworten = {};
  pruefungsScore = 0;
  pruefungsTotalPunkte = 0;
  pruefungsChatHistory = [];
  pruefungsStartTime = Date.now();
  
  // Timer starten
  if (pruefungsTimerInterval) clearInterval(pruefungsTimerInterval);
  pruefungsTimerInterval = setInterval(updatePruefungsTimer, 1000);
  
  renderPruefungsPhase();
}

function updatePruefungsTimer() {
  const timerEl = document.getElementById('pruefung-timer');
  if (!timerEl || !pruefungsStartTime) return;
  
  const elapsed = Math.floor((Date.now() - pruefungsStartTime) / 1000);
  const minutes = Math.floor(elapsed / 60);
  const seconds = elapsed % 60;
  timerEl.textContent = `⏱ ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
}

function renderPruefungsPhase() {
  const container = document.getElementById('pruefung-content');
  const fall = currentPruefungsfall;
  const phase = fall.phases[currentPruefungsPhase];
  
  // Chat-Nachricht vom Prüfer hinzufügen
  if (phase.pruefer && !pruefungsChatHistory.find(m => m.phaseId === phase.id && m.type === 'pruefer')) {
    pruefungsChatHistory.push({
      phaseId: phase.id,
      type: 'pruefer',
      text: phase.pruefer
    });
  }
  
  // Szenario beim ersten Mal hinzufügen
  if (currentPruefungsPhase === 0 && !pruefungsChatHistory.find(m => m.type === 'scenario')) {
    pruefungsChatHistory.unshift({
      type: 'scenario',
      text: fall.scenario
    });
  }
  
  const phasesBarHTML = fall.phases.map((p, i) => {
    let cls = 'pruefung-phase';
    if (i < currentPruefungsPhase) cls += ' completed';
    if (i === currentPruefungsPhase) cls += ' active';
    return `<div class="${cls}">${p.title}</div>`;
  }).join('');
  
  const chatHTML = pruefungsChatHistory.map(msg => {
    if (msg.type === 'scenario') {
      return `
        <div class="chat-message">
          <div class="chat-avatar pruefer">📋</div>
          <div class="chat-content">
            <div class="chat-sender pruefer">Prüfungsszenario</div>
            <div class="chat-bubble system">${msg.text}</div>
          </div>
        </div>
      `;
    } else if (msg.type === 'pruefer') {
      return `
        <div class="chat-message">
          <div class="chat-avatar pruefer">👨‍⚕️</div>
          <div class="chat-content">
            <div class="chat-sender pruefer">Prüfer (Amtsarzt)</div>
            <div class="chat-bubble pruefer">${msg.text}</div>
          </div>
        </div>
      `;
    } else if (msg.type === 'patient') {
      return `
        <div class="chat-message">
          <div class="chat-avatar patient">${fall.patient.avatar}</div>
          <div class="chat-content">
            <div class="chat-sender patient">${fall.patient.name} (Patient)</div>
            <div class="chat-bubble patient">${msg.text}</div>
          </div>
        </div>
      `;
    } else if (msg.type === 'kandidat') {
      return `
        <div class="chat-message" style="flex-direction: row-reverse;">
          <div class="chat-avatar kandidat">🧑‍🎓</div>
          <div class="chat-content" style="text-align: right;">
            <div class="chat-sender kandidat">Sie (Prüfungskandidat)</div>
            <div class="chat-bubble kandidat">${msg.text}</div>
          </div>
        </div>
      `;
    } else if (msg.type === 'feedback') {
      return `
        <div class="chat-message">
          <div class="chat-avatar pruefer">✅</div>
          <div class="chat-content">
            <div class="chat-sender pruefer">Bewertung</div>
            <div class="chat-bubble system">${msg.text}</div>
          </div>
        </div>
      `;
    }
    return '';
  }).join('');
  
  let inputAreaHTML = '';
  
  if (phase.frageTyp === 'freetext') {
    inputAreaHTML = `
      <div class="pruefung-hint-box" id="hint-box">
        <h4><i data-lucide="info" style="width:16px;height:16px;stroke-width:1.8;vertical-align:middle;margin-right:6px;"></i>Hilfestellung</h4>
        <p>Denken Sie an: Strukturiertes Vorgehen, alle relevanten Aspekte abfragen, auf den Patienten eingehen.</p>
      </div>
      <p><strong>${phase.aufgabe}</strong></p>
      <textarea class="pruefung-textarea" id="pruefung-antwort" placeholder="Geben Sie Ihre Antwort ein..."></textarea>
      <div class="pruefung-actions">
        <button class="pruefung-btn pruefung-btn-secondary" onclick="backToPruefungsfaelle()"><i data-lucide="chevron-left" style="width:16px;height:16px;stroke-width:2;vertical-align:middle;"></i> Abbrechen</button>
        <button class="pruefung-btn pruefung-btn-hint" onclick="toggleHint()"><i data-lucide="info" style="width:16px;height:16px;stroke-width:1.8;vertical-align:middle;margin-right:4px;"></i>Tipp</button>
        <button class="pruefung-btn pruefung-btn-primary" onclick="submitPruefungsAntwort()">Antwort abgeben <i data-lucide="chevron-right" style="width:16px;height:16px;stroke-width:2;vertical-align:middle;"></i></button>
      </div>
    `;
  } else if (phase.frageTyp === 'multiple' || phase.frageTyp === 'single') {
    const inputType = phase.frageTyp === 'single' ? 'radio' : 'checkbox';
    const optionenHTML = phase.optionen.map((opt, i) => `
      <label class="pruefung-option" onclick="this.classList.toggle('selected')">
        <input type="${inputType}" name="pruefung-option" value="${i}">
        <span class="pruefung-option-text">${opt.text}</span>
      </label>
    `).join('');
    
    inputAreaHTML = `
      <p><strong>${phase.aufgabe}</strong></p>
      ${phase.befunde ? `<div class="pruefung-hint-box visible"><h4>📋 Befunde</h4><p>${phase.befunde}</p></div>` : ''}
      <div class="pruefung-options">
        ${optionenHTML}
      </div>
      <div class="pruefung-actions">
        <button class="pruefung-btn pruefung-btn-secondary" onclick="backToPruefungsfaelle()">← Abbrechen</button>
        <button class="pruefung-btn pruefung-btn-primary" onclick="submitPruefungsAntwort()">Antwort abgeben →</button>
      </div>
    `;
  }
  
  container.innerHTML = `
    <div class="pruefung-simulation">
      <div class="pruefung-header">
        <div class="pruefung-header-info">
          <h3>${fall.icon} ${fall.name}</h3>
          <p>Phase ${currentPruefungsPhase + 1} von ${fall.phases.length}</p>
        </div>
        <div class="pruefung-timer" id="pruefung-timer">⏱ 00:00</div>
      </div>
      
      <div class="pruefung-phase-bar">
        ${phasesBarHTML}
      </div>
      
      <div class="pruefung-chat" id="pruefung-chat">
        ${chatHTML}
      </div>
      
      <div class="pruefung-input-area">
        ${inputAreaHTML}
      </div>
    </div>
  `;
  
  // Timer sofort aktualisieren
  updatePruefungsTimer();
  
  // Chat nach unten scrollen
  setTimeout(() => {
    const chatEl = document.getElementById('pruefung-chat');
    if (chatEl) chatEl.scrollTop = chatEl.scrollHeight;
  }, 100);
}

function toggleHint() {
  const hintBox = document.getElementById('hint-box');
  if (hintBox) {
    hintBox.classList.toggle('visible');
  }
}

function submitPruefungsAntwort() {
  const phase = currentPruefungsfall.phases[currentPruefungsPhase];
  let antwortText = '';
  let punkte = 0;
  let maxPunkte = 0;
  let feedbackItems = [];
  
  if (phase.frageTyp === 'freetext') {
    const textarea = document.getElementById('pruefung-antwort');
    antwortText = textarea ? textarea.value.trim() : '';
    
    if (!antwortText) {
      alert('Bitte geben Sie eine Antwort ein.');
      return;
    }
    
    // Bewertung nach Keywords
    maxPunkte = phase.maxPunkte || 10;
    const antwortLower = antwortText.toLowerCase();
    
    phase.bewertungskriterien.forEach(kriterium => {
      const regex = new RegExp(kriterium.keyword, 'i');
      if (regex.test(antwortLower)) {
        punkte += kriterium.punkte;
        feedbackItems.push({ text: kriterium.feedback, correct: true });
      }
    });
    
  } else if (phase.frageTyp === 'multiple' || phase.frageTyp === 'single') {
    const checked = document.querySelectorAll('input[name="pruefung-option"]:checked');
    const selectedIndices = Array.from(checked).map(c => parseInt(c.value));
    
    if (selectedIndices.length === 0) {
      alert('Bitte wählen Sie mindestens eine Option.');
      return;
    }
    
    antwortText = selectedIndices.map(i => phase.optionen[i].text).join(', ');
    
    // Bewertung
    phase.optionen.forEach((opt, i) => {
      const isSelected = selectedIndices.includes(i);
      if (opt.correct) {
        maxPunkte += 1;
        if (isSelected) {
          punkte += 1;
          feedbackItems.push({ text: opt.text, correct: true });
        } else {
          feedbackItems.push({ text: `Nicht gewählt: ${opt.text}`, correct: false, missed: true });
        }
      } else if (isSelected) {
        punkte -= 0.5; // Malus für falsche Auswahl
        feedbackItems.push({ text: opt.text, correct: false });
      }
    });
    punkte = Math.max(0, punkte);
  }
  
  // Antwort speichern
  pruefungsAntworten[phase.id] = {
    antwort: antwortText,
    punkte: punkte,
    maxPunkte: maxPunkte,
    feedbackItems: feedbackItems
  };
  
  pruefungsScore += punkte;
  pruefungsTotalPunkte += maxPunkte;
  
  // Chat aktualisieren
  pruefungsChatHistory.push({
    type: 'kandidat',
    text: antwortText.length > 200 ? antwortText.substring(0, 200) + '...' : antwortText
  });
  
  // Feedback anzeigen
  const prozent = Math.round((punkte / maxPunkte) * 100);
  let feedbackText = `<strong>Bewertung: ${punkte.toFixed(1)} / ${maxPunkte} Punkte (${prozent}%)</strong><br><br>`;
  
  if (phase.feedback) {
    feedbackText += phase.feedback;
  }
  
  pruefungsChatHistory.push({
    type: 'feedback',
    text: feedbackText
  });
  
  // Nächste Phase oder Ergebnis
  if (currentPruefungsPhase < currentPruefungsfall.phases.length - 1) {
    currentPruefungsPhase++;
    renderPruefungsPhase();
  } else {
    showPruefungsErgebnis();
  }
}

function showPruefungsErgebnis() {
  if (pruefungsTimerInterval) {
    clearInterval(pruefungsTimerInterval);
    pruefungsTimerInterval = null;
  }
  
  const container = document.getElementById('pruefung-content');
  const fall = currentPruefungsfall;
  const elapsed = Math.floor((Date.now() - pruefungsStartTime) / 1000);
  const minutes = Math.floor(elapsed / 60);
  const seconds = elapsed % 60;
  
  const prozent = Math.round((pruefungsScore / pruefungsTotalPunkte) * 100);
  const bestanden = prozent >= 60;
  
  const phasenFeedbackHTML = Object.entries(pruefungsAntworten).map(([phaseId, data]) => {
    const phase = fall.phases.find(p => p.id === phaseId);
    const phaseProzent = Math.round((data.punkte / data.maxPunkte) * 100);
    let status = 'partial';
    if (phaseProzent >= 80) status = 'correct';
    else if (phaseProzent < 50) status = 'incorrect';
    
    return `
      <div class="pruefung-feedback-item ${status}">
        <div>
          <strong>${phase.title}</strong>: ${data.punkte.toFixed(1)} / ${data.maxPunkte} Punkte (${phaseProzent}%)
        </div>
      </div>
    `;
  }).join('');
  
  container.innerHTML = `
    <div class="pruefung-result">
      <div class="pruefung-result-icon">${bestanden ? '🎉' : '📚'}</div>
      <h2>${bestanden ? 'Prüfung bestanden!' : 'Weiter üben empfohlen'}</h2>
      <div class="pruefung-result-score ${bestanden ? 'passed' : 'failed'}">${prozent}%</div>
      <p>${pruefungsScore.toFixed(1)} von ${pruefungsTotalPunkte} Punkten erreicht</p>
      <p style="color: #666;">Zeit: ${minutes}:${seconds.toString().padStart(2, '0')} Minuten</p>
      
      <div class="pruefung-feedback-section">
        <h4><i data-lucide="chart-line" style="width:18px;height:18px;stroke-width:1.8;vertical-align:middle;margin-right:6px;"></i>Ergebnis nach Prüfungsphasen</h4>
        ${phasenFeedbackHTML}
      </div>
      
      <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
        <button class="pruefung-btn pruefung-btn-secondary" onclick="backToPruefungsfaelle()"><i data-lucide="chevron-left" style="width:16px;height:16px;stroke-width:2;vertical-align:middle;"></i> Zur Fallauswahl</button>
        <button class="pruefung-btn pruefung-btn-primary" onclick="startPruefung('${fall.id}')"><i data-lucide="refresh-cw" style="width:16px;height:16px;stroke-width:1.8;vertical-align:middle;margin-right:4px;"></i>Nochmal versuchen</button>
      </div>
    </div>
  `;
}

function backToPruefungsfaelle() {
  if (pruefungsTimerInterval) {
    clearInterval(pruefungsTimerInterval);
    pruefungsTimerInterval = null;
  }
  currentPruefungsfall = null;
  currentPruefungsPhase = 0;
  initPruefungstrainer();
}

let videosServerAvailable = false;

async function checkVideosServerAvailability() {
  try {
    const response = await fetch('/api/videos', { method: 'GET' });
    videosServerAvailable = response.ok;
    return videosServerAvailable;
  } catch (e) {
    videosServerAvailable = false;
    return false;
  }
}

// Videos für ein Topic laden
async function getVideosForTopic(topicId) {
  // Versuche vom Server zu laden
  try {
    const response = await fetch(`/api/videos/${topicId}`);
    if (response.ok) {
      return await response.json();
    }
  } catch (e) {
    console.log('Videos-API nicht verfügbar');
  }
  
  // Fallback: localStorage
  try {
    const stored = localStorage.getItem('heilpraktiker_videos');
    if (stored) {
      const data = JSON.parse(stored);
      return data[topicId] || [];
    }
  } catch (e) {}
  return [];
}

// Video hinzufügen
async function addVideo(topicId, videoData) {
  // Versuche über Server zu speichern
  try {
    const response = await fetch(`/api/videos/${topicId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(videoData)
    });
    
    if (response.ok) {
      const video = await response.json();
      console.log('✓ Video auf Server gespeichert');
      return video;
    }
    
    const error = await response.json();
    throw new Error(error.error || 'Fehler beim Speichern');
  } catch (e) {
    // Fallback: localStorage
    console.log('Speichere Video lokal:', e.message);
    
    // YouTube ID extrahieren
    let videoId = null;
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
      /^([a-zA-Z0-9_-]{11})$/
    ];
    for (const pattern of patterns) {
      const match = videoData.url.match(pattern);
      if (match) {
        videoId = match[1];
        break;
      }
    }
    
    if (!videoId) {
      throw new Error('Ungültige YouTube-URL');
    }
    
    const stored = localStorage.getItem('heilpraktiker_videos') || '{}';
    const data = JSON.parse(stored);
    if (!data[topicId]) data[topicId] = [];
    
    // Prüfe ob bereits vorhanden
    if (data[topicId].some(v => v.videoId === videoId)) {
      throw new Error('Dieses Video wurde bereits hinzugefügt');
    }
    
    const video = {
      id: Date.now(),
      videoId: videoId,
      url: `https://www.youtube.com/watch?v=${videoId}`,
      title: videoData.title || 'YouTube Video',
      channel: videoData.channel || '',
      description: videoData.description || '',
      addedAt: new Date().toISOString()
    };
    
    data[topicId].push(video);
    localStorage.setItem('heilpraktiker_videos', JSON.stringify(data));
    return video;
  }
}

// Video löschen
async function deleteVideo(topicId, videoId) {
  // Versuche über Server zu löschen
  try {
    const response = await fetch(`/api/videos/${topicId}/${videoId}`, {
      method: 'DELETE'
    });
    
    if (response.ok) {
      console.log('✓ Video vom Server gelöscht');
      return;
    }
  } catch (e) {
    console.log('Lösche Video lokal');
  }
  
  // Fallback: localStorage
  const stored = localStorage.getItem('heilpraktiker_videos') || '{}';
  const data = JSON.parse(stored);
  if (data[topicId]) {
    data[topicId] = data[topicId].filter(v => v.id !== videoId);
    localStorage.setItem('heilpraktiker_videos', JSON.stringify(data));
  }
}

// Videos laden und anzeigen
async function loadAndRenderVideos(topicId) {
  const container = document.getElementById(`video-list-${topicId}`);
  if (!container) return;
  
  try {
    const videos = await getVideosForTopic(topicId);
    
    if (videos.length === 0) {
      container.innerHTML = `
        <div class="videos-empty">
          <div class="videos-empty-icon">🎬</div>

// API-Basis-URL (für lokale Entwicklung)
const API_BASE = '';

// Prüfe ob Server verfügbar ist
let serverAvailable = false;

async function checkServerAvailability() {
  try {
    const response = await fetch('/api/anhaenge', { method: 'GET' });
    serverAvailable = response.ok;
    if (serverAvailable) {
      console.log('✓ Backend-Server verfügbar - Daten werden auf Server gespeichert');
    }
  } catch (e) {
    serverAvailable = false;
    console.log('Backend-Server nicht verfügbar - Fallback auf localStorage');
  }
  return serverAvailable;
}

// ═══════════════════════════════════════════════════════════════
// API-BASIERTE FUNKTIONEN (wenn Server läuft)
// ═══════════════════════════════════════════════════════════════

async function getAnhaengeForTopic(topicId) {
  if (!serverAvailable) {
    return getAnhaengeForTopicLocal(topicId);
  }
  
  try {
    const response = await fetch(`/api/anhaenge/${topicId}`);
    if (response.ok) {
      return await response.json();
    }
  } catch (e) {
    console.warn('API-Fehler, Fallback auf localStorage:', e);
  }
  return getAnhaengeForTopicLocal(topicId);
}

async function addAnhang(topicId, file) {
  if (!serverAvailable) {
    return addAnhangLocal(topicId, file);
  }
  
  try {
    const formData = new FormData();
    formData.append('file', file);
    
    const response = await fetch(`/api/anhaenge/${topicId}`, {
      method: 'POST',
      body: formData
    });
    
    if (response.ok) {
      const anhang = await response.json();
      console.log('✓ Anhang auf Server gespeichert');
      return anhang.id;
    }
  } catch (e) {
    console.warn('API-Fehler, Fallback auf localStorage:', e);
  }
  return addAnhangLocal(topicId, file);
}

async function deleteAnhang(id, topicId) {
  if (!serverAvailable) {
    return deleteAnhangLocal(id, topicId);
  }
  
  try {
    const response = await fetch(`/api/anhaenge/${topicId}/${id}`, {
      method: 'DELETE'
    });
    
    if (response.ok) {
      console.log('✓ Anhang vom Server gelöscht');
      return;
    }
  } catch (e) {
    console.warn('API-Fehler, Fallback auf localStorage:', e);
  }
  return deleteAnhangLocal(id, topicId);
}

// LOKALE FALLBACK-FUNKTIONEN (wenn kein Server)
// ═══════════════════════════════════════════════════════════════

const LOCAL_ANHAENGE_KEY = 'heilpraktiker_anhaenge_local';

function getLocalAnhaenge() {
  try {
    return JSON.parse(localStorage.getItem(LOCAL_ANHAENGE_KEY) || '{}');
  } catch (e) {
    return {};
  }
}

function saveLocalAnhaenge(data) {
  try {
    localStorage.setItem(LOCAL_ANHAENGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn('localStorage voll:', e);
  }
}

function getAnhaengeForTopicLocal(topicId) {
  const data = getLocalAnhaenge();
  return data[topicId] || [];
}

async function addAnhangLocal(topicId, file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const data = getLocalAnhaenge();
      if (!data[topicId]) data[topicId] = [];
      
      const anhang = {
        id: Date.now(),
        name: file.name,
        type: file.type,
        size: file.size,
        data: reader.result,
        addedAt: new Date().toISOString()
      };
      
      data[topicId].push(anhang);
      saveLocalAnhaenge(data);
      resolve(anhang.id);
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

function deleteAnhangLocal(id, topicId) {
  const data = getLocalAnhaenge();
  if (data[topicId]) {
    data[topicId] = data[topicId].filter(a => a.id !== id);
    saveLocalAnhaenge(data);
  }
}

// Initialisierung
async function initAnhaengeDB() {
  await checkServerAvailability();
  return true;
}

// Anhänge als JSON exportieren (für Backup)
async function exportAnhaengeToJSON() {
  try {
    const anhaenge = await getAllAnhaenge();
    if (anhaenge.length === 0) {
      alert('Keine Anhänge zum Exportieren vorhanden.');
      return;
    }
    
    const data = {
      version: '1.0',
      exportDate: new Date().toISOString(),
      anhaenge: anhaenge
    };
    
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'wissen-anhaenge_' + new Date().toISOString().split('T')[0] + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    alert(`${anhaenge.length} Anhänge erfolgreich exportiert!`);
  } catch (e) {
    alert('Fehler beim Exportieren: ' + e.message);
  }
}

// Anhänge aus JSON importieren
async function importAnhaengeFromJSON(file) {
  if (!file) return;
  
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    
    let anhaengeToImport = [];
    
    // Unterstütze verschiedene Formate
    if (Array.isArray(data)) {
      anhaengeToImport = data;
    } else if (data.anhaenge && Array.isArray(data.anhaenge)) {
      anhaengeToImport = data.anhaenge;
    } else {
      throw new Error('Ungültiges Format');
    }
    
    if (anhaengeToImport.length === 0) {
      alert('Keine Anhänge in der Datei gefunden.');
      return;
    }
    
    const mode = confirm(`${anhaengeToImport.length} Anhänge gefunden.\n\nOK = Zu bestehenden hinzufügen\nAbbrechen = Alle ersetzen`);
    
    const db = await initAnhaengeDB();
    
    // Bei "Ersetzen": Alle löschen
    if (!mode) {
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const request = store.clear();
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }
    
    // Anhänge importieren
    let importCount = 0;
    for (const anhang of anhaengeToImport) {
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        // Entferne alte ID damit neue generiert wird
        const { id, ...anhangOhneId } = anhang;
        const request = store.add(anhangOhneId);
        request.onsuccess = () => { importCount++; resolve(); };
        request.onerror = () => resolve(); // Fehler ignorieren
      });
    }
    
    // Backup aktualisieren
    const alle = await getAllAnhaenge();
    backupAnhaengeToStorage(alle);
    
    alert(`${importCount} Anhänge erfolgreich importiert!`);
    
    // Aktualisiere die aktuelle Ansicht
    const wissenContent = document.getElementById('wissen-content');
    if (wissenContent) {
      // Lade aktuelles Topic neu
      const currentTopic = document.querySelector('.anhaenge-section');
      if (currentTopic && currentTopic.id) {
        const topicId = currentTopic.id.replace('anhaenge-', '');
        loadAndRenderAnhaenge(topicId);
      }
    }
  } catch (e) {
    alert('Fehler beim Importieren: ' + e.message);
  }
}

function getFileIcon(type) {
  if (type.startsWith('image/')) return '🖼️';
  if (type.includes('pdf')) return '📄';
  if (type.includes('word') || type.includes('document')) return '📝';
  if (type.includes('excel') || type.includes('spreadsheet')) return '📊';
  if (type.includes('powerpoint') || type.includes('presentation')) return '📽️';
  if (type.includes('text')) return '📃';
  return '📁';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function renderAnhaengeSection(topicId) {
  const sectionId = `anhaenge-${topicId}`;
  // Initiales Laden der Anhänge nach dem Rendern
  setTimeout(() => {

  }, 100);
  
  return `

        <button class="anhaenge-add-btn" onclick="triggerAnhangUpload('${topicId}')">
          <i data-lucide="plus" style="width:18px;height:18px;stroke-width:2.5;"></i> Hinzufügen
        </button>
        <input type="file" class="anhaenge-file-input" id="anhang-input-${topicId}" 
               multiple accept="image/*,.pdf,.doc,.docx,.txt,.xls,.xlsx,.ppt,.pptx"

        </div>

}

async function loadAndRenderAnhaenge(topicId) {
  const container = document.getElementById(`anhaenge-content-${topicId}`);
  if (!container) return;
  
  try {
    const anhaenge = await getAnhaengeForTopic(topicId);
    
    if (anhaenge.length === 0) {
      container.innerHTML = `
        <div class="anhaenge-empty">
          <div class="anhaenge-empty-icon">📂</div>
          <div>Noch keine Anhänge vorhanden</div>
          <div style="font-size:0.85rem;margin-top:0.3rem;">Klicke auf "+ Datei hinzufügen" um Dokumente, Bilder oder Notizen anzuhängen</div>
        </div>
      `;
      return;
    }
    
    const cardsHTML = anhaenge.map(a => {
      const isImage = a.type.startsWith('image/');
      const isPDF = a.type === 'application/pdf';
      const isText = a.type.startsWith('text/') || a.name.endsWith('.txt') || a.name.endsWith('.md');
      const isOffice = a.type.includes('word') || a.type.includes('document') || 
                       a.type.includes('excel') || a.type.includes('spreadsheet') ||
                       a.type.includes('powerpoint') || a.type.includes('presentation');
      
      // Server gibt path zurück, lokal gibt es data (Base64)
      const fileUrl = a.path || a.data;
      
      const preview = isImage 
        ? `<img src="${fileUrl}" alt="${a.name}">`
        : `<div class="anhang-preview-icon">${getFileIcon(a.type)}</div>`;
      
      let viewAction;
      let viewLabel;
      if (isImage) {
        viewAction = `openAnhangLightbox('${fileUrl.replace(/'/g, "\\'")}', '${a.name.replace(/'/g, "\\'")}')`;
        viewLabel = '<i data-lucide="eye" style="width:16px;height:16px;stroke-width:2;"></i>';
      } else if (isPDF) {
        viewAction = `openPDFPreview('${fileUrl.replace(/'/g, "\\'")}', '${a.name.replace(/'/g, "\\'")}')`;
        viewLabel = '<i data-lucide="eye" style="width:16px;height:16px;stroke-width:2;"></i>';
      } else if (isText) {
        viewAction = `openTextPreview('${fileUrl.replace(/'/g, "\\'")}', '${a.name.replace(/'/g, "\\'")}')`;
        viewLabel = '<i data-lucide="eye" style="width:16px;height:16px;stroke-width:2;"></i>';
      } else if (isOffice) {
        viewAction = `openOfficePreview('${fileUrl.replace(/'/g, "\\'")}', '${a.name.replace(/'/g, "\\'")}', '${a.type}')`;
        viewLabel = '<i data-lucide="eye" style="width:16px;height:16px;stroke-width:2;"></i>';
      } else {
        viewAction = `downloadAnhang('${fileUrl}', '${a.name.replace(/'/g, "\\'")}', '${a.type}')`;
        viewLabel = '<i data-lucide="download" style="width:16px;height:16px;stroke-width:2;"></i>';
      }
      
      return `
        <div class="anhang-card">
          <div class="anhang-preview">${preview}</div>
          <div class="anhang-info">
            <div class="anhang-name" title="${a.name}">${a.name}</div>
            <div class="anhang-meta">${formatFileSize(a.size)}</div>
            <div class="anhang-actions">
              <button class="anhang-btn anhang-btn-view" onclick="${viewAction}">
                ${viewLabel}
              </button>
              <button class="anhang-btn anhang-btn-delete" onclick="confirmDeleteAnhang(${a.id}, '${topicId}')">
                <i data-lucide="trash-2" style="width:16px;height:16px;stroke-width:2;"></i>
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');
    
    container.innerHTML = `<div class="anhaenge-grid">${cardsHTML}</div>`;
    if (typeof lucide !== 'undefined') lucide.createIcons();
  } catch (err) {
    console.error('Fehler beim Laden der Anhänge:', err);
    container.innerHTML = `
      <div class="anhaenge-empty">
        <div class="anhaenge-empty-icon"><i data-lucide="alert-circle" style="width:48px;height:48px;stroke-width:1.5;"></i></div>
        <div>Fehler beim Laden der Anhänge</div>
      </div>
    `;
  }
}

function triggerAnhangUpload(topicId) {
  document.getElementById(`anhang-input-${topicId}`).click();
}

async function handleAnhangUpload(topicId, files) {
  if (!files || files.length === 0) return;
  
  for (const file of files) {
    // Max 50 MB pro Datei
    if (file.size > 50 * 1024 * 1024) {
      alert(`Die Datei "${file.name}" ist zu groß (max. 50 MB).`);
      continue;
    }
    try {
      await addAnhang(topicId, file);
    } catch (err) {
      console.error('Fehler beim Hinzufügen:', err);
      alert(`Fehler beim Hinzufügen von "${file.name}".`);
    }
  }
  
  // Input zurücksetzen und neu laden
  document.getElementById(`anhang-input-${topicId}`).value = '';
  await loadAndRenderAnhaenge(topicId);
}

async function confirmDeleteAnhang(id, topicId) {
  if (!confirm('Möchtest du diesen Anhang wirklich löschen?')) return;
  
  try {
    await deleteAnhang(id, topicId);
    await loadAndRenderAnhaenge(topicId);
  } catch (err) {
    console.error('Fehler beim Löschen:', err);
    alert('Fehler beim Löschen des Anhangs.');
  }
}

function openAnhangLightbox(dataUrl, name) {

        <i data-lucide="download" style="width:18px;height:18px;stroke-width:2;margin-right:6px;"></i>Speichern

function downloadAnhang(dataUrl, name, type) {

}

// PDF-Vorschau
function openPDFPreview(dataUrl, name) {

  modal.className = 'doc-preview-modal';

        <button class="doc-preview-btn doc-preview-btn-close" onclick="this.closest('.doc-preview-modal').remove()"><i data-lucide="x" style="width:16px;height:16px;stroke-width:2;"></i></button>
      </div>

      <iframe src="${dataUrl}" type="application/pdf"></iframe>
    </div>
  `;

// Text-Vorschau
function openTextPreview(dataUrl, name) {
  // Base64 dekodieren
  const base64Content = dataUrl.split(',')[1];
  let textContent;
  try {
    textContent = decodeURIComponent(escape(atob(base64Content)));
  } catch (e) {
    textContent = atob(base64Content);
  }
  
  const modal = document.createElement('div');
  modal.className = 'doc-preview-modal';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  modal.innerHTML = `
    <div class="doc-preview-header">
      <div class="doc-preview-title"><i data-lucide="file" style="width:20px;height:20px;stroke-width:1.8;"></i> ${name}</div>
      <div class="doc-preview-actions">
        <button class="doc-preview-btn doc-preview-btn-download" onclick="downloadAnhang('${dataUrl.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}', 'text/plain')"><i data-lucide="download" style="width:16px;height:16px;stroke-width:2;"></i> Laden</button>
        <button class="doc-preview-btn doc-preview-btn-close" onclick="this.closest('.doc-preview-modal').remove()"><i data-lucide="x" style="width:16px;height:16px;stroke-width:2;"></i></button>
      </div>
    </div>
    <div class="doc-preview-content">
      <div class="doc-preview-text"></div>
    </div>
  `;
  document.body.appendChild(modal);
  // Text sicher einfügen (kein innerHTML wegen XSS)
  modal.querySelector('.doc-preview-text').textContent = textContent;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// Office-Dokumente Vorschau (mit Microsoft Office Online Viewer als Fallback-Info)
function openOfficePreview(dataUrl, name, type) {
  const modal = document.createElement('div');
  modal.className = 'doc-preview-modal';
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  
  // Für lokale Dateien können wir keinen Online-Viewer nutzen
  // Wir zeigen eine Vorschau-Seite mit Download-Option
  let icon = 'file-text';
  if (type.includes('excel') || type.includes('spreadsheet')) icon = 'table';
  if (type.includes('powerpoint') || type.includes('presentation')) icon = 'presentation';
  
  modal.innerHTML = `
    <div class="doc-preview-header">
      <div class="doc-preview-title"><i data-lucide="${icon}" style="width:20px;height:20px;stroke-width:1.8;"></i> ${name}</div>
      <div class="doc-preview-actions">
        <button class="doc-preview-btn doc-preview-btn-download" onclick="downloadAnhang('${dataUrl.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}', '${type}')"><i data-lucide="download" style="width:16px;height:16px;stroke-width:2;"></i> Laden</button>
        <button class="doc-preview-btn doc-preview-btn-close" onclick="this.closest('.doc-preview-modal').remove()"><i data-lucide="x" style="width:16px;height:16px;stroke-width:2;"></i></button>
      </div>
    </div>
    <div class="doc-preview-content">
      <div class="doc-preview-unsupported">
        <div class="doc-preview-unsupported-icon"><i data-lucide="${icon}" style="width:64px;height:64px;stroke-width:1.5;"></i></div>
        <h3>Office-Dokument</h3>
        <p>Office-Dateien können nicht direkt im Browser angezeigt werden. Lade die Datei herunter, um sie zu öffnen.</p>
        <button class="doc-preview-btn doc-preview-btn-download" style="padding: 14px 28px; font-size: 17px;" onclick="downloadAnhang('${dataUrl.replace(/'/g, "\\'")}', '${name.replace(/'/g, "\\'")}', '${type}')"><i data-lucide="download" style="width:18px;height:18px;stroke-width:2;margin-right:8px;"></i>Jetzt herunterladen</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// IndexedDB beim Start initialisieren
initAnhaengeDB().catch(err => console.warn('IndexedDB nicht verfügbar:', err));

// Backup vor dem Schließen des Browsers/Tabs
window.addEventListener('beforeunload', async () => {
  try {
    const anhaenge = await getAllAnhaenge();
    if (anhaenge.length > 0) {
      backupAnhaengeToStorage(anhaenge);
    }
  } catch (e) {
    // Ignorieren
  }
});

// Periodisches Backup alle 30 Sekunden (falls Änderungen vorgenommen wurden)
setInterval(async () => {
  try {
    const anhaenge = await getAllAnhaenge();
    if (anhaenge.length > 0) {
      backupAnhaengeToStorage(anhaenge);
    }
  } catch (e) {
    // Ignorieren
  }
}, 30000);

// Externe Diagnose-Fälle laden
loadExternalCases();

buildCategories();

// Lucide Icons initialisieren
if (typeof lucide !== 'undefined') {
  lucide.createIcons();
}
</script>
</body>
</html>
