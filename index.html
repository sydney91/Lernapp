// ─── Lernfortschritt (localStorage) ────────────────────────────
const STORAGE_KEY = 'hp_lernfortschritt_v1';

function loadProgress() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveProgress(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
}
function getTopicScore(id) {
  const p = loadProgress();
  return p[id] || { correct: 0, total: 0, lastPct: 0 };
}
function setTopicScore(id, correct, total) {
  const p = loadProgress();
  p[id] = { correct, total, lastPct: total ? Math.round(correct / total * 100) : 0 };
  saveProgress(p);
}

// ─── Wissen Navigation ──────────────────────────────────────────
let wissenInitialized = false;
let activeWissenTopic = 'zelle-gewebe';

function initWissen() {
  if (wissenInitialized) return;
  wissenInitialized = true;
  const nav = document.getElementById('wissen-nav');
  WISSEN_TOPICS.forEach(t => {
    const btn = document.createElement('button');
    btn.id = 'tab-btn-' + t.id;
    btn.className = 'wissen-tab' + (t.id === activeWissenTopic ? ' active' : '');
    btn.onclick = () => showWissenTopic(t.id);
    nav.appendChild(btn);
    renderTabLabel(btn, t.id, t.name);
  });
  showWissenTopic(activeWissenTopic);
}

function renderTabLabel(btn, id, name) {
  const score = getTopicScore(id);
  const questions = LERNKONTROLLE[id] || [];
  const total = questions.length;
  if (!total || score.total === 0) {
    btn.innerHTML = `<span class="tab-name">${name}</span>`;
    return;
  }
  const pct = score.lastPct;
  const deg = Math.round(pct / 100 * 360);
  const color = pct >= 80 ? '#27ae60' : pct >= 50 ? '#b8860b' : '#9b2335';
  btn.innerHTML = `
    <span class="tab-name">${name}</span>
    <span class="tab-progress">
      <span class="tab-pie" style="background:conic-gradient(${color} ${deg}deg, rgba(200,190,175,0.4) ${deg}deg);"></span>
      <span class="tab-pct" style="color:${color}">${pct}%</span>
    </span>`;
}

function refreshAllTabLabels() {
  WISSEN_TOPICS.forEach(t => {
    const btn = document.getElementById('tab-btn-' + t.id);
    if (btn) renderTabLabel(btn, t.id, t.name);
  });
}

function showWissenTopic(id) {
  activeWissenTopic = id;
  WISSEN_TOPICS.forEach(t => {
    const btn = document.getElementById('tab-btn-' + t.id);
    if (btn) btn.classList.toggle('active', t.id === id);
  });
  const topic = WISSEN_TOPICS.find(t => t.id === id);
  const container = document.getElementById('wissen-content');
  container.innerHTML = '';
  topic.render(container);
  // Render Lucide icons in the new content
  if (typeof lucide !== 'undefined') lucide.createIcons();
  // Append Lernkontrolle button at bottom
  const questions = LERNKONTROLLE[id];
  if (questions && questions.length) {
    const score = getTopicScore(id);
    const badgeText = score.total > 0 ? score.lastPct + ' % zuletzt' : questions.length + ' Fragen';
    const btn = document.createElement('button');
    btn.className = 'lernkontrolle-btn';
    btn.innerHTML = `✏️ Lernkontrolle starten <span class="btn-badge">${badgeText}</span>`;
    btn.onclick = () => startLernkontrolle(id);
    container.appendChild(btn);
  }
}

// ─── Lernkontrolle Quiz Engine ──────────────────────────────────
function startLernkontrolle(topicId, fehlerMode = false, dueMode = false) {
  // Get questions - either from topic, from error list, or from SRS due list
  let questions = [];
  let originalIndices = [];
  
  if (fehlerMode) {
    // Fehler-Quiz: nur falsche Fragen
    const fehlerData = window._fehlerCache || {};
    questions = Object.values(fehlerData).filter(f => 
      f.wrongCount > f.correctCount && (!topicId || f.category === topicId)
    ).map(f => ({
      q: f.question,
      a: f.answers,
      c: f.correctIndex,
      e: f.explanation,
      _id: f.questionId,
      _cat: f.category
    }));
    if (questions.length === 0) {
      alert('Keine Fehler zum Wiederholen vorhanden!');
      return;
    }
  } else if (dueMode) {
    // SRS-Modus: nur fällige Fragen
    const srsData = window._srsCache || {};
    const today = new Date().toISOString().split('T')[0];
    const dueIds = Object.entries(srsData)
      .filter(([id, d]) => d.nextReview <= today && (!topicId || d.category === topicId))
      .map(([id]) => id);
    
    // Find matching questions from all topics
    for (const [tid, qs] of Object.entries(LERNKONTROLLE)) {
      qs.forEach((q, idx) => {
        const qid = `${tid}_q_${idx}`;
        if (dueIds.includes(qid)) {
          questions.push({ ...q, _id: qid, _cat: tid });
          originalIndices.push({ topicId: tid, index: idx });
        }
      });
    }
    if (questions.length === 0) {
      alert('Keine fälligen Fragen vorhanden!');
      return;
    }
  } else {
    // Normal mode
    const sourceQuestions = LERNKONTROLLE[topicId] || [];
    questions = sourceQuestions.map((q, idx) => ({
      ...q,
      _id: `${topicId}_q_${idx}`,
      _cat: topicId,
      _origIdx: idx
    }));
    originalIndices = questions.map((_, idx) => ({ topicId, index: idx }));
  }
  
  // Shuffle questions
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
    if (originalIndices.length) {
      [originalIndices[i], originalIndices[j]] = [originalIndices[j], originalIndices[i]];
    }
  }
  
  let current = 0;
  let correct = 0;
  let answered = false;
  let currentQuestion = null;

  // Build overlay
  const overlay = document.createElement('div');
  overlay.className = 'lk-overlay';
  const modeTitle = fehlerMode ? '🔄 Fehler wiederholen' : dueMode ? '📅 Fällige Fragen' : '✏️ Lernkontrolle';
  overlay.innerHTML = `
    <div class="lk-modal">
      <div class="lk-header">
        <h3>${modeTitle}</h3>
        <button class="lk-close" onclick="this.closest('.lk-overlay').remove()">✕</button>
      </div>
      <div class="lk-body" id="lk-body"></div>
    </div>`;
  document.body.appendChild(overlay);

  function renderQuestion() {
    answered = false;
    currentQuestion = questions[current];
    const q = currentQuestion;
    const body = document.getElementById('lk-body');
    const pct = Math.round(current / questions.length * 100);
    
    // Shuffle answer order
    const indices = q.a.map((_,i)=>i);
    for (let i = indices.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [indices[i],indices[j]] = [indices[j],indices[i]];
    }
    const correctShuffledIdx = indices.indexOf(q.c);
    
    // Store shuffled indices for tracking which answer was given
    window._currentShuffledIndices = indices;

    body.innerHTML = `
      <div class="lk-progress-bar"><div class="lk-progress-fill" style="width:${pct}%"></div></div>
      <div class="lk-q-num">Frage ${current + 1} von ${questions.length}</div>
      <div class="lk-question">${q.q}</div>
      <div class="lk-answers" id="lk-answers">
        ${indices.map((origIdx, si) => `
          <button class="lk-answer" data-shuffled="${si}" data-orig-idx="${origIdx}" data-correct="${si === correctShuffledIdx}"
            onclick="lkAnswer(this, ${si === correctShuffledIdx}, '${escHtml(q.e)}', ${correctShuffledIdx}, ${origIdx})">
            ${q.a[origIdx]}
          </button>`).join('')}
      </div>
      <div id="lk-expl" style="display:none" class="lk-explanation"></div>
      <button class="lk-next-btn" id="lk-next" style="display:none"
        onclick="lkNext()">
        ${current + 1 < questions.length ? 'Nächste Frage →' : 'Ergebnis anzeigen →'}
      </button>`;
  }

  // Make functions accessible on window for inline handlers
  window.lkAnswer = function(btn, isCorrect, explanation, correctIdx, givenOrigIdx) {
    if (answered) return;
    answered = true;
    if (isCorrect) correct++;
    
    // Track the answer via API
    const q = currentQuestion;
    trackQuizAnswer({
      questionId: q._id,
      question: q.q,
      category: q._cat,
      explanation: q.e,
      answers: q.a,
      correctIndex: q.c,
      isCorrect: isCorrect,
      givenIndex: givenOrigIdx
    });
    
    // Mark all answers
    document.querySelectorAll('.lk-answer').forEach((b, si) => {
      b.classList.add('answered');
      if (parseInt(b.dataset.shuffled) === correctIdx) b.classList.add('show-correct');
    });
    btn.classList.add(isCorrect ? 'correct' : 'wrong');
    // Show explanation
    const expl = document.getElementById('lk-expl');
    expl.innerHTML = `<strong>${isCorrect ? '✅ Richtig!' : '❌ Leider falsch.'}</strong> ${explanation}`;
    expl.style.display = 'block';
    document.getElementById('lk-next').style.display = 'block';
  };

  window.lkNext = function() {
    current++;
    if (current < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  };

  function showResult() {
    const pct = Math.round(correct / questions.length * 100);
    if (!fehlerMode && !dueMode) {
      setTopicScore(topicId, correct, questions.length);
      refreshAllTabLabels();
      // Update button in content
      const contentBtn = document.querySelector('.lernkontrolle-btn');
      if (contentBtn) {
        contentBtn.querySelector('.btn-badge').textContent = pct + ' % zuletzt';
      }
    }
    // Update SRS due badge
    updateSRSDueBadge();
    
    const colorClass = pct >= 80 ? 'great' : pct >= 50 ? 'mid' : 'low';
    const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '📚';
    const msg = pct >= 80
      ? 'Ausgezeichnet! Du beherrschst dieses Thema sehr gut.'
      : pct >= 50
      ? 'Gut gemacht! Einzelne Bereiche noch vertiefen.'
      : 'Weitermachen! Lies das Thema nochmal durch und starte neu.';
    const retryFn = fehlerMode 
      ? `startLernkontrolle('${topicId || ''}', true, false)`
      : dueMode 
      ? `startLernkontrolle('${topicId || ''}', false, true)`
      : `startLernkontrolle('${topicId}')`;
    const body = document.getElementById('lk-body');
    body.innerHTML = `
      <div class="lk-result">
        <div class="lk-result-circle ${colorClass}">${pct}<span style="font-size:0.6em">%</span></div>
        <h3>${emoji} ${correct} von ${questions.length} richtig</h3>
        <p>${msg}</p>
        <div class="lk-result-btns">
          <button class="lk-btn-retry" onclick="this.closest('.lk-overlay').remove(); ${retryFn}">
            🔄 Nochmal
          </button>
          <button class="lk-btn-close" onclick="this.closest('.lk-overlay').remove()">
            Schließen
          </button>
        </div>
      </div>`;
  }

  renderQuestion();
}

function escHtml(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// Cache for Fehler and SRS data
window._fehlerCache = {};
window._srsCache = {};

// Track quiz answer (called after each answer)
async function trackQuizAnswer(data) {
  try {
    const response = await fetch('/api/fehler/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await response.json();
    if (result.success) {
      // Update cache
      window._fehlerCache[data.questionId] = result.fehler;
      window._srsCache[data.questionId] = result.srs;
    }
  } catch (err) {
    console.error('Fehler beim Tracken:', err);
  }
}

// Load Fehler data from server
async function loadFehlerData() {
  try {
    const response = await fetch('/api/fehler');
    const data = await response.json();
    window._fehlerCache = data.fehler || {};
    return window._fehlerCache;
  } catch (err) {
    console.error('Fehler beim Laden der Fehler:', err);
    return {};
  }
}

// Load SRS data from server
async function loadSRSData() {
  try {
    const response = await fetch('/api/srs');
    const data = await response.json();
    window._srsCache = data.questions || {};
    return window._srsCache;
  } catch (err) {
    console.error('Fehler beim Laden der SRS-Daten:', err);
    return {};
  }
}

// Get due questions count
async function getDueQuestionsCount() {
  try {
    const response = await fetch('/api/srs/due');
    const data = await response.json();
    return data.count || 0;
  } catch (err) {
    return 0;
  }
}

// Update SRS due badge in tab bar
async function updateSRSDueBadge() {
  const badge = document.getElementById('srs-due-badge');
  if (!badge) return;
  
  const count = await getDueQuestionsCount();
  if (count > 0) {
    badge.textContent = count > 99 ? '99+' : count;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

// Delete a Fehler entry
async function deleteFehler(questionId) {
  try {
    await fetch(`/api/fehler/${encodeURIComponent(questionId)}`, { method: 'DELETE' });
    delete window._fehlerCache[questionId];
    initFehlerDashboard(); // Refresh
  } catch (err) {
    console.error('Fehler beim Löschen:', err);
  }
}

// Initialize Fehler Dashboard
async function initFehlerDashboard() {
  const content = document.getElementById('fehler-content');
  if (!content) return;
  
  content.innerHTML = '<div class="fehler-empty"><div class="fehler-empty-icon">⏳</div><div>Lade Daten...</div></div>';
  
  // Load data
  await Promise.all([loadFehlerData(), loadSRSData()]);
  
  const fehler = window._fehlerCache;
  const srs = window._srsCache;
  
  // Calculate statistics
  const today = new Date().toISOString().split('T')[0];
  const allFehler = Object.values(fehler);
  const wrongQuestions = allFehler.filter(f => f.wrongCount > f.correctCount);
  const dueQuestions = Object.entries(srs).filter(([id, s]) => s.nextReview <= today);
  const masteredQuestions = Object.entries(srs).filter(([id, s]) => s.repetition >= 3);
  
  // Count by category
  const categoryStats = {};
  wrongQuestions.forEach(f => {
    categoryStats[f.category] = (categoryStats[f.category] || 0) + 1;
  });
  
  // Get category name
  function getCategoryName(catId) {
    const cat = CATEGORIES.find(c => c.id === catId);
    return cat ? cat.name : catId;
  }
  
  // Render dashboard
  content.innerHTML = `
    <div class="container">
      <!-- Stats Cards -->
      <div class="fehler-stats">
        <div class="fehler-stat-card">
          <div class="fehler-stat-number error">${wrongQuestions.length}</div>
          <div class="fehler-stat-label">Fehler zu wiederholen</div>
        </div>
        <div class="fehler-stat-card">
          <div class="fehler-stat-number warning">${dueQuestions.length}</div>
          <div class="fehler-stat-label">Heute fällig (SRS)</div>
        </div>
        <div class="fehler-stat-card">
          <div class="fehler-stat-number success">${masteredQuestions.length}</div>
          <div class="fehler-stat-label">Beherrscht (3+ richtig)</div>
        </div>
        <div class="fehler-stat-card">
          <div class="fehler-stat-number primary">${allFehler.length}</div>
          <div class="fehler-stat-label">Fragen bearbeitet</div>
        </div>
      </div>
      
      <!-- Action Buttons -->
      <div class="fehler-actions">
        <button class="fehler-action-btn" onclick="startLernkontrolle('', true, false)" ${wrongQuestions.length === 0 ? 'disabled' : ''}>
          <i data-lucide="rotate-ccw" style="width:18px;height:18px;"></i>
          Fehler wiederholen (${wrongQuestions.length})
        </button>
        <button class="fehler-action-btn secondary" onclick="startLernkontrolle('', false, true)" ${dueQuestions.length === 0 ? 'disabled' : ''}>
          <i data-lucide="calendar-check" style="width:18px;height:18px;"></i>
          Fällige Fragen (${dueQuestions.length})
        </button>
      </div>
      
      <!-- Category Filter -->
      ${Object.keys(categoryStats).length > 0 ? `
        <div class="fehler-filter">
          <button class="fehler-filter-btn active" onclick="filterFehler('')">Alle</button>
          ${Object.entries(categoryStats).map(([cat, count]) => `
            <button class="fehler-filter-btn" onclick="filterFehler('${cat}')">${getCategoryName(cat)} (${count})</button>
          `).join('')}
        </div>
      ` : ''}
      
      <!-- Fehler List -->
      <div class="fehler-list" id="fehler-list">
        ${wrongQuestions.length === 0 ? `
          <div class="fehler-empty">
            <div class="fehler-empty-icon"><i data-lucide="check-circle" style="width:48px;height:48px;color:var(--color-success);"></i></div>
            <div class="fehler-empty-text">Keine Fehler vorhanden!</div>
            <div class="fehler-empty-sub">Beantworte Quiz-Fragen, um deinen Fortschritt zu tracken.</div>
          </div>
        ` : wrongQuestions.map(f => renderFehlerCard(f, getCategoryName)).join('')}
      </div>
    </div>
  `;
  
  // Update badge
  updateSRSDueBadge();
  
  // Initialize Lucide icons
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// Render a single Fehler card
function renderFehlerCard(f, getCategoryName) {
  const rate = f.correctCount + f.wrongCount > 0 
    ? Math.round((f.correctCount / (f.correctCount + f.wrongCount)) * 100) 
    : 0;
  const isMastered = f.correctCount > f.wrongCount;
  
  return `
    <div class="fehler-card ${isMastered ? 'mastered' : ''}" data-category="${f.category}">
      <div class="fehler-card-header">
        <span class="fehler-category-badge">${getCategoryName(f.category)}</span>
        <span class="fehler-meta-item">${rate}% Erfolgsrate</span>
      </div>
      <div class="fehler-question">${f.question}</div>
      <div class="fehler-meta">
        <span class="fehler-meta-item wrong">
          <i data-lucide="x" style="width:14px;height:14px;"></i> ${f.wrongCount}× falsch
        </span>
        <span class="fehler-meta-item right">
          <i data-lucide="check" style="width:14px;height:14px;"></i> ${f.correctCount}× richtig
        </span>
      </div>
      <div class="fehler-card-actions">
        <button class="fehler-card-btn practice" onclick="practiceSingleQuestion('${f.questionId}')">
          <i data-lucide="play" style="width:14px;height:14px;"></i> Üben
        </button>
        <button class="fehler-card-btn remove" onclick="deleteFehler('${f.questionId}')">
          <i data-lucide="trash-2" style="width:14px;height:14px;"></i>
        </button>
      </div>
    </div>
  `;
}

// Filter Fehler by category
function filterFehler(category) {
  // Update filter buttons
  document.querySelectorAll('.fehler-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(category) || (!category && btn.textContent === 'Alle'));
  });
  
  // Filter cards
  document.querySelectorAll('.fehler-card').forEach(card => {
    if (!category || card.dataset.category === category) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}

// Practice a single question
function practiceSingleQuestion(questionId) {
  const f = window._fehlerCache[questionId];
  if (!f) return;
  
  // Create a mini quiz with just this question
  const overlay = document.createElement('div');
  overlay.className = 'lk-overlay';
  overlay.innerHTML = `
    <div class="lk-modal">
      <div class="lk-header">
        <h3>🎯 Einzelfrage üben</h3>
        <button class="lk-close" onclick="this.closest('.lk-overlay').remove()">✕</button>
      </div>
      <div class="lk-body" id="lk-body"></div>
    </div>`;
  document.body.appendChild(overlay);
  
  const body = document.getElementById('lk-body');
  const indices = f.answers.map((_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  const correctShuffledIdx = indices.indexOf(f.correctIndex);
  let answered = false;
  
  body.innerHTML = `
    <div class="lk-question">${f.question}</div>
    <div class="lk-answers" id="lk-answers">
      ${indices.map((origIdx, si) => `
        <button class="lk-answer" data-shuffled="${si}" data-correct="${si === correctShuffledIdx}"
          onclick="handleSinglePractice(this, ${si === correctShuffledIdx}, '${escHtml(f.explanation)}', ${correctShuffledIdx}, ${origIdx}, '${f.questionId}')">
          ${f.answers[origIdx]}
        </button>`).join('')}
    </div>
    <div id="lk-expl" style="display:none" class="lk-explanation"></div>
    <button class="lk-next-btn" id="lk-next" style="display:none"
      onclick="this.closest('.lk-overlay').remove(); initFehlerDashboard();">
      Zurück zum Dashboard →
    </button>
  `;
  
  window.handleSinglePractice = function(btn, isCorrect, explanation, correctIdx, givenOrigIdx, qId) {
    if (answered) return;
    answered = true;
    
    const f = window._fehlerCache[qId];
    trackQuizAnswer({
      questionId: qId,
      question: f.question,
      category: f.category,
      explanation: f.explanation,
      answers: f.answers,
      correctIndex: f.correctIndex,
      isCorrect: isCorrect,
      givenIndex: givenOrigIdx
    });
    
    document.querySelectorAll('.lk-answer').forEach((b, si) => {
      b.classList.add('answered');
      if (parseInt(b.dataset.shuffled) === correctIdx) b.classList.add('show-correct');
    });
    btn.classList.add(isCorrect ? 'correct' : 'wrong');
    
    const expl = document.getElementById('lk-expl');
    expl.innerHTML = `<strong>${isCorrect ? '✅ Richtig!' : '❌ Leider falsch.'}</strong> ${explanation}`;
    expl.style.display = 'block';
    document.getElementById('lk-next').style.display = 'block';
  };
}

          <li><strong>Retikulozyten</strong> = unreife Erythrozyten (Aktivitätsmarker der Blutbildung)</li>
          <li><strong>Bildung:</strong> Knochenmark, gesteuert durch EPO (Erythropoetin, aus Niere)</li>
        </ul>
      </div>

      <div style="background: linear-gradient(135deg, #e8f4ff 0%, #cce5ff 100%); border: 2px solid #2980b9; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;">
        <h3 style="margin: 0 0 1rem 0; color: #2980b9; font-family: 'Playfair Display', serif;">3. Leukozyten ⭐⭐ <span style="font-size: 0.8rem; font-weight: normal;">(sehr wichtig!)</span></h3>
        <p style="margin-bottom: 0.8rem;"><strong>Gesamtzahl:</strong> 4.000–10.000/µl</p>
        <div style="overflow-x:auto;">
          <table style="width:100%; border-collapse:collapse; font-size:0.86rem; margin-bottom:1rem; background: white;">
            <thead>
              <tr style="background:var(--ink); color:var(--parchment);">
                <th style="padding:0.5rem 0.8rem; text-align:left;">Typ</th>
                <th style="padding:0.5rem 0.8rem;">Anteil</th>
                <th style="padding:0.5rem 0.8rem; text-align:left;">Funktion</th>
              </tr>
            </thead>
            <tbody>
              <tr style="background:#fff;"><td style="padding:0.5rem 0.8rem; font-weight:700;">Neutrophile</td><td style="padding:0.5rem 0.8rem; text-align:center;">50–70%</td><td style="padding:0.5rem 0.8rem;">Bakterienabwehr, Phagozytose</td></tr>
              <tr style="background:#f9f6f0;"><td style="padding:0.5rem 0.8rem; font-weight:700;">Lymphozyten</td><td style="padding:0.5rem 0.8rem; text-align:center;">25–35%</td><td style="padding:0.5rem 0.8rem;">T-/B-Zellen, spezif. Immunabwehr</td></tr>
              <tr style="background:#fff;"><td style="padding:0.5rem 0.8rem; font-weight:700;">Monozyten</td><td style="padding:0.5rem 0.8rem; text-align:center;">3–8%</td><td style="padding:0.5rem 0.8rem;">Phagozytose, werden zu Makrophagen</td></tr>
              <tr style="background:#f9f6f0;"><td style="padding:0.5rem 0.8rem; font-weight:700;">Eosinophile</td><td style="padding:0.5rem 0.8rem; text-align:center;">2–4%</td><td style="padding:0.5rem 0.8rem;">Parasitenabwehr, Allergie</td></tr>
              <tr style="background:#fff;"><td style="padding:0.5rem 0.8rem; font-weight:700;">Basophile</td><td style="padding:0.5rem 0.8rem; text-align:center;">0–1%</td><td style="padding:0.5rem 0.8rem;">Histamin, allergische Reaktionen</td></tr>
            </tbody>
          </table>
        </div>
        ${merke('<strong>Linksverschiebung</strong> = mehr unreife Neutrophile → bakterielle Infektion')}
      </div>

      <div style="background: linear-gradient(135deg, #f0e8ff 0%, #e0d0ff 100%); border: 2px solid #8e44ad; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;">
        <h3 style="margin: 0 0 1rem 0; color: #8e44ad; font-family: 'Playfair Display', serif;">4. Thrombozyten ⭐</h3>
        <ul style="margin: 0; padding-left: 1.2rem; line-height: 1.8;">
          <li><strong>Anzahl:</strong> 150.000–400.000/µl</li>
          <li><strong>Lebensdauer:</strong> 7–10 Tage</li>
          <li>Bildung aus <strong>Megakaryozyten</strong> im Knochenmark</li>
          <li><strong>Funktion:</strong> primäre Hämostase (Thrombozytenpfropf)</li>
        </ul>
      </div>

      <div style="background: linear-gradient(135deg, #fff0e8 0%, #ffe0d0 100%); border: 3px solid var(--terracotta); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;">
        <h3 style="margin: 0 0 1rem 0; color: var(--terracotta); font-family: 'Playfair Display', serif;">5. Hämostase / Blutgerinnung ⭐⭐⭐ <span style="font-size: 0.8rem; font-weight: normal;">(top prüfungsrelevant!)</span></h3>
        <p style="font-weight: 700; margin-bottom: 0.5rem;">3 Phasen:</p>
        <ol style="margin: 0 0 1rem 0; padding-left: 1.2rem; line-height: 1.8;">
          <li><strong>Vasospasmuse</strong> → Gefäßverengung</li>
          <li><strong>Primäre Hämostase</strong> → Thrombozytenaggregation (weißer Thrombus)</li>
          <li><strong>Sekundäre Hämostase</strong> → Gerinnungskaskade → Fibringerinnsel (roter Thrombus)</li>
        </ol>
        <p style="font-weight: 700; margin-bottom: 0.5rem;">Gerinnungswege:</p>
        <ul style="margin: 0 0 1rem 0; padding-left: 1.2rem; line-height: 1.8;">
          <li><strong>Extrinsisch (schnell):</strong> Gewebsverletzung → Faktor III → Faktor VII → gemeinsame Endstrecke</li>
          <li><strong>Intrinsisch (langsam):</strong> Kontaktaktivierung → Faktor XII → gemeinsame Endstrecke</li>
          <li><strong>Gemeinsame Endstrecke:</strong> Faktor X → Prothrombin → Thrombin → Fibrinogen → Fibrin</li>
        </ul>
        <p style="font-weight: 700; margin-bottom: 0.5rem;">Laborwerte:</p>
        <ul style="margin: 0 0 1rem 0; padding-left: 1.2rem; line-height: 1.8;">
          <li><strong>Quick/INR:</strong> extrinsisches System (Marcumar-Kontrolle)</li>
          <li><strong>PTT:</strong> intrinsisches System (Heparin-Kontrolle)</li>
        </ul>
        ${callout('<strong>Fibrinolyse:</strong> Plasmin löst Fibringerinnsel auf → tPA aktiviert Plasminogen')}
      </div>

      <div style="background: linear-gradient(135deg, #e8fff0 0%, #c8f0d8 100%); border: 2px solid var(--sage); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;">
        <h3 style="margin: 0 0 1rem 0; color: var(--sage); font-family: 'Playfair Display', serif;">6. Blutgruppen ABO + Rhesus ⭐⭐</h3>

          <table style="width:100%; border-collapse:collapse; font-size:0.86rem; margin-bottom:1rem; background: white;">
            <thead>
              <tr style="background:var(--ink); color:var(--parchment);">
                <th style="padding:0.5rem 0.8rem; text-align:left;">Blutgruppe</th>
                <th style="padding:0.5rem 0.8rem;">Antigen auf Erythrozyt</th>
                <th style="padding:0.5rem 0.8rem;">Antikörper im Serum</th>
              </tr>
            </thead>
            <tbody>
              <tr style="background:#fff;"><td style="padding:0.5rem 0.8rem; font-weight:700; color:var(--terracotta);">A</td><td style="padding:0.5rem 0.8rem; text-align:center;">A</td><td style="padding:0.5rem 0.8rem; text-align:center;">Anti-B</td></tr>
              <tr style="background:#f9f6f0;"><td style="padding:0.5rem 0.8rem; font-weight:700; color:var(--blue-dark);">B</td><td style="padding:0.5rem 0.8rem; text-align:center;">B</td><td style="padding:0.5rem 0.8rem; text-align:center;">Anti-A</td></tr>
              <tr style="background:#fff;"><td style="padding:0.5rem 0.8rem; font-weight:700; color:var(--sage);">AB</td><td style="padding:0.5rem 0.8rem; text-align:center;">A + B</td><td style="padding:0.5rem 0.8rem; text-align:center;">keine</td></tr>
              <tr style="background:#f9f6f0;"><td style="padding:0.5rem 0.8rem; font-weight:700;">0</td><td style="padding:0.5rem 0.8rem; text-align:center;">keine</td><td style="padding:0.5rem 0.8rem; text-align:center;">Anti-A + Anti-B</td></tr>
            </tbody>
          </table>
        </div>
        <ul style="margin: 0; padding-left: 1.2rem; line-height: 1.8;">
          <li><strong>Rhesus-positiv (85% der Bevölkerung):</strong> D-Antigen vorhanden</li>
          <li><strong>Rhesus-Inkompatibilität:</strong> Rh-negative Mutter + Rh-positives Kind → Morbus haemolyticus neonatorum → Anti-D-Prophylaxe!</li>
          <li><strong>Universalspender:</strong> 0 negativ | <strong>Universalempfänger:</strong> AB positiv</li>
        </ul>
      </div>

        <h3 style="margin: 0 0 1rem 0; color: var(--terracotta); font-family: 'Playfair Display', serif;">7. Hämatopoese (Blutbildung) ⭐</h3>
        <ul style="margin: 0; padding-left: 1.2rem; line-height: 1.8;">
          <li><strong>Ort:</strong> rotes Knochenmark (Sternum, Wirbelkörper, Becken)</li>
          <li>Alle Zellen entstammen der <strong>pluripotenten Stammzelle</strong></li>
          <li><strong>Steuerung:</strong> EPO (Erythrozyten), TPO (Thrombozyten), G-CSF (Granulozyten)</li>
          <li>Beim Kind: gesamtes Knochenmark aktiv → beim Erwachsenen nur noch flache Knochen</li>
        </ul>
      </div>

              <tr style="background:#fff;"><td style="padding:0.5rem 0.8rem; font-weight:700;">Leukozyten</td><td style="padding:0.5rem 0.8rem; text-align:center;">4.000–10.000/µl</td></tr>

              <tr style="background:#fff;"><td style="padding:0.5rem 0.8rem; font-weight:700;">Quick</td><td style="padding:0.5rem 0.8rem; text-align:center;">70–130%</td></tr>
              <tr style="background:#f9f6f0;"><td style="padding:0.5rem 0.8rem; font-weight:700;">INR</td><td style="padding:0.5rem 0.8rem; text-align:center;">0,8–1,2</td></tr>
              <tr style="background:#fff;"><td style="padding:0.5rem 0.8rem; font-weight:700;">PTT</td><td style="padding:0.5rem 0.8rem; text-align:center;">25–38 sec</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div style="background: linear-gradient(135deg, #fff0f0 0%, #ffe0e0 100%); border: 3px solid var(--red); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem;">
        <h3 style="margin: 0 0 1rem 0; color: var(--red); font-family: 'Playfair Display', serif;">⚠️ Typische Prüfungsfallen</h3>
        <ul style="margin: 0; padding-left: 1.2rem; line-height: 1.9;">

          <li><strong>Heparin verlängert PTT</strong> | <strong>Marcumar verlängert Quick/INR</strong></li>
          <li><strong>0 negativ = Universalspender</strong> (nur Erythrozyten!)</li>
          <li><strong>Morbus haemolyticus neonatorum:</strong> erst ab 2. Schwangerschaft gefährlich (1. Schwangerschaft = Sensibilisierung)</li>
        </ul>
      </div>
    `)}

  { w: 'Cortex', p: 'KOR-tex', k: 'Anatomie', d: 'Rinde; äußere Schicht eines Organs (z.B. Hirnrinde = Cortex cerebri, Nierenrinde = Cortex renalis).', wz: '<strong>lat.</strong> cortex = Rinde, Borke', b: 'Der Cortex cerebri ist für höhere kognitive Funktionen zuständig.' },
  // ── D ──
  { w: 'Dehydratation', p: 'de-hy-dra-ta-TSION', k: 'Physiologie', d: 'Flüssigkeitsmangel im Körper; entsteht durch zu geringe Zufuhr oder übermäßigen Verlust von Wasser.', wz: '<strong>lat.</strong> de = weg + <strong>gr.</strong> hydor = Wasser', b: 'Bei schwerem Durchfall droht eine Dehydratation mit Elektrolytentgleisung.' },
  { w: 'Diapedese', p: 'dia-pe-DEH-se', k: 'Immunologie', d: 'Durchtritt von Leukozyten durch intakte Kapillarwände ins Gewebe; ermöglicht Immunzellen, Infektionsherde zu erreichen.', wz: '<strong>gr.</strong> dia = durch + pedao = springen', b: 'Durch Diapedese gelangen neutrophile Granulozyten in das entzündete Gewebe.' },
  { w: 'Differentialdiagnose', p: 'dif-fe-ren-tsi-al-dia-GNOH-se', k: 'Diagnostik', d: 'Systematische Aufstellung aller in Frage kommenden Erkrankungen, die ähnliche Symptome wie die vorliegende Erkrankung aufweisen.', wz: '<strong>lat.</strong> differentia = Unterschied + <strong>gr.</strong> diagnosis = Erkenntnis', b: 'DD des Brustschmerzes: Herzinfarkt, Lungenembolie, Pneumothorax, Rippenfraktur.' },
  { w: 'Distal', p: 'DIS-tal', k: 'Anatomie', d: 'Von der Körpermitte oder dem Rumpf entfernt gelegen; Gegenteil: proximal.', wz: '<strong>lat.</strong> distare = entfernt sein', b: 'Die distale Phalanx ist die Fingerkuppe, die proximale sitzt am Handrücken.' },
  { w: 'Diurese', p: 'diu-REH-se', k: 'Nephrologie', d: 'Ausscheidung von Harn durch die Nieren; normale Tagesmenge ca. 1–2 Liter.', wz: '<strong>gr.</strong> diourein = durchharnen', b: 'Forcierte Diurese: medikamentöse Steigerung der Harnproduktion z.B. bei Vergiftungen.' },
  { w: 'Dyspnoe', p: 'DYSP-nö', k: 'Pneumologie', d: 'Atemnot; subjektives Gefühl der erschwerten Atmung oder Luftnot.', wz: '<strong>gr.</strong> dys = schlecht + pnoe = Atmung', b: 'Belastungsdyspnoe bei Herzinsuffizienz tritt erst bei körperlicher Anstrengung auf.' },
  // ── E ──
  { w: 'Efferent', p: 'e-fe-RENT', k: 'Neurologie', d: 'Vom Zentrum (Gehirn/Rückenmark) zur Peripherie leitend. Efferente Fasern leiten motorische Impulse zu Muskeln und Drüsen.', wz: '<strong>lat.</strong> ex = aus + ferre = tragen', b: 'Efferente (motorische) Fasern steuern die Skelettmuskulatur vom Rückenmark aus.' },
  { w: 'Embolie', p: 'em-bo-LIE', k: 'Kardiologie', d: 'Verstopfung eines Blutgefäßes durch ein verschlepptes Gerinnsel (Thrombus), Luft, Fett oder andere Partikel.', wz: '<strong>gr.</strong> emballein = hineinwerfen', b: 'Lungenembolie: Verschluss einer Lungenarterie durch einen Thrombus, meist aus tiefen Beinvenen.' },
  { w: 'Endogen', p: 'en-do-GEN', k: 'Allgemein', d: 'Im Körper entstehend; von innen kommend. Gegenteil: exogen (von außen).', wz: '<strong>gr.</strong> endon = innen + gennao = erzeugen', b: 'Endogene Depression: verursacht durch körpereigene Stoffwechselveränderungen, nicht durch äußere Ereignisse.' },
  { w: 'Entzündung', p: 'ent-ZÜNDUNG', k: 'Pathologie', d: 'Schutzreaktion des Körpers auf Schädigung; Kardinalsymptome: Rötung (rubor), Wärme (calor), Schwellung (tumor), Schmerz (dolor), Funktionsverlust (functio laesa).', wz: '<strong>dt.</strong> entzünden; lat. inflammatio', b: 'Die 5 Kardinalsymptome der Entzündung nach Celsus und Virchow.' },
  { w: 'Epidermis', p: 'epi-DER-mis', k: 'Anatomie', d: 'Oberhaut; äußerste Schicht der Haut, bestehend aus mehrschichtigem verhornten Plattenepithel, ohne Blutgefäße.', wz: '<strong>gr.</strong> epi = auf + derma = Haut', b: 'Die Epidermis erneuert sich alle 4 Wochen durch Zellteilung in der Basalschicht.' },
  { w: 'Erythropoetin', p: 'ery-thro-po-E-tin', k: 'Hämatologie', d: 'Hormon der Niere, das bei O₂-Mangel ausgeschüttet wird und das Knochenmark zur Bildung von Erythrozyten stimuliert.', wz: '<strong>gr.</strong> erythros = rot + poiein = machen', b: 'Erythropoetin wird in der Höhenkrankheit vermehrt ausgeschüttet → Polyglobulie.' },
  { w: 'Exogen', p: 'ex-o-GEN', k: 'Allgemein', d: 'Von außen kommend; durch äußere Einflüsse verursacht. Gegenteil: endogen.', wz: '<strong>gr.</strong> exo = außen + gennao = erzeugen', b: 'Exogene Noxen: Toxine, Strahlung, Infektionserreger von außen.' },
  { w: 'Exsudat', p: 'ex-su-DAT', k: 'Pathologie', d: 'Entzündlich bedingtes Austreten von proteinreicher Flüssigkeit aus Blutgefäßen ins Gewebe oder Körperhöhlen.', wz: '<strong>lat.</strong> ex = aus + sudare = schwitzen', b: 'Exsudat bei Pleuritis: proteinreiche Flüssigkeit im Pleuraraum durch Entzündung.' },
  // ── F ──
  { w: 'Fibrinolyse', p: 'fi-bri-no-LY-se', k: 'Hämatologie', d: 'Enzymatische Auflösung eines Blutgerinnsels (Fibrinnetzes) durch Plasmin; Gegenprozess zur Blutgerinnung.', wz: '<strong>lat.</strong> fibra = Faser + <strong>gr.</strong> lysis = Auflösung', b: 'Nach Wundheilung löst die Fibrinolyse den Thrombus auf: Plasminogen → Plasmin → Fibrinabbau.' },
  { w: 'Fraktur', p: 'FRAK-tur', k: 'Orthopädie', d: 'Knochenbruch; vollständige oder unvollständige Unterbrechung der Knochenkontinuität.', wz: '<strong>lat.</strong> fractura = Bruch', b: 'Osteoporotische Fraktur: Knochenbruch bei reduzierter Knochendichte, oft am Wirbelkörper oder Schenkelhals.' },
  // ── G ──
  { w: 'Gallenblase', p: 'GAL-len-bla-se', k: 'Anatomie', d: 'Hohlorgan unter der Leber zur Speicherung und Konzentration von Gallenflüssigkeit; entleert sich beim Essen in den Dünndarm.', wz: '<strong>dt.</strong> Galle + Blase', b: 'Gallensteine (Cholelithiasis) können Schmerzen durch Einklemmung im Gallengang verursachen.' },
  // ── H ──
  { w: 'Hämatopoese', p: 'hä-ma-to-pö-E-se', k: 'Hämatologie', d: 'Blutbildung; Bildung und Reifung aller Blutzellen aus hämatopoetischen Stammzellen im roten Knochenmark.', wz: '<strong>gr.</strong> haima = Blut + poiein = machen', b: 'Beim Erwachsenen findet die Hämatopoese im roten Knochenmark flacher Knochen statt.' },
  { w: 'Hämatokrit', p: 'hä-ma-to-KRIT', k: 'Hämatologie', d: 'Volumenanteil der Erythrozyten am Gesamtblutvolumen in Prozent. Normwert: Männer 42–52 %, Frauen 37–47 %.', wz: '<strong>gr.</strong> haima = Blut + krinein = trennen', b: 'Ein niedriger Hämatokrit deutet auf Anämie hin; ein erhöhter auf Polyglobulie oder Dehydratation.' },
  { w: 'Hämoglobin', p: 'hä-mo-glo-BIN', k: 'Hämatologie', d: 'Roter Blutfarbstoff der Erythrozyten; Protein aus Häm (eisenhaltig, bindet O₂) und Globin (Eiweißanteil); transportiert O₂ und CO₂.', wz: '<strong>gr.</strong> haima = Blut + <strong>lat.</strong> globus = Kugel', b: 'Normwert Hb: Männer 13,5–17 g/dl, Frauen 12–16 g/dl.' },
  { w: 'Hämolyse', p: 'hä-mo-LY-se', k: 'Hämatologie', d: 'Auflösung/Zerfall von Erythrozyten mit Freisetzung von Hämoglobin ins Plasma; kann durch Antikörper, Toxine oder mechanische Einwirkung entstehen.', wz: '<strong>gr.</strong> haima = Blut + lysis = Auflösung', b: 'Bei Transfusionszwischenfall kommt es zur intravasalen Hämolyse → Hämoglobinurie.' },

  { w: 'Hypoxie', p: 'hy-POK-sie', k: 'Physiologie', d: 'Sauerstoffmangel im Gewebe; kann lokal oder systemisch auftreten.', wz: '<strong>gr.</strong> hypo = unter + oxys = scharf/Sauerstoff', b: 'Hypoxie im Herzmuskel führt zu Ischämie und kann einen Infarkt auslösen.' },
  // ── I ──

  { w: 'Immunglobulin', p: 'i-mun-glo-bu-LIN', k: 'Immunologie', d: 'Antikörper; von Plasmazellen produzierte Glykoproteine der γ-Globulin-Fraktion; 5 Klassen: IgA, IgD, IgE, IgG, IgM.', wz: '<strong>lat.</strong> immunis = frei + globulus = Kügelchen', b: 'IgG macht 75 % aller Immunglobuline aus und ist der wichtigste Langzeitantikörper.' },
  { w: 'Infektiös', p: 'in-fek-tsi-ÖS', k: 'Allgemein', d: 'Ansteckend; durch Krankheitserreger (Bakterien, Viren, Pilze, Parasiten) übertragbar.', wz: '<strong>lat.</strong> inficere = anstecken', b: 'Masern sind hochinfektiös; ein Erkrankter kann bis zu 18 Ungeimpfte anstecken.' },
  { w: 'Insuffizienz', p: 'in-su-fi-TSIENTS', k: 'Allgemein', d: 'Funktionsschwäche oder -versagen eines Organs oder einer Struktur; z.B. Herzinsuffizienz, Niereninsuffizienz.', wz: '<strong>lat.</strong> insufficientia = Unzulänglichkeit', b: 'Herzinsuffizienz: Das Herz kann nicht mehr genug Blut zur Versorgung des Körpers pumpen.' },

  // ── K ──

  { w: 'Katabolismus', p: 'ka-ta-bo-LIS-mus', k: 'Physiologie', d: 'Abbauende Stoffwechselvorgänge; Abbau komplexer Moleküle zur Energiegewinnung. Gegenteil: Anabolismus (Aufbau).', wz: '<strong>gr.</strong> kataballein = niederwerfen', b: 'Im Katabolismus wird Glukose durch Glykolyse und Atmungskette zu ATP, CO₂ und H₂O abgebaut.' },

  // ── L ──

  { w: 'Leukopoese', p: 'leu-ko-pö-E-se', k: 'Hämatologie', d: 'Bildung von weißen Blutkörperchen (Leukozyten) im Knochenmark aus pluripotenten Stammzellen.', wz: '<strong>gr.</strong> leukos = weiß + poiein = machen', b: 'Störungen der Leukopoese können zu Leukämie (unkontrollierte Vermehrung) oder Agranulozytose führen.' },
  // ── M ──
  { w: 'Makrophage', p: 'ma-kro-PHA-ge', k: 'Immunologie', d: 'Große Fresszelle des Immunsystems; entsteht aus Monozyten; phagozytiert Erreger und präsentiert Antigene (Bindeglied zwischen unspez. und spez. Abwehr).', wz: '<strong>gr.</strong> makros = groß + phagein = fressen', b: 'Kupffersche Sternzellen (Leber) und Histiozyten (Bindegewebe) sind gewebsspezifische Makrophagen.' },
  { w: 'Medial', p: 'me-di-AL', k: 'Anatomie', d: 'Zur Körpermitte hin gelegen. Gegenteil: lateral.', wz: '<strong>lat.</strong> medialis = mittlerer', b: 'Der mediale Meniskus liegt auf der Innenseite des Kniegelenks.' },
  { w: 'Metastase', p: 'me-TA-sta-se', k: 'Onkologie', d: 'Tochtergeschwulst; Absiedlung bösartiger Tumorzellen in entfernten Organen über Blut- oder Lymphwege.', wz: '<strong>gr.</strong> meta = nach + stasis = Stillstand (= Verlagerung)', b: 'Lebermetastasen entstehen häufig bei Darmkrebs über die Pfortader.' },
  { w: 'Myokardinfarkt', p: 'myo-kar-din-FARKT', k: 'Kardiologie', d: 'Herzinfarkt; Absterben von Herzmuskelgewebe durch anhaltende Ischämie infolge Koronararterienverschluss.', wz: '<strong>gr.</strong> mys = Muskel + kardia = Herz + <strong>lat.</strong> infarctus = stopfen', b: 'Leitsymptom: anhaltender retrosternaler Druckschmerz, Ausstrahlung in Arm, Kiefer, Rücken.' },
  // ── N ──
  { w: 'Nekrose', p: 'ne-KRO-se', k: 'Pathologie', d: 'Ungeordneter Zelltod durch Schädigung von außen (z.B. Sauerstoffmangel, Gifte); mit Entzündungsreaktion. Gegenteil: Apoptose.', wz: '<strong>gr.</strong> nekrosis = Absterben', b: 'Koagulationsnekrose: Gewebsnekrose bei Ischämie (z.B. Herzinfarkt, Niereninfarkt).' },
  { w: 'Nephrologie', p: 'nef-ro-lo-GIE', k: 'Fachgebiet', d: 'Teilgebiet der Inneren Medizin, das sich mit Erkrankungen der Nieren befasst.', wz: '<strong>gr.</strong> nephros = Niere + logos = Lehre', b: 'Nephrologen behandeln chronische Niereninsuffizienz, Glomerulonephritis und Dialysepatienten.' },
  { w: 'Nozizeptor', p: 'no-zi-TSEP-tor', k: 'Neurologie', d: 'Schmerzrezeptor; freie Nervenendigung, die noxische (gewebsschädigende) Reize wahrnimmt und Schmerzsignale weiterleitet.', wz: '<strong>lat.</strong> nocere = schaden + recipere = empfangen', b: 'Nozizeptoren in der Haut reagieren auf mechanische, thermische und chemische Schmerzreize.' },
  // ── O ──
  { w: 'Ödeme', p: 'ö-DE-me', k: 'Pathologie', d: 'Ansammlung von Flüssigkeit im Gewebe (Interstitium); entsteht durch erhöhten Kapillardruck, verminderten kolloidosmotischen Druck oder gestörten Lymphabfluss.', wz: '<strong>gr.</strong> oidema = Geschwulst', b: 'Beinödeme bei Herzinsuffizienz entstehen durch erhöhten venösen Rückstaudruck.' },
  // ── P ──
  { w: 'Pathogenese', p: 'pa-tho-ge-NE-se', k: 'Allgemein', d: 'Entstehungs- und Entwicklungsmechanismus einer Erkrankung; wie eine Krankheit sich entwickelt.', wz: '<strong>gr.</strong> pathos = Leiden + genesis = Entstehung', b: 'Die Pathogenese des Typ-2-Diabetes umfasst Insulinresistenz → Hyperinsulinismus → Erschöpfung der β-Zellen.' },
  { w: 'Phagozytose', p: 'pha-go-zy-TOH-se', k: 'Immunologie', d: 'Aktive Aufnahme und intrazellulärer Abbau von Partikeln (Bakterien, Zellfragmente) durch Phagozyten (Granulozyten, Makrophagen).', wz: '<strong>gr.</strong> phagein = fressen + kytos = Zelle', b: 'Neutrophile Granulozyten phagozytieren Bakterien: Partikel wird umflossen → Phagosom → Lysosom → Abbau.' },
  { w: 'Physiologie', p: 'phy-sio-lo-GIE', k: 'Allgemein', d: 'Wissenschaft von den normalen Lebensvorgängen und Funktionen des Körpers.', wz: '<strong>gr.</strong> physis = Natur + logos = Lehre', b: 'Physiologie erklärt, wie Organsysteme unter normalen Bedingungen zusammenarbeiten.' },
  { w: 'Plasmazelle', p: 'PLAS-ma-zel-le', k: 'Immunologie', d: 'Aus B-Lymphozyten nach Antigenkontakt entstandene Effektorzelle; produziert Antikörper (Immunglobuline) in großer Menge.', wz: '<strong>gr.</strong> plasma = Geformtes + <strong>dt.</strong> Zelle', b: 'Eine einzelne Plasmazelle kann bis zu 2000 Antikörpermoleküle pro Sekunde produzieren.' },
  { w: 'Posterior', p: 'pos-TE-rior', k: 'Anatomie', d: 'Hinten (rückenseitig) gelegen; Synonym: dorsal. Gegenteil: anterior/ventral.', wz: '<strong>lat.</strong> posterior = hinterer', b: 'Der posteriore Anteil des Hirnstamms liegt dem Kleinhirn zugewandt.' },
  { w: 'Proximal', p: 'PROX-i-mal', k: 'Anatomie', d: 'Der Körpermitte oder dem Rumpf nahe gelegen. Gegenteil: distal.', wz: '<strong>lat.</strong> proximus = nächster', b: 'Der proximale Humerus (Oberarmknochen) bildet das Schultergelenk.' },
  // ── R ──
  { w: 'Resorption', p: 're-sorp-TSION', k: 'Physiologie', d: 'Aufnahme von Substanzen aus dem Darm oder anderen Geweben ins Blut oder in die Lymphe.', wz: '<strong>lat.</strong> resorbere = wieder aufsaugen', b: 'Eisenresorption findet bevorzugt im Duodenum statt; Vitamin B12 im terminalen Ileum.' },
  { w: 'Rhesusfaktor', p: 'RE-sus-fak-tor', k: 'Hämatologie', d: 'Antigenstruktur auf Erythrozytenoberfläche (v.a. D-Antigen); Rh-positiv (ca. 85 %) oder Rh-negativ; bedeutsam für Transfusion und Schwangerschaft.', wz: 'Benannt nach dem Rhesusaffen, bei dem das Antigen zuerst entdeckt wurde.', b: 'Rh-Inkompatibilität zwischen Mutter (rh-neg) und Kind (rh-pos) → Morbus haemolyticus neonatorum.' },
  // ── S ──
  { w: 'Sepsis', p: 'SEP-sis', k: 'Pathologie', d: 'Lebensbedrohliche systemische Entzündungsreaktion auf eine Infektion; früher „Blutvergiftung" genannt; Organversagen möglich.', wz: '<strong>gr.</strong> sepsis = Fäulnis', b: 'Sepsis-Triade: Infektion + SIRS (Fieber, Tachykardie, Tachypnoe, Leukozytose) + Organdysfunktion.' },
  { w: 'Stenose', p: 'ste-NOH-se', k: 'Pathologie', d: 'Verengung eines Hohlorgans (Gefäß, Herzklappe, Darm); führt zu Strömungshindernis und erhöhtem Druck proximal der Stenose.', wz: '<strong>gr.</strong> stenos = eng', b: 'Aortenstenose: Verengung der Aortenklappe → Belastungsdyspnoe, Angina pectoris, Synkope.' },
  { w: 'Subkutan', p: 'sub-ku-TAN', k: 'Anatomie', d: 'Unter der Haut gelegen; die subkutane Schicht (Hypodermis) besteht aus Fett- und lockerem Bindegewebe.', wz: '<strong>lat.</strong> sub = unter + cutis = Haut', b: 'Subkutane Injektion: Insulin wird ins Unterhautfettgewebe (z.B. Bauch) gespritzt.' },
  { w: 'Superior', p: 'su-PE-rior', k: 'Anatomie', d: 'Oben (kopfwärts) gelegen; Synonym: kranial. Gegenteil: inferior/kaudal.', wz: '<strong>lat.</strong> superior = oberer', b: 'Die Vena cava superior (obere Hohlvene) drainiert Blut aus dem Kopf- und Armbereich.' },
  { w: 'Synkope', p: 'SYN-ko-pe', k: 'Neurologie', d: 'Kurzfristiger Bewusstseinsverlust durch vorübergehende globale Minderdurchblutung des Gehirns; kurze Dauer, spontane Erholung.', wz: '<strong>gr.</strong> synkope = Zusammenbruch', b: 'Vasovagale Synkope: häufigste Form, ausgelöst durch Stress, Schmerz oder langes Stehen.' },
  // ── T ──
  { w: 'Tachykardie', p: 'ta-chy-kar-DIE', k: 'Kardiologie', d: 'Erhöhter Herzschlag; Herzfrequenz über 100 Schläge pro Minute.', wz: '<strong>gr.</strong> tachys = schnell + kardia = Herz', b: 'Sinustachykardie bei Fieber: pro °C Temperaturerhöhung steigt die HF um ca. 10 Schläge/min.' },
  { w: 'Thrombopoese', p: 'throm-bo-pö-E-se', k: 'Hämatologie', d: 'Bildung von Thrombozyten (Blutplättchen) aus Megakaryozyten im Knochenmark.', wz: '<strong>gr.</strong> thrombos = Klumpen + poiein = machen', b: 'Thrombozytopenien (zu wenig Plättchen) entstehen bei gestörter Thrombopoese, z.B. bei Knochenmarkerkrankungen.' },
  { w: 'Thrombose', p: 'throm-BOH-se', k: 'Kardiologie', d: 'Bildung eines Blutgerinnsels (Thrombus) in einem Blutgefäß bei lebendem Organismus; häufig in tiefen Beinvenen.', wz: '<strong>gr.</strong> thrombos = Klumpen', b: 'Tiefe Beinvenenthrombose: Risikofaktoren sind Immobilität, Gerinnungsstörungen, Kontrazeptiva.' },
  { w: 'Transsudation', p: 'trans-su-da-TSION', k: 'Pathologie', d: 'Durchtritt proteinarmer Flüssigkeit aus Kapillaren ins Gewebe bei erhöhtem hydrostatischem Druck; ohne Entzündung (Gegenteil: Exsudation).', wz: '<strong>lat.</strong> trans = durch + sudare = schwitzen', b: 'Transsudat bei Herzinsuffizienz: klare, proteinarme Flüssigkeit im Pleuraraum.' },
  // ── V ──

  { w: 'Alkalose', p: 'al-ka-LOH-se', k: 'Physiologie', d: 'Zustand mit erhöhtem pH-Wert des Blutes (>7,42); Abfall der Wasserstoffionenkonzentration. Gegenteil: Azidose.', wz: '<strong>arab.</strong> al-qali = Pottasche + gr. -osis', b: 'Respiratorische Alkalose: Hyperventilation → CO₂-Abfall → pH steigt → Schwindel, Krämpfe möglich.' },

  { w: 'Anamnese', p: 'a-nam-NE-se', k: 'Diagnostik', d: 'Krankengeschichte; Erhebung der Vorgeschichte einer Erkrankung durch Befragung des Patienten (oder Angehöriger = Fremdanamnese).', wz: '<strong>gr.</strong> anamnesis = Erinnerung', b: 'Eigenanamnese, Familienanamnese, Sozialanamnese und Systemanamnese sind Bestandteile der vollständigen Anamnese.' },

  // ── D (Ergänzungen) ──

  { w: 'Onkologie', p: 'on-ko-lo-GIE', k: 'Fachgebiet', d: 'Fachgebiet der Medizin, das sich mit der Entstehung, Diagnose und Behandlung von Tumorerkrankungen (Krebs) befasst.', wz: '<strong>gr.</strong> onkos = Geschwulst + logos = Lehre', b: 'Hämatologische Onkologie: Leukämien, Lymphome, Myelome. Solide Tumoren: Karzinome, Sarkome.' },

  // ── R (Ergänzungen) ──
